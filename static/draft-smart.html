<style>
  /* =============================================================================
     Smart Drafter — premium voice-first experience.
     Dark immersive theme, center-stage orb, AI greets in large typography,
     voice-or-type conversational flow, document slides in at the end.
     Designed to feel like Gemini / ChatGPT Voice — a flagship moment.
     ============================================================================= */
  /* Light, on-brand work surface — same design system as the rest of the app
     (Geist + Geist Mono, calm monochrome, gold scoped to the drafting voice). */
  :root {
    --bg:        #fafaf9;
    --surface:   #ffffff;
    --ink:       #0c0c0a;
    --ink-2:     #4b4b48;
    --ink-3:     #8a8a82;
    --line:      #e8e6e0;
    --line-2:    #f1efea;
    --soft:      #f6f4ee;
    --gold:      #c9a96e;
    --gold-deep: #b4894b;
    --gold-soft: #faf7ed;
    --gold-line: #ece3c8;
    --gold-ink:  #8c7549;
    --gold-grad: linear-gradient(135deg, #d8b878, #c08f4d);
    --good:      #2d6a2d;
    --bad:       #9b2c2c;
    --warn:      #b7791f;
    --radius:    6px;
    --radius-lg: 10px;
    --shadow-card: 0 1px 2px rgba(12, 12, 10, 0.04);
    --shadow-lift: 0 12px 28px -14px rgba(12, 12, 10, 0.18);
    --ease:   cubic-bezier(0.16, 1, 0.3, 1);
    --t-fast: 0.16s;
    --t-med:  0.26s;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
  body {
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    background:
      radial-gradient(ellipse 80% 52% at 50% -8%, var(--gold-soft) 0%, transparent 60%),
      var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.55;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    user-select: none;
  }
  body.lang-hi { font-family: 'Noto Sans Devanagari', 'Geist', sans-serif; }
  input, textarea { user-select: text; }

  /* ── Top bar ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    z-index: 50;
    background: rgba(250, 250, 249, 0.82);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .topbar__left { display: flex; align-items: center; gap: 12px; }
  .topbar__back {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-2); text-decoration: none;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .topbar__back:hover { background: var(--soft); color: var(--ink); }
  .topbar__brand {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-3);
  }
  .topbar__brand span.accent { color: var(--gold-ink); }
  .topbar__right { display: flex; align-items: center; gap: 8px; }
  .lang-toggle {
    display: inline-flex; background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px; padding: 3px;
    font-size: 11px; font-weight: 600;
  }
  .lang-toggle button {
    border: none; background: transparent;
    padding: 5px 11px; border-radius: 999px;
    color: var(--ink-3); cursor: pointer;
    font-family: inherit; font-size: inherit; font-weight: inherit;
    transition: all 0.18s;
  }
  .lang-toggle button.active {
    background: var(--ink); color: var(--surface);
  }
  .restart-btn {
    background: var(--surface); border: 1px solid var(--line);
    color: var(--ink-2);
    padding: 6px 12px; border-radius: 999px;
    font-family: 'Geist Mono', ui-monospace, monospace; font-size: 11px; cursor: pointer;
    transition: all 0.15s;
  }
  .restart-btn:hover { border-color: var(--ink-3); color: var(--ink); }

  /* ── Main stage ── */
  .stage {
    position: relative;
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 88px 24px 220px;
    text-align: center;
  }

  /* The orb — central voice indicator, gold on the light surface (the drafting
     signature). Soft halo + concentric hairline gold rings; states recolour it. */
  .orb-wrap {
    position: relative;
    width: 200px; height: 200px;
    margin-bottom: 40px;
    display: flex; align-items: center; justify-content: center;
  }
  .orb {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%,
      #f6ebd2 0%,
      var(--gold) 44%,
      var(--gold-deep) 78%,
      #9c7536 100%);
    box-shadow:
      0 14px 50px -8px rgba(201, 169, 110, 0.55),
      0 2px 10px rgba(12, 12, 10, 0.06),
      inset 0 -16px 34px rgba(120, 90, 40, 0.30),
      inset 0 10px 22px rgba(255, 248, 230, 0.55);
    animation: orb-breathe 4.5s ease-in-out infinite;
  }
  .orb::before, .orb::after {
    content: '';
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    border: 1px solid var(--gold-line);
    opacity: 0;
  }
  .orb::before { animation: orb-ring 3.2s ease-out infinite; }
  .orb::after  { animation: orb-ring 3.2s ease-out 1.6s infinite; }
  @keyframes orb-breathe {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50%      { transform: scale(1.035); filter: brightness(1.04); }
  }
  @keyframes orb-ring {
    0%   { opacity: 0.55; transform: scale(0.9); }
    100% { opacity: 0;    transform: scale(1.5); }
  }

  /* States: listening (faster pulse + ripple), thinking (rotating gold), speaking (gentle glow) */
  .orb-wrap.is-listening .orb {
    animation: orb-listen 1.25s ease-in-out infinite;
  }
  @keyframes orb-listen {
    0%, 100% { transform: scale(1);    box-shadow: 0 14px 56px -6px rgba(201,169,110,0.7), 0 0 0 0 rgba(201,169,110,0.45), inset 0 -16px 34px rgba(120,90,40,0.30); }
    50%      { transform: scale(1.08); box-shadow: 0 14px 64px -4px rgba(201,169,110,0.8), 0 0 0 22px rgba(201,169,110,0),   inset 0 -16px 34px rgba(120,90,40,0.30); }
  }
  .orb-wrap.is-thinking .orb {
    animation: orb-think 1.8s linear infinite;
    background: conic-gradient(from 0deg,
      var(--gold) 0%, #ecd9ad 22%, var(--gold-deep) 48%, var(--gold) 72%, #ecd9ad 90%, var(--gold) 100%);
  }
  @keyframes orb-think {
    0%   { transform: rotate(0); }
    100% { transform: rotate(360deg); }
  }
  .orb-wrap.is-speaking .orb {
    animation: orb-speak 1.7s ease-in-out infinite;
  }
  @keyframes orb-speak {
    0%, 100% { transform: scale(1);    filter: brightness(1.02); }
    50%      { transform: scale(1.045); filter: brightness(1.1); }
  }

  /* AI text — large, elegant, centered */
  .ai-text {
    max-width: 720px;
    min-height: 64px;
    font-size: 28px;
    font-weight: 500;
    line-height: 1.35;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin: 0 0 22px;
    transition: opacity 0.32s ease;
  }
  body.lang-hi .ai-text { font-weight: 600; line-height: 1.45; letter-spacing: -0.01em; }

  /* "You said" history bubble */
  .user-text {
    max-width: 600px;
    font-size: 15px;
    color: var(--ink-2);
    margin: 0 0 14px;
    padding: 8px 16px;
    background: var(--soft);
    border: 1px solid var(--line);
    border-radius: 999px;
    line-height: 1.4;
    transition: opacity 0.32s ease;
  }
  .user-text::before {
    content: '\201C';
    margin-right: 3px;
    color: var(--ink-3);
  }
  .user-text::after { content: '\201D'; margin-left: 3px; color: var(--ink-3); }

  /* Template chips when AI asks "which template" — appear when user starts session */
  .template-chips {
    display: flex; gap: 8px;
    flex-wrap: wrap; justify-content: center;
    max-width: 820px; margin: 0 0 20px;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--ink-2);
    padding: 7px 13px;
    border-radius: 999px;
    font-family: 'Geist', sans-serif; font-size: 12.5px; font-weight: 500;
    cursor: pointer;
    letter-spacing: -0.005em;
    transition: all 0.12s ease;
  }
  .chip:hover { border-color: var(--ink-3); color: var(--ink); transform: translateY(-1px); }
  .chip__tier { font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--ink-3); margin-left: 6px; }
  body.lang-hi .chip { font-family: 'Noto Sans Devanagari', 'Geist', sans-serif; }

  /* Bottom composer — voice + text */
  .composer {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 18px 24px 30px;
    background: linear-gradient(180deg, rgba(250,250,249,0) 0%, var(--bg) 38%);
    z-index: 40;
    display: flex; align-items: flex-end; justify-content: center;
    gap: 12px;
  }
  .composer__input-wrap {
    flex: 1; max-width: 560px;
    position: relative;
  }
  .composer__input {
    width: 100%; min-height: 52px; max-height: 200px;
    padding: 15px 56px 15px 20px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 26px;
    color: var(--ink);
    font-family: 'Geist', sans-serif; font-size: 15px; line-height: 1.5;
    resize: none; outline: none;
    box-shadow: var(--shadow-card);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .composer__input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(12, 12, 10, 0.05); }
  .composer__input::placeholder { color: var(--ink-3); }
  body.lang-hi .composer__input { font-family: 'Noto Sans Devanagari', sans-serif; }

  .composer__send {
    position: absolute; right: 8px; bottom: 8px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--surface);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.15s;
  }
  .composer__send:hover { transform: scale(1.05); background: #1f1f1c; }
  .composer__send:disabled { opacity: 0.32; cursor: not-allowed; transform: none; }
  .composer__send svg { width: 16px; height: 16px; }

  .composer__mic {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--gold-grad);
    color: #3a2e16;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
    box-shadow: 0 6px 18px -6px rgba(201, 169, 110, 0.6);
    flex-shrink: 0;
  }
  .composer__mic:hover { transform: scale(1.05); box-shadow: 0 8px 22px -6px rgba(201, 169, 110, 0.75); }
  .composer__mic svg { width: 24px; height: 24px; }
  .composer__mic.is-recording {
    background: var(--ink);
    color: var(--surface);
    animation: mic-pulse 1.3s ease-in-out infinite;
  }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(12, 12, 10, 0.28); }
    50%      { box-shadow: 0 0 0 14px rgba(12, 12, 10, 0); }
  }

  /* Voice controls — hands-free toggle + speaker mute, left of the input */
  .composer__ctrls { display: flex; flex-direction: column; gap: 8px; align-items: stretch; flex-shrink: 0; }
  .composer__toggle {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--line); color: var(--ink-2);
    padding: 8px 12px; border-radius: 999px;
    font-family: 'Geist', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .composer__toggle:hover { border-color: var(--ink-3); color: var(--ink); }
  .composer__toggle.is-on {
    background: var(--gold); color: #3a2e16; border-color: var(--gold-deep);
    box-shadow: 0 4px 14px -6px rgba(201, 169, 110, 0.7);
  }
  .composer__toggle svg { width: 16px; height: 16px; flex-shrink: 0; }
  body.lang-hi .composer__toggle { font-family: 'Noto Sans Devanagari', 'Geist', sans-serif; }
  .composer__iconbtn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--line); color: var(--ink-2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
  }
  .composer__iconbtn:hover { border-color: var(--ink-3); color: var(--ink); }
  .composer__iconbtn.is-off { color: var(--ink-3); border-style: dashed; }
  .composer__iconbtn svg { width: 18px; height: 18px; }
  @media (max-width: 760px) {
    .composer__toggle .label { display: none; }
    .composer__toggle { padding: 10px; }
    .composer__iconbtn { width: 36px; height: 36px; }
  }

  /* Document overlay — slides up from bottom when AI finishes */
  .doc-overlay {
    position: fixed; left: 0; right: 0; bottom: 0;
    height: 90vh; max-height: 90vh;
    background: var(--surface);
    color: var(--ink);
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
    transform: translateY(100%);
    transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 60;
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 -12px 40px -10px rgba(12, 12, 10, 0.22);
  }
  .doc-overlay.is-open { transform: translateY(0); }
  .doc-overlay__header {
    flex-shrink: 0;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    position: relative;
  }
  .doc-overlay__header::before {
    content: '';
    position: absolute; top: 6px; left: 50%;
    transform: translateX(-50%);
    width: 36px; height: 4px;
    background: var(--line); border-radius: 2px;
  }
  .doc-overlay__title {
    font-size: 14px; font-weight: 600;
    color: var(--ink);
  }
  body.lang-hi .doc-overlay__title { font-family: 'Noto Sans Devanagari', sans-serif; }
  .doc-overlay__actions { display: flex; gap: 8px; }
  .doc-overlay__btn {
    background: var(--surface); border: 1px solid var(--line);
    color: var(--ink-2);
    padding: 6px 12px; border-radius: 6px;
    font-family: 'Geist', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .doc-overlay__btn:hover { background: var(--soft); color: var(--ink); }
  .doc-overlay__btn--primary {
    background: var(--ink); color: var(--surface); border-color: var(--ink);
  }
  .doc-overlay__btn--primary:hover { background: #1f1f1c; }
  .doc-overlay__body {
    flex: 1; overflow-y: auto;
    padding: 24px 20px 60px;
    background: var(--soft);
  }
  .doc-paper {
    background: var(--surface);
    max-width: 720px; margin: 0 auto;
    padding: 48px 52px 64px;
    box-shadow: var(--shadow-lift);
    border: 1px solid var(--line);
    border-radius: 4px;
    font-family: 'Noto Sans Devanagari', 'Times New Roman', serif;
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--ink);
    user-select: text;
  }
  body.lang-en .doc-paper { font-family: 'Times New Roman', serif; }
  /* Court document formatting classes (set via formatCourtDoc()) */
  .doc-paper .court-center  { text-align: center; }
  .doc-paper .court-bold    { font-weight: 700; }
  .doc-paper .court-italic  { font-style: italic; }
  .doc-paper .section-heading {
    font-weight: 700; margin: 20px 0 8px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .doc-paper .ground-item   { padding-left: 16px; margin: 4px 0; }
  .doc-paper .para-line     { margin: 2px 0; }

  /* Toast */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-8px);
    background: var(--ink); color: var(--surface);
    padding: 10px 18px; border-radius: 999px;
    font-size: 12.5px;
    box-shadow: 0 8px 24px -8px rgba(12, 12, 10, 0.35);
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; z-index: 100;
  }
  .toast--show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast--ok { background: var(--good); }
  .toast--err { background: var(--bad); }

  /* Canonical draft preview inside the overlay (the real from-prompt output) */
  .doc-result-head { max-width: 760px; margin: 0 auto 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .doc-badge { font-family: 'Geist Mono', monospace; font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 9px; border-radius: 999px; }
  .doc-badge--ok { background: #eef3ec; color: var(--good); border: 1px solid #cfe0c6; }
  .doc-badge--ai { background: var(--gold-soft); color: var(--gold-ink); border: 1px solid var(--gold-line); }
  .doc-meta { font-size: 12px; color: var(--ink-3); }
  .doc-frame { width: 100%; max-width: 760px; height: 78vh; margin: 0 auto; display: block; border: 1px solid var(--line); border-radius: 8px; background: #fff; box-shadow: var(--shadow-lift); }
  .doc-notes { max-width: 760px; margin: 16px auto 0; display: grid; gap: 12px; }
  .doc-note { border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; font-size: 13px; line-height: 1.55; background: var(--surface); }
  .doc-note h4 { margin: 0 0 6px; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-3); }
  .doc-note--cite { background: var(--gold-soft); border-color: var(--gold-line); }
  .doc-note--cite h4 { color: var(--gold-ink); }
  .doc-note ul { margin: 0; padding-left: 18px; } .doc-note li { margin-bottom: 4px; }
  .doc-overlay__actions .lang-toggle button { padding: 4px 9px; }
  .doc-overlay__actions .lang-toggle button.active { background: var(--ink); color: var(--surface); }

  /* Reveal animation on AI text changes */
  .ai-text.is-changing { opacity: 0; }
  .user-text.is-changing { opacity: 0; }

  /* Mobile */
  @media (max-width: 760px) {
    .ai-text { font-size: 22px; max-width: 100%; }
    .orb-wrap { width: 170px; height: 170px; margin-bottom: 24px; }
    .stage { padding: 76px 18px 160px; }
    .template-chips { gap: 6px; }
    .chip { padding: 7px 12px; font-size: 12px; }
    .composer { padding: 12px 14px 20px; gap: 8px; }
    .composer__input { padding: 12px 48px 12px 18px; font-size: 14px; min-height: 48px; }
    .composer__mic { width: 48px; height: 48px; }
    .composer__mic svg { width: 20px; height: 20px; }
  }
</style>

<body class="lang-en">

<header class="topbar">
  <div class="topbar__left">
    <a href="/app" class="topbar__back" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
    </a>
    <div class="topbar__brand">Smart <span class="accent">Drafter</span></div>
  </div>
  <div class="topbar__right">
    <button class="restart-btn" id="btn-restart" data-en="↻ Restart" data-hi="↻ पुनः शुरू">↻ पुनः शुरू</button>
    <div class="lang-toggle" role="group" aria-label="language">
      <button id="lang-en" class="active">EN</button>
      <button id="lang-hi">हिं</button>
    </div>
  </div>
</header>

<main class="stage" id="stage">
  <div class="orb-wrap" id="orb-wrap">
    <div class="orb"></div>
  </div>

  <!-- AI says ... -->
  <div class="ai-text" id="ai-text"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
// =========================================================================
// Smart Drafter — ChatGPT-style hands-free voice drafting.
//
// Lifecycle:
//   1. Page loads, greets, hands-free mode ON. Example chips for a quick start.
//   2. Lawyer taps the mic and just DESCRIBES the matter in natural speech
//      (continuous dictation; we end the turn on a natural pause).
//   3. The whole description → POST /api/draft/from-prompt → it classifies,
//      extracts every field at once, and renders the VERBATIM canonical
//      template (zero-hallucination) — or a house-style authored draft for the
//      long tail. No field-by-field interview.
//   4. The draft slides up (real canonical output, in an iframe). The assistant
//      reads it back and listens for refinements ("make it High Court", "add
//      that he's the sole breadwinner") → re-drafts.
//
// Orb states: idle (breathe) · listening (gold ripple) · thinking · speaking.
// =========================================================================

const state = {
  lang:      document.body.classList.contains('lang-hi') ? 'hi' : 'en',
  autoLang:  true,          // detect HI/EN from the lawyer's words until they pick a language by hand
  matter:    '',            // the running free-form description (grows with each turn)
  turnBuffer:'',            // phrases captured during the current listening turn
  lastResult: null,         // last /from-prompt result (canonical | authored)
  templates: [],            // kept for parity (chips are static examples now)
  collected: {},            // kept for persona prefill (not used by from-prompt)
  // UI / voice state
  micActive:    false,
  listenHandle: null,       // active HeadnoteVoice.dictate() handle, if listening
  silenceTimer: null,       // end-of-turn detector while listening
  handsFree:    true,       // ChatGPT-style speak ↔ listen loop, ON by default
  ttsMuted:     false,      // assistant voice read-back on/off
  started:      false,      // has the lawyer begun the first turn?
};

// Helpers
function $(s, r) { return (r || document).querySelector(s); }
function applyLang() {
  document.body.classList.toggle('lang-hi', state.lang === 'hi');
  document.body.classList.toggle('lang-en', state.lang === 'en');
  document.querySelectorAll('[data-en]').forEach(el => {
    const v = state.lang === 'hi' ? el.dataset.hi : el.dataset.en;
    if (v != null) el.textContent = v;
  });
  document.querySelectorAll('[data-en-ph]').forEach(el => {
    const v = state.lang === 'hi' ? el.dataset.hiPh : el.dataset.enPh;
    if (v != null) el.placeholder = v;
  });
  $('#lang-en').classList.toggle('active', state.lang === 'en');
  $('#lang-hi').classList.toggle('active', state.lang === 'hi');
}
function toast(msg, kind, ms) {
  const t = $('#toast'); t.textContent = msg;
  t.className = 'toast toast--show toast--' + (kind || 'ok');
  setTimeout(() => t.classList.remove('toast--show'), ms || 2400);
}
async function authHeaders() {
  if (window.headnoteAuth && window.headnoteAuth.getAccessToken) {
    try { const tk = await window.headnoteAuth.getAccessToken(); if (tk) return { 'Authorization': `Bearer ${tk}` }; } catch {}
  }
  return {};
}

// 401 handler — NEVER redirects. Shows an inline sign-in modal with a
// working Google button so the user can sign in without leaving this page.
async function handleAuthError(status) {
  if (status !== 401) return false;
  if (window.headnoteAuth && window.headnoteAuth.ready) {
    try { await window.headnoteAuth.ready(); } catch {}
  }
  setOrb('idle');
  const uid = window.headnoteAuth && window.headnoteAuth.userId && window.headnoteAuth.userId();
  if (uid) {
    toast(state.lang === 'hi' ? 'सर्वर समस्या — पुनः प्रयास करें' : 'Server hiccup — try again', 'err', 2500);
  } else {
    showSmartSignInModal();
  }
  return true;
}

function showSmartSignInModal() {
  if (document.getElementById('inline-signin')) return;
  const isHi = state.lang === 'hi';
  const m = document.createElement('div');
  m.id = 'inline-signin';
  m.style.cssText = 'position:fixed;inset:0;background:rgba(10,10,15,0.85);backdrop-filter:blur(10px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  m.innerHTML = `
    <div style="background:#16161e;border:1px solid #2a2a35;border-radius:14px;padding:28px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5);color:#e8e0d4">
      <div style="font-size:22px;font-weight:700;margin-bottom:8px;color:#c9a96e">
        ${isHi ? 'साइन-इन करें' : 'Sign in to continue'}
      </div>
      <div style="font-size:14px;color:#999;margin-bottom:22px;line-height:1.5">
        ${isHi
          ? 'Smart Drafter का उपयोग करने के लिए Google से साइन-इन करें।'
          : 'Sign in with Google to use Smart Drafter AI features.'}
      </div>
      <button id="inline-signin-btn" style="width:100%;background:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:500;color:#3c4043;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        ${isHi ? 'Google से साइन-इन करें' : 'Sign in with Google'}
      </button>
      <button id="inline-signin-close" style="width:100%;background:transparent;border:none;padding:10px;font-size:13px;color:#666;cursor:pointer;margin-top:10px">
        ${isHi ? 'बाद में' : 'Maybe later'}
      </button>
    </div>
  `;
  document.body.appendChild(m);
  document.getElementById('inline-signin-btn').onclick = async () => {
    document.getElementById('inline-signin-btn').textContent = isHi ? 'खुल रहा है…' : 'Opening Google…';
    if (window.headnoteAuth && window.headnoteAuth.signInInline) {
      await window.headnoteAuth.signInInline();
    } else {
      window.location.href = '/app';
    }
  };
  document.getElementById('inline-signin-close').onclick = () => m.remove();
}
function setOrb(stateName) {
  const w = $('#orb-wrap');
  w.classList.remove('is-listening', 'is-thinking', 'is-speaking');
  if (stateName === 'listening') w.classList.add('is-listening');
  else if (stateName === 'thinking') w.classList.add('is-thinking');
  else if (stateName === 'speaking') w.classList.add('is-speaking');
}

// ---- AI text reveal with fade ----
function showAiText(text) {
  const el = $('#ai-text');
  el.classList.add('is-changing');
  setTimeout(() => {
    el.textContent = text;
    el.classList.remove('is-changing');
  }, 200);
}
function showUserEcho(text) {
  const el = $('#user-text');
  el.textContent = text;
  el.style.display = '';
  setTimeout(() => el.classList.remove('is-changing'), 50);
}

// ---- Example starter chips (tap to fill the composer with a sample) ----
const EXAMPLES = [
  { en: 'Anticipatory bail — Sessions Court, apprehension of arrest, FIR under §420/406, ready to cooperate with investigation',
    hi: 'अग्रिम जमानत — सत्र न्यायालय, गिरफ्तारी की आशंका, धारा 420/406, जांच में सहयोग को तैयार' },
  { en: 'Regular bail — FIR 123/2026, PS Kotwali Bhopal, §420, accused in custody 2 months, sole breadwinner, no antecedents',
    hi: 'नियमित जमानत — अपराध क्रमांक 123/2026, थाना कोतवाली भोपाल, धारा 420, 2 माह से अभिरक्षा में, एकमात्र कमाने वाला' },
  { en: 'Maintenance under §144 BNSS — wife, husband earns ₹40,000/month, deserted without cause',
    hi: 'भरण-पोषण धारा 144 — पत्नी, पति ₹40,000 मासिक कमाता है, बिना कारण छोड़ दिया' },
  { en: 'Quash FIR under §482 — matter compromised between the parties, High Court',
    hi: 'धारा 482 के अंतर्गत FIR निरस्त — पक्षकारों में राजीनामा, उच्च न्यायालय' },
];
async function loadTemplates() { /* kept for parity; chips are static examples now */ }

function renderTemplateChips() {
  const wrap = $('#template-chips');
  wrap.innerHTML = '';
  wrap.style.display = 'flex';
  EXAMPLES.forEach(ex => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = state.lang === 'hi' ? ex.hi : ex.en;
    chip.onclick = () => {
      const inp = $('#composer-input');
      inp.value = state.lang === 'hi' ? ex.hi : ex.en;
      $('#btn-send').disabled = false;
      inp.style.height = 'auto';
      inp.style.height = Math.min(200, inp.scrollHeight) + 'px';
      inp.focus();
    };
    wrap.appendChild(chip);
  });
}

// ---- Draft from the running description via /api/draft/from-prompt ----
// One free-form description → classify → extract every field at once → render
// the VERBATIM canonical template (or a house-style authored draft for the long
// tail). The lawyer just talks; there is no field-by-field interview.
async function submitMatter() {
  const matter = (state.matter || '').trim();
  if (!matter) return;
  state.started = true;
  $('#template-chips').style.display = 'none';
  setOrb('thinking');
  showAiText(state.lang === 'hi' ? 'ड्राफ्ट तैयार कर रहा हूँ…' : 'Drafting your document…');
  try {
    const headers = { 'Content-Type': 'application/json', ...(await authHeaders()) };
    const r = await fetch('/api/draft/from-prompt', {
      method: 'POST', headers,
      body: JSON.stringify({ prompt: matter, lang: state.lang }),
    });
    if (await handleAuthError(r.status)) return;
    const res = await r.json();
    if (!r.ok || res.ok === false) throw new Error(res.error || res.detail || `HTTP ${r.status}`);
    renderResult(res);
    const ready = state.lang === 'hi'
      ? 'आपका मसौदा तैयार है। कुछ बदलना हो तो बताइए।'
      : 'Your draft is ready. Tell me anything you want to change.';
    showAiText(ready);
    speakAndMaybeListen(ready);          // read it back, then listen for refinements
  } catch (e) {
    setOrb('idle');
    toast('Error: ' + e.message, 'err', 4000);
    showAiText(state.lang === 'hi' ? 'क्षमा करें, पुनः प्रयास करें' : 'Sorry, please try again');
  }
}

function pickPage(res) {
  return state.lang === 'en' ? (res.page_en || res.page_hi || '')
                             : (res.page_hi || res.page_en || '');
}
function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// ---- Render the canonical/authored draft into the overlay (the real output) ----
function renderResult(res) {
  state.lastResult = res;
  $('#doc-frame').srcdoc = pickPage(res);
  const authored = res.mode === 'authored';
  $('#doc-title').textContent = res.title || res.doc_type || (state.lang === 'hi' ? 'मसौदा' : 'Draft');
  const conf = res.confidence != null ? Math.round(res.confidence * 100) + '%' : '';
  $('#doc-result-head').innerHTML =
    `<span class="doc-badge ${authored ? 'doc-badge--ai' : 'doc-badge--ok'}">`
    + (authored ? (state.lang === 'hi' ? 'AI-रचित · जाँचें' : 'AI-authored · review')
                : (state.lang === 'hi' ? 'मूल टेम्पलेट' : 'Verbatim template')) + '</span>'
    + (conf ? `<span class="doc-meta">${state.lang === 'hi' ? 'मिलान' : 'match'} ${conf}</span>` : '');
  $('#doc-langtoggle').style.display = (res.page_hi && res.page_en) ? '' : 'none';
  [...$('#doc-langtoggle').querySelectorAll('button')].forEach(b => b.classList.toggle('active', b.dataset.lang === state.lang));
  const notes = $('#doc-notes'); notes.innerHTML = '';
  const cites = res.cite_at_hearing || [];
  if (cites.length) {
    const items = cites.map(c => { const t = c.case || c; return `<li><b>${esc(t)}</b>${c.point ? ' — ' + esc(c.point) : ''}</li>`; }).join('');
    notes.insertAdjacentHTML('beforeend', `<div class="doc-note doc-note--cite"><h4>${state.lang === 'hi' ? 'सुनवाई पर उद्धृत करें (पहले सत्यापित करें)' : 'Authorities — cite at hearing (verify first)'}</h4><ul>${items}</ul></div>`);
  }
  if (res.companions && res.companions.length) {
    notes.insertAdjacentHTML('beforeend', `<div class="doc-note"><h4>${state.lang === 'hi' ? 'साथ में दाखिल करें' : 'File alongside'}</h4><ul>${res.companions.map(w => `<li>${esc(w)}</li>`).join('')}</ul></div>`);
  }
  $('#doc-overlay').classList.add('is-open');
}

// (Plain-text formatting + revealDocument removed — the overlay now shows the
// canonical from-prompt render directly via an <iframe>; see renderResult.)
$('#doc-close').addEventListener('click', () => $('#doc-overlay').classList.remove('is-open'));

// Real PDF (server WeasyPrint) — the iframe already holds a print-ready
// canonical page, so we POST that same HTML to /api/draft/pdf for a
// text-selectable PDF. One blob powers Download AND WhatsApp — reliable on
// mobile, unlike iframe.contentWindow.print() which silently no-ops there.
function _smartDocName() {
  const t = ($('#doc-title').textContent || 'headnote-draft').trim().toLowerCase()
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 60) || 'headnote-draft';
  const d = new Date();
  return t + '-' + d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
}
async function _smartFetchPdf() {
  const html = pickPage(state.lastResult);
  if (!html) throw new Error('no document');
  const name = _smartDocName();
  const r = await fetch('/api/draft/pdf', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', ...(await authHeaders()) },
    body: JSON.stringify({ html, filename: name }),
  });
  if (!r.ok) { let d = ''; try { d = (await r.json()).detail || ''; } catch (e) {} throw new Error(d || ('server ' + r.status)); }
  return { blob: await r.blob(), filename: name + '.pdf' };
}
function _smartDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}

// ⬇ PDF — download the real, text-selectable PDF.
$('#doc-pdf').addEventListener('click', async () => {
  if (!state.lastResult) return;
  const btn = $('#doc-pdf'), orig = btn.textContent;
  btn.disabled = true; btn.textContent = state.lang === 'hi' ? '⏳ बना रहे हैं…' : '⏳ Generating…';
  try { const { blob, filename } = await _smartFetchPdf(); _smartDownload(blob, filename); toast(state.lang === 'hi' ? 'PDF सहेजा गया ✓' : 'PDF saved ✓'); }
  catch (e) { toast((state.lang === 'hi' ? 'PDF नहीं बना — ' : 'PDF failed — ') + (e.message || ''), 'err', 3500); }
  finally { btn.disabled = false; btn.textContent = orig; }
});

// 📱 WhatsApp — attach the real PDF (native share sheet on mobile; on desktop
// download it + open WhatsApp Web with a prefilled note to drag it in).
$('#doc-share').addEventListener('click', async () => {
  if (!state.lastResult) return;
  const btn = $('#doc-share'), orig = btn.textContent;
  btn.disabled = true; btn.textContent = state.lang === 'hi' ? '⏳ तैयार…' : '⏳ Preparing…';
  let out;
  try { out = await _smartFetchPdf(); }
  catch (e) { btn.disabled = false; btn.textContent = orig; toast((state.lang === 'hi' ? 'PDF नहीं बना — ' : 'PDF failed — ') + (e.message || ''), 'err', 3500); return; }
  const file = new File([out.blob], out.filename, { type: 'application/pdf' });
  const note = ($('#doc-title').textContent || 'Document').trim() + ' — Headnote';
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], title: out.filename, text: note }); }
    catch (e) { if (e.name !== 'AbortError') { _smartDownload(out.blob, out.filename); window.open('https://wa.me/?text=' + encodeURIComponent(note), '_blank'); } }
  } else { _smartDownload(out.blob, out.filename); window.open('https://wa.me/?text=' + encodeURIComponent(note), '_blank'); }
  btn.disabled = false; btn.textContent = orig;
});

// In-overlay language toggle — re-render the cached pages in the other language.
$('#doc-langtoggle').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b || !state.lastResult) return;
  state.lang = b.dataset.lang; state.autoLang = false;
  applyLang(); updateVoiceUI();
  $('#doc-frame').srcdoc = pickPage(state.lastResult);
  [...e.currentTarget.querySelectorAll('button')].forEach(x => x.classList.toggle('active', x === b));
});

// ---- Send user message ----
// Auto-detect the working language from what the lawyer actually says/types:
// any Devanagari → Hindi, else English. Runs until they pick a language by hand
// (the EN/हिं toggle sets state.autoLang = false), so the assistant replies in
// whatever language they spoke in.
function detectLang(text) {
  return /[ऀ-ॿ]/.test(text || '') ? 'hi' : 'en';
}
function maybeAutoSwitchLang(text) {
  if (!state.autoLang) return;
  const d = detectLang(text);
  if (d !== state.lang) {
    state.lang = d;
    applyLang();
    updateVoiceUI();          // re-localise control titles + mute icon
  }
}

async function sendMessage() {
  const input = $('#composer-input');
  const text = (input.value || '').trim();
  if (!text) return;
  maybeAutoSwitchLang(text);            // the first words decide HI vs EN (until set manually)
  input.value = '';
  input.style.height = 'auto';
  $('#btn-send').disabled = true;
  if (state.awaitingFirstReply) {
    state.awaitingFirstReply = false;
    $('#template-chips').style.display = 'none';
    // Try to infer template from text
    const inferred = inferTemplate(text);
    if (inferred) {
      state.docType = inferred;
      const tpl = state.templates.find(t => t.id === inferred);
      showUserEcho(text);
      setOrb('thinking');
      showAiText('');
      setTimeout(async () => {
        const name = tpl ? (state.lang === 'hi' ? tpl.name_hi : tpl.name_en) : inferred;
        showAiText(state.lang === 'hi' ? `समझ गया — ${name}.` : `Got it — ${name}.`);
        // Kick off the conductor after a beat
        setTimeout(() => stepConductor(null), 1000);
      }, 400);
    } else {
      // Couldn't infer — show chips again
      const reprompt = state.lang === 'hi'
        ? 'किस तरह का दस्तावेज़? नीचे चुनें या स्पष्ट बताएं।'
        : 'Which kind of document? Pick one below or say it more clearly.';
      showAiText(reprompt);
      renderTemplateChips();
      state.awaitingFirstReply = true;
      speakAndMaybeListen(reprompt);     // hands-free: ask again aloud + re-listen
    }
  } else {
    await stepConductor(text);
  }
}
$('#btn-send').addEventListener('click', sendMessage);
$('#composer-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
$('#composer-input').addEventListener('input', (e) => {
  $('#btn-send').disabled = !e.target.value.trim();
  e.target.style.height = 'auto';
  e.target.style.height = Math.min(200, e.target.scrollHeight) + 'px';
});

// ---- Voice: hands-free conversation (HeadnoteVoice) ----
// The assistant speaks each question (TTS); when hands-free is on it then
// auto-opens the mic, transcribes the reply (Web Speech, or the Whisper
// fallback on browsers without it) and sends it. #btn-mic is push-to-talk +
// barge-in. Reliable across Chrome / Safari / Firefox / in-app webviews.
const Voice = window.HeadnoteVoice;

function micUI(on) {
  state.micActive = on;
  $('#btn-mic').classList.toggle('is-recording', on);
}

// Read-back is scoped to hands-free mode so a quietly-typing lawyer never gets
// surprise audio. Speak `text` (unless muted) then auto-listen for the reply.
function speakAndMaybeListen(text) {
  const wantListen = state.handsFree;
  const wantSpeak  = state.handsFree && !state.ttsMuted && Voice && Voice.hasTTS && !!text;
  if (!wantSpeak) { setOrb('idle'); if (wantListen) startListening(); return; }
  setOrb('speaking');
  Voice.speak(text, { lang: state.lang, onEnd: () => { if (wantListen) startListening(); else setOrb('idle'); } });
}

// Speak with no follow-on listen (the final "document ready" line).
function sayOnly(text) {
  if (!state.handsFree || state.ttsMuted || !Voice || !Voice.hasTTS) return;
  setOrb('speaking');
  Voice.speak(text, { lang: state.lang, onEnd: () => setOrb('idle') });
}

// Open the mic for one spoken turn → drop the transcript into the composer and
// send it (same path as typing, so first-turn template inference and the
// conductor both work unchanged).
function startListening() {
  if (!Voice || !Voice.supported) {
    toast(state.lang === 'hi' ? 'इस ब्राउज़र में आवाज़ समर्थित नहीं' : 'Voice not supported here', 'err');
    return;
  }
  if (state.listenHandle) return;            // already listening
  micUI(true);
  setOrb('listening');
  state.listenHandle = Voice.dictate({
    mode: 'turn',
    lang: state.lang,
    getAuthHeaders: authHeaders,
    onInterim: (t) => {
      const inp = $('#composer-input');
      inp.value = t;
      $('#btn-send').disabled = !t.trim();
      inp.style.height = 'auto';
      inp.style.height = Math.min(200, inp.scrollHeight) + 'px';
    },
    onState: (s) => {
      if (s === 'listening') setOrb('listening');
      else if (s === 'processing') setOrb('thinking');   // Whisper round-trip
    },
    onFinal: (t) => {
      state.listenHandle = null;
      micUI(false);
      const text = (t || '').trim();
      if (text) {
        $('#composer-input').value = text;
        sendMessage();                       // → inference or conductor
      } else if (state.handsFree) {
        // Heard nothing — keep the conversation alive, listen again shortly.
        setOrb('idle');
        setTimeout(() => {
          if (state.handsFree && !state.listenHandle && !Voice.isSpeaking()) startListening();
        }, 500);
      } else {
        setOrb('idle');
      }
    },
    onError: (kind, msg) => handleVoiceError(kind, msg),
  });
}

function stopListening() {
  if (state.listenHandle) { try { state.listenHandle.stop(); } catch (e) {} state.listenHandle = null; }
  micUI(false);
}

function handleVoiceError(kind, msg) {
  stopListening();
  setOrb('idle');
  const hi = state.lang === 'hi';
  if (kind === 'denied') toast(hi ? 'माइक की अनुमति दें' : 'Allow microphone access', 'err');
  else if (kind === 'auth') { handleAuthError(401); return; }
  else if (kind === 'network') toast(hi ? 'नेटवर्क समस्या — टाइप करके भेजें' : 'Network issue — type your answer instead', 'err');
  else if (kind === 'unsupported') toast(hi ? 'इस ब्राउज़र में आवाज़ नहीं' : 'Voice not supported here', 'err');
  else if (kind === 'transcribe') toast((hi ? 'लिप्यंतरण विफल' : 'Transcription failed') + (msg ? ': ' + msg : ''), 'err');
  // 'no-speech' is silent by design.
}

// #btn-mic: barge-in if the assistant is talking, else toggle a listen turn.
$('#btn-mic').addEventListener('click', () => {
  if (Voice && Voice.isSpeaking()) { Voice.shutUp(); setOrb('idle'); startListening(); return; }
  if (state.listenHandle) stopListening();
  else startListening();
});

// Hands-free toggle: pre-warm the mic, then drive the loop from wherever we are.
$('#btn-handsfree').addEventListener('click', async () => {
  if (!Voice || !Voice.supported) {
    toast(state.lang === 'hi' ? 'इस ब्राउज़र में आवाज़ समर्थित नहीं' : 'Voice not supported here', 'err');
    return;
  }
  state.handsFree = !state.handsFree;
  updateVoiceUI();
  if (state.handsFree) {
    const ok = await Voice.ensureMicPermission();
    if (!ok) { state.handsFree = false; updateVoiceUI(); toast(state.lang === 'hi' ? 'माइक की अनुमति दें' : 'Allow microphone access', 'err'); return; }
    toast(state.lang === 'hi' ? 'हैंड्स-फ्री चालू — बस बोलिए' : 'Hands-free on — just speak', 'ok');
    // Engage the loop: if still on the first turn, (re)speak the current prompt
    // then listen; mid-conversation, just listen.
    if (!Voice.isSpeaking() && !state.listenHandle) {
      if (state.awaitingFirstReply) speakAndMaybeListen($('#ai-text').textContent || '');
      else startListening();
    }
  } else {
    Voice.shutUp();
    stopListening();
    setOrb('idle');
  }
});

// Speaker (assistant voice) mute toggle.
$('#btn-speaker').addEventListener('click', () => {
  state.ttsMuted = !state.ttsMuted;
  if (state.ttsMuted && Voice) Voice.shutUp();
  updateVoiceUI();
});

// Reflect hands-free / mute state on the two control buttons.
function updateVoiceUI() {
  const hi = state.lang === 'hi';
  const hf = $('#btn-handsfree');
  hf.classList.toggle('is-on', state.handsFree);
  hf.setAttribute('aria-pressed', state.handsFree ? 'true' : 'false');
  hf.title = state.handsFree
    ? (hi ? 'हैंड्स-फ्री बंद करें' : 'Turn off hands-free')
    : (hi ? 'हैंड्स-फ्री बातचीत — बोलकर ड्राफ्ट करें' : 'Hands-free — draft by talking');
  const sp = $('#btn-speaker');
  sp.classList.toggle('is-off', state.ttsMuted);
  sp.title = state.ttsMuted
    ? (hi ? 'सहायक की आवाज़ चालू करें' : 'Unmute assistant voice')
    : (hi ? 'सहायक की आवाज़ बंद करें' : 'Mute assistant voice');
  sp.innerHTML = state.ttsMuted
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>';
  sp.style.display = (Voice && Voice.hasTTS) ? '' : 'none';     // no TTS → hide mute
  // If voice is wholly unsupported, the hands-free pill can't help — dim it.
  if (!Voice || !Voice.supported) { hf.style.opacity = '0.45'; hf.title = hi ? 'इस ब्राउज़र में आवाज़ नहीं' : 'Voice not supported here'; }
}

// ---- Restart ----
$('#btn-restart').addEventListener('click', () => {
  if (!confirm(state.lang === 'hi' ? 'पुनः शुरू करें? सब कुछ खो जाएगा।' : 'Restart? Everything will be lost.')) return;
  if (Voice) Voice.shutUp();
  stopListening();
  state.docType = null;
  state.conversation = [];
  state.collected = {};
  state.document = null;
  state.awaitingFirstReply = true;
  $('#doc-overlay').classList.remove('is-open');
  $('#user-text').style.display = 'none';
  $('#composer-input').value = '';
  $('#btn-send').disabled = true;
  greetAndShowChips();
});

// ---- Language toggle ----
function switchLang(l) {
  state.autoLang = false;          // explicit choice → stop auto-detecting
  if (state.lang === l) return;
  state.lang = l;
  if (Voice) Voice.shutUp();
  stopListening();
  applyLang();
  updateVoiceUI();                 // re-localise control titles
  if (state.awaitingFirstReply) greetAndShowChips();
}
$('#lang-en').addEventListener('click', () => switchLang('en'));
$('#lang-hi').addEventListener('click', () => switchLang('hi'));

// ---- Initial greeting ----
function greetAndShowChips() {
  const greeting = state.lang === 'hi'
    ? 'आज क्या ड्राफ्ट करना है?'
    : 'What would you like to draft today?';
  showAiText(greeting);
  renderTemplateChips();
  // If hands-free is already on (e.g. after Restart), speak the greeting and
  // start listening for what to draft.
  if (state.handsFree) speakAndMaybeListen(greeting);
}

// ---- Persona prefill ----
// Silently fetches the lawyer's bar profile and seeds state.collected so
// the conductor never has to ask for advocate_name / enrolment_number / etc.
async function loadPersona() {
  try {
    const headers = await authHeaders();
    if (!headers['Authorization']) return; // not signed in yet
    const r = await fetch('/api/lawyer-profile', { headers });
    if (!r.ok) return;
    const data = await r.json();
    const MAP = {
      advocate_name:    'advocate_name',
      enrolment_number: 'enrolment_number',
      bar_council:      'bar_council',
      chamber_address:  'chamber_address',
      home_court:       'court_name',
    };
    Object.entries(MAP).forEach(([src, dst]) => {
      if (data[src]) state.collected[dst] = data[src];
    });
  } catch (_) {}
}

// ---- Boot ----
(async function init() {
  applyLang();
  updateVoiceUI();              // set speaker icon + control titles, hide if no TTS
  await Promise.all([loadTemplates(), loadPersona()]);
  greetAndShowChips();
})();
</script>
</body>
</html>
