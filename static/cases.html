<!doctype html>
<html lang="en">
<head>
  <script src="/static/analytics.js?v=20260630a"></script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<title>Matters — Headnote</title>
<script>if(location.protocol==='http:'&&location.hostname!=='localhost'&&!location.hostname.startsWith('127.')){location.replace(location.href.replace(/^http:/,'https:'));}</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/style.css?v=20260705a" />
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
<style>
  .hi{font-family:'Noto Sans Devanagari','Geist',sans-serif;}
  /* top bar: filter + actions */
  .bar{display:flex;gap:8px;align-items:center;margin-bottom:18px;}
  .bar .input{flex:1;}
  /* matter card — only what's scanned */
  .m{padding:15px 18px;}
  .m__head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .m__title{font-size:15px;font-weight:600;letter-spacing:-0.01em;line-height:1.3;}
  .nx{text-align:right;white-space:nowrap;flex:0 0 auto;}
  .nx b{font-family:'Geist Mono',monospace;font-size:13px;color:var(--ink);}
  .nx span{display:block;font-size:9px;text-transform:uppercase;letter-spacing:0.07em;color:var(--ink-3);margin-top:1px;}
  .m__meta{font-family:'Geist Mono',monospace;font-size:11.5px;color:var(--ink-2);margin-top:4px;}
  .m__sub{font-size:12px;color:var(--ink-3);margin-top:5px;line-height:1.45;}
  .m__sub .stg{color:var(--ink-2);}
  .m__foot{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line-2);}
  .m__client{font-size:12.5px;color:var(--ink-2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .m__client b{color:var(--ink);font-weight:600;}
  .addcli{background:none;border:0;color:var(--ink-3);font:inherit;font-size:12px;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px;}
  .addcli:hover{color:var(--ink);}
  .m__act{display:flex;gap:6px;align-items:center;position:relative;flex:0 0 auto;}
  .kebab{border:1px solid var(--line);background:var(--surface);border-radius:6px;width:32px;height:32px;cursor:pointer;color:var(--ink-3);font-size:15px;line-height:1;}
  .kebab:hover{border-color:var(--ink-3);color:var(--ink);}
  .menu{position:absolute;top:38px;right:0;background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow-lift);z-index:50;min-width:160px;padding:6px;display:none;}
  .menu.open{display:block;}
  .menu button{display:block;width:100%;text-align:left;border:0;background:none;font:inherit;font-size:13px;color:var(--ink);padding:8px 10px;border-radius:6px;cursor:pointer;}
  .menu button:hover{background:var(--soft);}
  .menu button.danger{color:var(--bad);}
  /* add / edit panel */
  .panel{display:none;margin-bottom:18px;} .panel.is-open{display:block;}
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .full{grid-column:1 / -1;} .fld{display:flex;flex-direction:column;gap:5px;}
  .fld label{font-family:'Geist Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--ink-3);}
  .fld .input{width:100%;}
  .more-wrap{display:none;} .more-wrap.is-open{display:block;}
  .more-toggle{background:none;border:0;color:var(--ink-2);font:inherit;font-size:12px;cursor:pointer;padding:0;margin-top:12px;text-decoration:underline;text-underline-offset:2px;}
  .consent{display:flex;gap:8px;align-items:center;font-size:12.5px;color:var(--ink-2);margin-top:12px;}
  .panel-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;}
</style>
</head>
<body class="auth-ready">
<a href="#main" class="skip-link">Skip to content</a>

<div class="shell">
  <aside class="sidebar">
    <div class="sidebar__brand"><a href="/" class="brand" aria-label="headnote home"><img src="/static/headnote-logo.svg" alt="headnote" class="brand__logo" style="height:20px;width:auto;display:block;" /></a></div>
    <nav class="sidebar__nav" aria-label="Primary">
      <a class="navitem" href="/app"><svg class="navicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg><span>research</span></a>
      <a class="navitem" href="/drafter"><svg class="navicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4z"/></svg><span>drafting</span></a>
      <button type="button" class="navitem is-active" aria-current="page"><svg class="navicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>matters</span></button>
      <a class="navitem" href="/recorder"><svg class="navicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3"/></svg><span>recorder</span></a>
      <a class="navitem" href="/documents"><svg class="navicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h6"/></svg><span>documents</span></a>
      <a class="navitem" href="/app"><svg class="navicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span>saved</span></a>
      <a class="navitem" href="/sections"><svg class="navicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg><span>IPC → BNS</span></a>
    </nav>
    <div class="sidebar__footer"><a class="footer-link" href="/pricing">pricing &amp; plans</a></div>
  </aside>

  <main id="main" class="main">
    <section class="view is-active" style="max-width:820px">
      <header class="topbar">
        <div class="topbar__title">matters</div>
        <div class="topbar__hint mono" id="hint">enter a CNR · draft in one click</div>
      </header>

      <div class="bar">
        <input id="filter" class="input" placeholder="Filter by party, CNR or court…" autocomplete="off" />
        <button class="btn" id="importBtn">Import by Bar ID</button>
        <button class="btn btn--primary" onclick="openAdd()">+ Add case</button>
      </div>

      <!-- add / edit panel -->
      <div class="case-card panel" id="panel">
        <div class="case-card__title" id="panelTitle" style="font-size:15px;margin-bottom:14px">Add a case</div>
        <div class="pgrid">
          <div class="fld full" id="cnrFld"><label>CNR</label><input id="i_cnr" class="input mono" placeholder="MPGW010000122021" autocomplete="off" spellcheck="false" /></div>
          <div class="fld"><label>Client name</label><input id="i_name" class="input" placeholder="optional" /></div>
          <div class="fld"><label>Mobile</label><input id="i_mobile" class="input mono" placeholder="for reminders" /></div>
        </div>
        <button class="more-toggle" onclick="toggleMore()">more client details (for autofill)</button>
        <div class="more-wrap" id="more">
          <div class="pgrid" style="margin-top:12px">
            <div class="fld"><label>Email</label><input id="i_email" class="input mono" /></div>
            <div class="fld"><label>Father / Husband</label><input id="i_father" class="input" /></div>
            <div class="fld"><label>Age</label><input id="i_age" class="input mono" /></div>
            <div class="fld"><label>Occupation</label><input id="i_occupation" class="input" /></div>
            <div class="fld full"><label>Address</label><input id="i_address" class="input" /></div>
          </div>
          <label class="consent"><input type="checkbox" id="i_consent" /> client consents to hearing reminders</label>
        </div>
        <div class="panel-foot">
          <button class="btn" onclick="closePanel()">Cancel</button>
          <button class="btn btn--primary" id="panelSave" onclick="submitPanel()">Save</button>
        </div>
      </div>

      <div class="results" id="rows"></div>
      <div class="empty" id="empty" style="display:none">
        <h2>No matters yet</h2>
        <p>Add a case by its CNR and it becomes a one-click, pre-filled draft. <a href="#" onclick="openAdd();return false" style="border-bottom:1px solid var(--line)">Add one</a>.</p>
      </div>
    </section>
  </main>
</div>

<div class="toasts" id="toasts"></div>

<script>
const $ = s => document.querySelector(s);
let CASES = [], editingId = null;

function authToken(){ try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i);
  if(/sb-.*-auth-token/.test(k)){ const v=JSON.parse(localStorage.getItem(k)); if(v&&v.access_token) return v.access_token; if(Array.isArray(v)&&v[0]) return v[0]; } } }catch(e){} return null; }
function H(json){ const h=json?{'Content-Type':'application/json'}:{}; const t=authToken(); if(t) h.Authorization='Bearer '+t; return h; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(m,kind){ const t=document.createElement('div'); t.className='toast'+(kind?' toast--'+kind:''); t.textContent=m; $('#toasts').appendChild(t); setTimeout(()=>t.remove(),3200); }

function openAdd(){ editingId=null; $('#panelTitle').textContent='Add a case'; $('#cnrFld').style.display='';
  ['cnr','name','mobile','email','father','age','occupation','address'].forEach(k=>$('#i_'+k).value=''); $('#i_consent').checked=false;
  $('#panel').classList.add('is-open'); $('#i_cnr').focus(); }
function editClient(id){ const c=CASES.find(x=>x.id===id); if(!c) return; editingId=id; const cl=(c.case_json&&c.case_json.client)||{};
  $('#panelTitle').textContent='Client — '+(c.case_title||c.cnr); $('#cnrFld').style.display='none';
  $('#i_name').value=cl.name||''; $('#i_mobile').value=cl.mobile||''; $('#i_email').value=cl.email||'';
  $('#i_father').value=cl.father||''; $('#i_age').value=cl.age||''; $('#i_occupation').value=cl.occupation||''; $('#i_address').value=cl.address||''; $('#i_consent').checked=!!cl.consent;
  $('#more').classList.add('is-open'); $('#panel').classList.add('is-open'); $('#i_name').focus(); }
function closePanel(){ $('#panel').classList.remove('is-open'); }
function toggleMore(){ $('#more').classList.toggle('is-open'); }
function clientPayload(){ const g=k=>$('#i_'+k).value.trim(); return { name:g('name'),mobile:g('mobile'),email:g('email'),father:g('father'),age:g('age'),occupation:g('occupation'),address:g('address'),consent:$('#i_consent').checked }; }

async function submitPanel(){ const btn=$('#panelSave'); btn.disabled=true;
  try{
    if(editingId){ const r=await fetch(`/api/cases/${editingId}/client`,{method:'PATCH',headers:H(true),body:JSON.stringify(clientPayload())});
      if(!r.ok) throw new Error((await r.json()).detail||'save failed'); toast('Client saved','success');
    } else { const cnr=$('#i_cnr').value.trim(); if(!cnr){ toast('Enter a CNR','error'); btn.disabled=false; return; }
      const cl=clientPayload(); const hasClient=Object.values(cl).some(v=>v&&v!==false); const body={cnr}; if(hasClient) body.client=cl;
      const r=await fetch('/api/cases/add-cnr',{method:'POST',headers:H(true),body:JSON.stringify(body)});
      if(!r.ok) throw new Error((await r.json()).detail||'lookup failed'); toast('Case added','success'); }
    closePanel(); await load();
  }catch(e){ toast(e.message,'error'); } finally{ btn.disabled=false; } }

async function draftFor(id, story){ toast('Building '+story+' draft…');
  try{ const r=await fetch(`/api/cases/${id}/draft/${story}`,{method:'POST',headers:H()}); const d=await r.json();
    if(!r.ok) throw new Error(d.detail||'draft failed'); window.open(d.review_url,'_blank'); toast('Draft ready','success');
  }catch(e){ toast(e.message,'error'); } }

async function removeCase(id){ if(!confirm('Remove this matter?')) return; await fetch('/api/cases/'+id,{method:'DELETE',headers:H()}); load(); }

function toggleMenu(id,ev){ ev.stopPropagation(); document.querySelectorAll('.menu.open').forEach(m=>{ if(m.id!=='menu-'+id) m.classList.remove('open'); }); $('#menu-'+id).classList.toggle('open'); }
document.addEventListener('click',()=>document.querySelectorAll('.menu.open').forEach(m=>m.classList.remove('open')));

function card(c){
  const cj=c.case_json||{}, cl=cj.client||{}, sug=c.suggested||[];
  const primary=sug[0]||{story_id:'bail',label:'Bail'}, other=sug[1]||{story_id:'discharge',label:'Discharge'};
  const court=(c.court_name||cj.court_name||'').replace(/^न्यायालय\s*/,'');
  const meta=[`<span>${esc(c.cnr)}</span>`]; if(court) meta.push(`<span class="hi">${esc(court)}</span>`);
  if(c.case_number) meta.push(`<span>${esc(c.case_number)}/${esc(c.case_year||'')}</span>`);
  if(c.source==='mock') meta.push('<span>sample</span>');
  const secs=(cj.sections||[]).join(', ');
  const client = cl.name
    ? `<span class="hi"><b>${esc(cl.name)}</b></span>${cl.mobile?` · ${esc(cl.mobile)}`:''}`
    : `<button class="addcli" onclick="editClient('${c.id}')">+ add client</button>`;
  return `<div class="case-card m">
    <div class="m__head">
      <div class="m__title hi">${esc(c.case_title||c.cnr)}</div>
      ${c.next_hearing_date?`<div class="nx"><b>${esc(c.next_hearing_date)}</b><span>next hearing</span></div>`:''}
    </div>
    <div class="m__meta">${meta.join(' · ')}</div>
    ${(secs||c.stage)?`<div class="m__sub hi">${esc(secs)}${c.stage?` · <span class="stg">${esc(c.stage)}</span>`:''}</div>`:''}
    <div class="m__foot">
      <div class="m__client">${client}</div>
      <div class="m__act">
        <button class="btn btn--primary" title="${esc(primary.reason||'')}" onclick="draftFor('${c.id}','${primary.story_id}')">Draft ${esc(primary.label)}</button>
        <button class="kebab" onclick="toggleMenu('${c.id}',event)" aria-label="more">⋯</button>
        <div class="menu" id="menu-${c.id}">
          <button onclick="draftFor('${c.id}','${other.story_id}')">Draft ${esc(other.label)}</button>
          <button onclick="editClient('${c.id}')">${cl.name?'Edit':'Add'} client</button>
          <button class="danger" onclick="removeCase('${c.id}')">Remove matter</button>
        </div>
      </div>
    </div>
  </div>`;
}

function render(){
  const q=($('#filter').value||'').toLowerCase().trim();
  const list=q ? CASES.filter(c=>JSON.stringify(c).toLowerCase().includes(q)) : CASES;
  $('#rows').innerHTML=list.map(card).join('');
  $('#hint').textContent = CASES.length ? `${CASES.length} ${CASES.length===1?'matter':'matters'} · draft in one click` : 'enter a CNR · draft in one click';
  $('#empty').style.display=CASES.length?'none':'block';
}

async function load(){ try{ const r=await fetch('/api/cases',{headers:H()}); CASES=(await r.json()).items||[]; render(); }
  catch(e){ toast('Could not load matters: '+e.message,'error'); } }

$('#filter').addEventListener('input',render);
$('#importBtn').addEventListener('click',()=>toast('Import by Bar ID ships with the live key — pulls your whole docket at once.'));
load();
</script>
</body>
</html>
