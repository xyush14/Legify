// ---- Form rendering — groups fields into bail-style sections ----
// ---- Universal "auto-fill from a document" uploader ----
// OCR via Groq Llama-4-Scout vision (DeepSeek fallback) — NEVER Claude. Adapts
// to whatever fields THIS template declares (skips advocate/filing/court boiler-
// plate), so every application gets document auto-fill on the same principle,
// with no per-template wiring. The lawyer always reviews the filled values.
function _ocrTargetFields() {
  const SKIP_SECTIONS = new Set(['advocate', 'filing']);
  const SKIP_KEYS = new Set(['advocate_name', 'place', 'filing_date', 'court_name']);
  return (state.template.fields || [])
    .filter(f => !SKIP_SECTIONS.has(f.section) && !SKIP_KEYS.has(f.key))
    .map(f => ({ key: f.key, label: f.label_en, hint: f.hint || '' }));
}

function renderAutoFillZone() {
  const targets = _ocrTargetFields();
  if (!targets.length) return null;          // nothing OCR-fillable → no zone
  const isHi = state.lang === 'hi';
  if (!document.getElementById('autofill-style')) {
    const st = document.createElement('style');
    st.id = 'autofill-style';
    st.textContent =
      '.autofill{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 14px;margin:0 0 16px;'
      + 'border:1.5px dashed var(--gold,#c9a96e);border-radius:12px;background:rgba(201,169,110,.07);}'
      + '.autofill__txt{font-size:13px;color:var(--muted,#666);flex:1;min-width:170px;line-height:1.5;}'
      + '.autofill__txt b{color:var(--ink,#222);font-weight:600;}'
      + '.autofill__btn{border:1px solid var(--gold,#c9a96e);background:var(--gold,#c9a96e);color:#fff;'
      + 'border-radius:8px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}'
      + '.autofill__btn:hover{filter:brightness(.95);}.autofill__btn:disabled{opacity:.6;cursor:wait;}'
      + '.autofill__status{font-size:12px;color:var(--muted,#777);}';
    document.head.appendChild(st);
  }
  const zone = ce('div', { className: 'autofill' });
  const txt = ce('div', { className: 'autofill__txt' });
  txt.innerHTML = isHi
    ? '<b>📎 दस्तावेज़ से ऑटो-भरें</b> — FIR / आदेश / प्रमाणपत्र / रसीद अपलोड करें; फ़ील्ड अपने-आप भर जाएँगे (जाँच ज़रूर करें)।'
    : '<b>📎 Auto-fill from a document</b> — upload the FIR / order / certificate / receipt; the fields fill themselves (always review).';
  const btn = ce('button', { type: 'button', className: 'autofill__btn' });
  btn.textContent = isHi ? 'दस्तावेज़ चुनें' : 'Choose document';
  const status = ce('span', { className: 'autofill__status' });
  const input = ce('input', { type: 'file' });
  input.accept = 'image/*,application/pdf';
  input.multiple = true;
  input.style.display = 'none';
  btn.addEventListener('click', () => input.click());
  input.addEventListener('change', async () => {
    const fileList = Array.from(input.files || []);
    if (!fileList.length) return;
    btn.disabled = true;
    status.textContent = isHi ? '⏳ पढ़ा जा रहा है…' : '⏳ Reading…';
    try {
      const fd = new FormData();
      fileList.slice(0, 8).forEach(f => fd.append('files', f));
      fd.append('fields_json', JSON.stringify(_ocrTargetFields()));
      fd.append('doc_label', state.template.name_en || '');
      const r = await fetch('/api/draft/ocr-generic', {
        method: 'POST', headers: { ...(await authHeaders()) }, body: fd,
      });
      if (await handleAuthError(r.status)) return;
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || ('HTTP ' + r.status));
      const ex = data.extracted || {};
      let filled = 0;
      Object.entries(ex).forEach(([k, v]) => {
        if (v == null || String(v).trim() === '') return;
        const el = $(`#f_${k}`);
        if (el) { el.value = String(v); state.fields[k] = String(v); filled++; }
      });
      saveToLocalStorage();
      updateProgress(); refreshDepends();
      // Paint the filled values into the live preview IMMEDIATELY — don't wait
      // on the 1.5s auto-regen debounce. Right after an OCR upload (which itself
      // takes a few seconds) a preview still showing empty placeholders reads as
      // "the upload didn't work". Bump _editVersion first so the other language's
      // cached doc is invalidated, then force one render (initial:true bypasses
      // the empty-form guard; non-silent so any render error surfaces).
      if (filled) { state._editVersion++; generateDocument({ initial: true }); }
      status.textContent = '';
      toast(filled
        ? (isHi ? `✓ ${filled} फ़ील्ड भरे गए — कृपया जाँच लें` : `✓ Filled ${filled} fields — please review`)
        : (isHi ? 'दस्तावेज़ से कुछ मेल नहीं खाया — हाथ से भरें' : 'Nothing matched — fill manually'),
        filled ? 'ok' : 'warn', 3500);
    } catch (e) {
      status.textContent = '';
      toast((isHi ? 'OCR विफल: ' : 'OCR failed: ') + e.message, 'err', 4000);
    } finally {
      btn.disabled = false;
      input.value = '';
    }
  });
  zone.appendChild(txt); zone.appendChild(btn); zone.appendChild(status); zone.appendChild(input);
  return zone;
}

function renderForm() {
  const container = $('#form-container');
  container.innerHTML = '';
  const tpl = state.template;
  if (!tpl) return;

  // Readiness meter — fills as the essentials are answered.
  const prog = ce('div', { className: 'form-progress', id: 'form-progress' });
  prog.innerHTML = '<div class="form-progress__track"><div class="form-progress__fill"></div></div><div class="form-progress__label"></div>';
  container.appendChild(prog);

  // "Start from a document" strip — wraps the existing OCR auto-fill so the
  // panel opens on a clear first action instead of a wall of empty boxes.
  container.appendChild(renderStartStrip(tpl));

  // Group fields by their declared section, preserving first-occurrence order
  const sectionOrder = [];
  const groups = {};
  (tpl.fields || []).forEach(f => {
    const s = f.section || 'matter';
    if (!groups[s]) { groups[s] = []; sectionOrder.push(s); }
    groups[s].push(f);
  });

  // Sections that start collapsed (pre-filled from advocate profile, rarely need editing)
  const COLLAPSIBLE_SECTIONS = new Set(['advocate', 'filing']);

  sectionOrder.forEach((sectionId, i) => {
    const isCollapsible = COLLAPSIBLE_SECTIONS.has(sectionId);
    const sec = ce('div', { className: 'section' + (isCollapsible ? ' section--collapsed' : '') });

    const eyebrow = ce('div', { className: 'section__eyebrow' });
    eyebrow.dataset.en = `SECTION ${i + 1}`;
    eyebrow.dataset.hi = `अनुभाग ${i + 1}`;
    eyebrow.textContent = state.lang === 'hi' ? `अनुभाग ${i + 1}` : `SECTION ${i + 1}`;

    const lab = SECTION_LABELS[sectionId] || {en: sectionId, hi: sectionId};

    if (isCollapsible) {
      // Wrap title in a toggle button
      const toggle = ce('button', { className: 'section__toggle', type: 'button' });
      const title = ce('h3', { className: 'section__title', style: 'margin:0;' });
      title.dataset.en = lab.en; title.dataset.hi = lab.hi;
      title.textContent = state.lang === 'hi' ? lab.hi : lab.en;
      toggle.appendChild(title);
      // Chevron icon
      const icon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      icon.setAttribute('viewBox', '0 0 24 24');
      icon.setAttribute('fill', 'none');
      icon.setAttribute('stroke', 'currentColor');
      icon.setAttribute('stroke-width', '2');
      icon.setAttribute('class', 'section__toggle-icon');
      icon.innerHTML = '<polyline points="6 9 12 15 18 9"/>';
      toggle.appendChild(icon);
      toggle.addEventListener('click', () => sec.classList.toggle('section--collapsed'));
      sec.appendChild(eyebrow);
      sec.appendChild(toggle);
    } else {
      const title = ce('h3', { className: 'section__title' });
      title.dataset.en = lab.en; title.dataset.hi = lab.hi;
      title.textContent = state.lang === 'hi' ? lab.hi : lab.en;
      sec.appendChild(eyebrow);
      sec.appendChild(title);
    }

    const body = ce('div', { className: 'section__body' });
    if (sectionId === 'grounds') renderGroundsInto(body, groups[sectionId]);
    else renderSectionInto(body, groups[sectionId]);
    sec.appendChild(body);
    container.appendChild(sec);
  });

  updateProgress();
  refreshDepends();
}

// Essentials first; tuck two-or-more optional fields behind an inline expander
// so the section leads with what matters. Never hides required/select/list inputs.
function renderSectionInto(body, fields) {
  const isEss = f => f.required || f.type === 'select' || f.type === 'section_list';
  const ess = fields.filter(isEss);
  const opt = fields.filter(f => !isEss(f));
  if (!ess.length || opt.length < 2) {   // nothing to gain — render all inline
    fields.forEach(f => body.appendChild(renderField(f)));
    return;
  }
  ess.forEach(f => body.appendChild(renderField(f)));
  const more = ce('div', { className: 'more-wrap' });
  const labMore = state.lang === 'hi' ? `+ ${opt.length} वैकल्पिक विवरण` : `+ ${opt.length} optional details`;
  const labLess = state.lang === 'hi' ? '− कम दिखाएँ' : '− show less';
  const btn = ce('button', { className: 'more-toggle', type: 'button', textContent: labMore });
  const inner = ce('div', { className: 'more-inner' });
  opt.forEach(f => inner.appendChild(renderField(f)));
  btn.addEventListener('click', () => {
    more.classList.toggle('open');
    btn.textContent = more.classList.contains('open') ? labLess : labMore;
    refreshDepends();
  });
  more.appendChild(btn); more.appendChild(inner); body.appendChild(more);
}

// Grounds become a pick-your-arguments deck: each toggle is a selectable card
// (label + its one-line legal description), with a free-text "add your own".
function renderGroundsInto(body, fields) {
  const toggles = fields.filter(f => f.type === 'toggle');
  const custom = fields.find(f => f.key === 'custom_grounds');
  const others = fields.filter(f => f.type !== 'toggle' && f.key !== 'custom_grounds');
  others.forEach(f => body.appendChild(renderField(f)));
  if (toggles.length) {
    const sub = ce('div', { className: 'grounds-sub' });
    sub.dataset.en = 'Choose the grounds that apply'; sub.dataset.hi = 'लागू आधार चुनें';
    sub.textContent = state.lang === 'hi' ? 'लागू आधार चुनें' : 'Choose the grounds that apply';
    body.appendChild(sub);
    const deck = ce('div', { className: 'grounds-deck' });
    toggles.forEach(f => deck.appendChild(renderGroundCard(f)));
    body.appendChild(deck);
  }
  if (custom) {
    const wrap = ce('div', { className: 'gadd-wrap' });
    const btn = ce('button', { className: 'gadd', type: 'button' });
    btn.dataset.en = '＋ Add a ground in your own words';
    btn.dataset.hi = '＋ अपने शब्दों में आधार जोड़ें';
    btn.textContent = state.lang === 'hi' ? btn.dataset.hi : btn.dataset.en;
    const holder = ce('div', { className: 'gadd-inner' });
    holder.appendChild(renderField(custom));
    const cur = state.fields[custom.key];
    if (cur && String(cur).trim()) wrap.classList.add('open');
    btn.addEventListener('click', () => wrap.classList.toggle('open'));
    wrap.appendChild(btn); wrap.appendChild(holder); body.appendChild(wrap);
  }
}

function renderGroundCard(f) {
  const card = ce('div', { className: 'gcard' });
  if (f.depends) card.dataset.depends = f.depends;
  const cb = ce('input', { type: 'checkbox' });
  cb.id = `f_${f.key}`; cb.dataset.field = f.key; cb.style.display = 'none';
  const cur = state.fields[f.key];
  cb.checked = (cur === true || cur === 'true' || (cur === undefined && !!f.default));
  if (cb.checked) { state.fields[f.key] = true; card.classList.add('on'); }
  const box = ce('span', { className: 'gcard__box' });
  const txt = ce('div', { className: 'gcard__txt' });
  const t = ce('div', { className: 'gcard__t' });
  t.dataset.en = f.label_en; t.dataset.hi = f.label_hi;
  t.textContent = state.lang === 'hi' ? f.label_hi : f.label_en;
  txt.appendChild(t);
  if (f.hint) { const d = ce('div', { className: 'gcard__d' }); d.textContent = f.hint; txt.appendChild(d); }
  card.appendChild(cb); card.appendChild(box); card.appendChild(txt);
  card.addEventListener('click', () => {
    cb.checked = !cb.checked;
    card.classList.toggle('on', cb.checked);
    _commit(f.key, cb.checked);
  });
  return card;
}

// The "how do you want to start" strip. Re-uses the existing OCR auto-fill /
// specialised upload zones (no change to that logic) under the "document" mode.
function renderStartStrip(tpl) {
  const hi = state.lang === 'hi';
  const card = ce('div', { className: 'startcard' });
  const h = ce('div', { className: 'startcard__h' });
  h.dataset.en = 'Start from a document, not a blank form';
  h.dataset.hi = 'खाली फ़ॉर्म नहीं — दस्तावेज़ से शुरू करें';
  h.textContent = hi ? h.dataset.hi : h.dataset.en;
  const p = ce('div', { className: 'startcard__p' });
  p.dataset.en = 'Upload the FIR / order / judgment and the details fill themselves — or dictate, or fill in by hand.';
  p.dataset.hi = 'FIR / आदेश / निर्णय अपलोड करें — विवरण अपने-आप भर जाएँगे; या बोलकर, या हाथ से भरें।';
  p.textContent = hi ? p.dataset.hi : p.dataset.en;
  card.appendChild(h); card.appendChild(p);

  const modes = ce('div', { className: 'startmodes' });
  const sbody = ce('div', { className: 'startbody' });
  const defs = [
    { m: 'doc',   t: [hi ? 'दस्तावेज़ से' : 'From a document', hi ? 'ऑटो-भरें' : 'auto-fill'], icon: '<path d="M14 3v5h5M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>' },
    { m: 'voice', t: [hi ? 'बोलकर' : 'Dictate', hi ? 'हिन्दी / EN' : 'हिन्दी / EN'], icon: '<rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/>' },
    { m: 'type',  t: [hi ? 'हाथ से' : 'Fill in', hi ? 'स्वयं' : 'by hand'], icon: '<path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>' },
  ];
  function setMode(m) {
    modes.querySelectorAll('.startmode').forEach(el => el.classList.toggle('on', el.dataset.m === m));
    sbody.innerHTML = '';
    if (m === 'doc') {
      if (Array.isArray(tpl.uploads) && tpl.uploads.length) tpl.uploads.forEach(u => sbody.appendChild(renderUploadZone(u)));
      else { const az = renderAutoFillZone(); if (az) sbody.appendChild(az); }
    } else {
      const hint = ce('div', { className: 'starthint' });
      hint.textContent = m === 'voice'
        ? (hi ? 'नीचे किसी भी बड़े खाने पर 🎙️ दबाकर बोलें — हिन्दी या अंग्रेज़ी।' : 'Tap the 🎙️ on any long field below to dictate — Hindi or English.')
        : (hi ? 'नीचे दिए गए खाने भरें।' : 'Fill in the fields below.');
      sbody.appendChild(hint);
    }
  }
  defs.forEach(d => {
    const b = ce('button', { className: 'startmode', type: 'button' });
    b.dataset.m = d.m;
    b.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">${d.icon}</svg><b>${esc(d.t[0])}</b><span>${esc(d.t[1])}</span>`;
    b.addEventListener('click', () => setMode(d.m));
    modes.appendChild(b);
  });
  card.appendChild(modes); card.appendChild(sbody);
  setMode('doc');
  return card;
}

function _commit(key, val) { state.fields[key] = val; saveToLocalStorage(); scheduleAutoRegen(); updateProgress(); refreshDepends(); }

// show/hide conditional (depends) fields based on their controlling toggle
function refreshDepends() {
  document.querySelectorAll('#form-container [data-depends]').forEach(el => {
    const v = state.fields[el.dataset.depends];
    el.style.display = (v === true || v === 'true') ? '' : 'none';
  });
}

function renderField(f) {
  const wrap = ce('div', { className: 'field' });
  if (f.depends) wrap.dataset.depends = f.depends;   // reveal only when its toggle is ON

  // ── TOGGLE → premium switch (grounds / reliefs) ──
  if (f.type === 'toggle') {
    wrap.className = 'field field--toggle';
    const row = ce('label', { className: 'toggle-row' });
    const sw = ce('span', { className: 'switch' });
    const cb = ce('input', { type: 'checkbox' });
    cb.id = `f_${f.key}`; cb.dataset.field = f.key;
    const cur = state.fields[f.key];
    cb.checked = (cur === true || cur === 'true' || (cur === undefined && !!f.default));
    if (cb.checked) state.fields[f.key] = true;
    cb.addEventListener('change', () => _commit(f.key, cb.checked));
    sw.appendChild(cb); sw.appendChild(ce('span', { className: 'switch__knob' }));
    const span = ce('span', { className: 'toggle-label', textContent: state.lang === 'hi' ? f.label_hi : f.label_en });
    span.dataset.en = f.label_en; span.dataset.hi = f.label_hi;
    row.appendChild(sw); row.appendChild(span); wrap.appendChild(row);
    return wrap;
  }

  const label = ce('label');
  const labText = state.lang === 'hi' ? f.label_hi : f.label_en;
  label.innerHTML = esc(labText) + (f.required ? ' <span class="req-star">★</span>' : '');
  label.dataset.en = f.label_en + (f.required ? ' ★' : '');
  label.dataset.hi = f.label_hi + (f.required ? ' ★' : '');
  wrap.appendChild(label);

  // ── SECTION-LIST → removable chips (धाराएँ / offences) ──
  if (f.type === 'section_list') {
    wrap.appendChild(buildChips(f));
    if (f.hint) wrap.appendChild(ce('div', { className: 'field__hint', textContent: f.hint }));
    return wrap;
  }

  // ── SELECT → dropdown ──
  if (f.type === 'select' && Array.isArray(f.options) && f.options.length) {
    const sel = ce('select'); sel.id = `f_${f.key}`; sel.dataset.field = f.key;
    f.options.forEach(o => { const v = (o && o.value != null) ? o.value : o; sel.appendChild(ce('option', { value: v, textContent: (o && o.label) || v })); });
    if (state.fields[f.key] == null && f.default != null) state.fields[f.key] = f.default;
    sel.value = state.fields[f.key] || '';
    sel.addEventListener('change', () => _commit(f.key, sel.value));
    wrap.appendChild(sel);
    if (f.hint) wrap.appendChild(ce('div', { className: 'field__hint', textContent: f.hint }));
    return wrap;
  }

  // ── text / name / date / number / money / longtext / address ──
  const isLong = f.type === 'longtext' || f.type === 'address';
  const fieldEl = isLong ? ce('textarea', { rows: 3 }) : ce('input', { type: 'text' });
  fieldEl.id = `f_${f.key}`;
  fieldEl.dataset.field = f.key;
  if (f.type === 'date') fieldEl.placeholder = state.lang === 'hi' ? 'दिन/माह/वर्ष' : 'DD/MM/YYYY';
  else fieldEl.placeholder = (state.lang === 'hi' ? f.label_hi : f.label_en).replace(' ★', '');
  if (f.type === 'number' || f.type === 'money') fieldEl.inputMode = 'numeric';
  fieldEl.value = state.fields[f.key] || '';
  fieldEl.addEventListener('input', () => _commit(f.key, fieldEl.value));

  if (f.type === 'money') {
    const m = ce('div', { className: 'money-field' });
    m.appendChild(ce('span', { className: 'money-rs', textContent: '₹' }));
    m.appendChild(fieldEl); wrap.appendChild(m);
  } else if (isLong) {
    const voiceWrap = ce('div', { className: 'voice-field' });
    voiceWrap.appendChild(fieldEl);
    attachPolishBtn(fieldEl, voiceWrap, f);
    attachVoiceMic(fieldEl, voiceWrap);
    wrap.appendChild(voiceWrap);
  } else {
    wrap.appendChild(fieldEl);
  }

  if (f.hint) wrap.appendChild(ce('div', { className: 'field__hint', textContent: f.hint }));
  return wrap;
}

// ── chip input for धाराएँ / offences (section_list) ──
function buildChips(f) {
  const box = ce('div', { className: 'chips' });
  const raw = state.fields[f.key];
  const list = (Array.isArray(raw) ? raw : String(raw || '').split(',')).map(s => String(s).trim()).filter(Boolean);
  const inp = ce('input', { type: 'text', className: 'chips__input' });
  inp.placeholder = state.lang === 'hi' ? 'धारा जोड़ें — Enter' : 'add section — Enter';
  const sync = () => { state.fields[f.key] = list.join(', '); saveToLocalStorage(); scheduleAutoRegen(); updateProgress(); draw(); };
  function draw() {
    box.querySelectorAll('.chip').forEach(c => c.remove());
    list.forEach((s, i) => {
      const c = ce('span', { className: 'chip' });
      c.appendChild(ce('span', { textContent: s }));
      const x = ce('button', { type: 'button', className: 'chip__x', textContent: '×' });
      x.addEventListener('click', () => { list.splice(i, 1); sync(); });
      c.appendChild(x); box.insertBefore(c, inp);
    });
  }
  const add = () => { const v = inp.value.trim().replace(/,$/, ''); if (v) { list.push(v); inp.value = ''; sync(); } };
  inp.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); add(); } });
  inp.addEventListener('blur', add);
  box.appendChild(inp); draw();
  return box;
}

// ── live completeness meter (required fields filled) ──
function updateProgress() {
  const bar = document.getElementById('form-progress'); if (!bar) return;
  const visible = f => !f.depends || state.fields[f.depends] === true || state.fields[f.depends] === 'true';
  const reqd = (state.template && state.template.fields || []).filter(f => f.required && visible(f));
  if (!reqd.length) { bar.style.display = 'none'; return; }
  const done = reqd.filter(f => { const v = state.fields[f.key]; return v != null && String(v).trim() !== ''; }).length;
  const pct = Math.round(done / reqd.length * 100);
  bar.style.display = '';
  bar.querySelector('.form-progress__fill').style.width = pct + '%';
  const lbl = bar.querySelector('.form-progress__label');
  lbl.textContent = state.lang === 'hi' ? `${done} / ${reqd.length} आवश्यक विवरण` : `${done} / ${reqd.length} essentials`;
  bar.classList.toggle('is-complete', done === reqd.length);
}

// ---- ✨ Polish button — refines free-form text into formal legal prose ----
// Sits next to the voice mic on every long-text field. One tap → server-side
// LLM cleans up grammar, removes filler ("मतलब", "um"), bumps register to
// court-Hindi or formal Indian-English. Lawyer keeps editing right after.
function attachPolishBtn(fieldEl, wrap, f) {
  const btn = ce('button', { type: 'button', className: 'polish-btn' });
  btn.setAttribute('aria-label', state.lang === 'hi' ? 'AI से ठीक करें' : 'Polish with AI');
  btn.setAttribute('title',     state.lang === 'hi' ? 'AI से ठीक करें (व्याकरण, औपचारिकता)' : 'Polish with AI (grammar, formality)');
  btn.textContent = '✨';
  btn.addEventListener('click', async (e) => {
    e.preventDefault();
    const text = (fieldEl.value || '').trim();
    if (!text || text.length < 12) {
      toast(state.lang === 'hi' ? 'कम से कम कुछ लिखें फिर पॉलिश करें' : 'Type something first, then polish', 'warn');
      return;
    }
    btn.classList.add('polish-btn--busy');
    btn.disabled = true;
    btn.textContent = '⋯';
    try {
      const headers = { 'Content-Type': 'application/json', ...(await authHeaders()) };
      const r = await fetch('/api/draft/polish-text', {
        method: 'POST', headers,
        body: JSON.stringify({
          text,
          field_key:   f.key,
          field_label: state.lang === 'hi' ? f.label_hi : f.label_en,
          doc_type:    state.docType,
          lang:        state.lang,
        }),
      });
      if (await handleAuthError(r.status)) return;
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
      if (data.polished && data.polished !== text) {
        fieldEl.value = data.polished;
        state.fields[f.key] = data.polished;
        saveToLocalStorage();
        scheduleAutoRegen();
        toast(state.lang === 'hi' ? '✓ AI ने ठीक कर दिया' : '✓ Polished with AI', 'ok');
      } else {
        toast(state.lang === 'hi' ? 'पहले से ठीक है' : 'Looks already polished', 'ok');
      }
    } catch (err) {
      toast('Polish failed: ' + err.message, 'err', 4000);
    } finally {
      btn.classList.remove('polish-btn--busy');
      btn.disabled = false;
      btn.textContent = '✨';
    }
  });
  wrap.appendChild(btn);
}

// ---- Voice mic (shared HeadnoteVoice engine) ----
// Tap to dictate into a long-text field. Web Speech where available, else a
// MediaRecorder → /api/draft/transcribe (Groq Whisper) fallback — so the mic
// renders and works on every browser (Firefox, in-app webviews, Safari), not
// just Chrome. Each final phrase is appended and an 'input' event is fired so
// the existing _commit path (save + live preview regen) runs unchanged.
function attachVoiceMic(fieldEl, wrap) {
  const V = window.HeadnoteVoice;
  if (!V || !V.supported) return;           // no STT at all → no mic button
  const btn = ce('button', { type: 'button', className: 'voice-mic' });
  btn.setAttribute('aria-label', state.lang === 'hi' ? 'आवाज़ से लिखें' : 'Voice input');
  btn.setAttribute('aria-pressed', 'false');
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    <line x1="12" y1="19" x2="12" y2="23"/>
    <line x1="8" y1="23" x2="16" y2="23"/>
  </svg>`;
  let handle = null;

  function appendText(t) {
    if (!t) return;
    const cur = (fieldEl.value || '').trim();
    const sep = cur && !/[\s।.,?!\-]$/.test(cur) ? ' ' : '';
    fieldEl.value = cur + sep + t;
    fieldEl.dispatchEvent(new Event('input', { bubbles: true }));   // → _commit (save + regen)
  }
  function reset() {
    handle = null;
    btn.classList.remove('voice-mic--rec', 'voice-mic--proc');
    btn.setAttribute('aria-pressed', 'false');
  }

  btn.addEventListener('click', (e) => {
    e.preventDefault();
    if (handle) { try { handle.stop(); } catch (_) {} return; }   // tap again to stop
    btn.classList.add('voice-mic--rec');
    btn.setAttribute('aria-pressed', 'true');
    handle = V.dictate({
      mode: 'continuous',
      lang: state.lang,
      getAuthHeaders: authHeaders,
      onFinal: (t) => appendText(t),
      onState: (s) => {
        if (s === 'listening') { btn.classList.add('voice-mic--rec'); btn.classList.remove('voice-mic--proc'); }
        else if (s === 'processing') { btn.classList.add('voice-mic--proc'); btn.classList.remove('voice-mic--rec'); }
        else if (s === 'stopped') reset();
      },
      onError: (kind, msg) => {
        const hi = state.lang === 'hi';
        if (kind === 'denied') toast(hi ? 'माइक की अनुमति दें' : 'Allow microphone access', 'err');
        else if (kind === 'auth') handleAuthError(401);
        else if (kind === 'network') toast(hi ? 'नेटवर्क समस्या — टाइप करें' : 'Network issue — type instead', 'err');
        else if (kind === 'transcribe') toast((hi ? 'लिप्यंतरण विफल' : 'Transcription failed') + (msg ? ': ' + msg : ''), 'err');
        else if (kind === 'unsupported') toast(hi ? 'इस ब्राउज़र में आवाज़ नहीं' : 'Voice not supported here', 'err');
        reset();
      },
    });
  });
  wrap.appendChild(btn);
}

// ---- Supporting-doc upload zone ----
function renderUploadZone(u) {
  const wrap = ce('div', { className: 'section' });
  const eyebrow = ce('div', { className: 'section__eyebrow' });
  eyebrow.dataset.en = 'SHORTCUT'; eyebrow.dataset.hi = 'शॉर्टकट';
  eyebrow.textContent = state.lang === 'hi' ? 'शॉर्टकट' : 'SHORTCUT';
  const title = ce('h3', { className: 'section__title' });
  title.dataset.en = u.label_en; title.dataset.hi = u.label_hi;
  title.textContent = state.lang === 'hi' ? u.label_hi : u.label_en;
  wrap.appendChild(eyebrow); wrap.appendChild(title);

  const zone = ce('label', { className: 'ocr-zone', id: `oz_${u.id}` });
  zone.innerHTML = `
    <input type="file" accept="${u.accept || 'image/*,application/pdf,.doc,.docx,.xls,.xlsx'}" ${u.multiple ? 'multiple' : ''}>
    <div class="ocr-zone__icon">📷</div>
    <div class="ocr-zone__title" data-en="${esc(u.label_en)}" data-hi="${esc(u.label_hi)}">${esc(state.lang === 'hi' ? u.label_hi : u.label_en)}</div>
    <div class="ocr-zone__sub" data-en="${esc(u.sub_en || '')}" data-hi="${esc(u.sub_hi || '')}">${esc(state.lang === 'hi' ? (u.sub_hi || '') : (u.sub_en || ''))}</div>
  `;
  wrap.appendChild(zone);
  const pagesEl = ce('div', { className: 'ocr-pages', id: `op_${u.id}` });
  wrap.appendChild(pagesEl);
  const ctaEl = ce('div', { className: 'ocr-cta', style: 'display:none', id: `oc_${u.id}` });
  ctaEl.innerHTML = `
    <button type="button" data-action="clear" data-en="Clear" data-hi="हटाएं">${state.lang === 'hi' ? 'हटाएं' : 'Clear'}</button>
    <button type="button" data-action="extract" class="primary" data-en="✨ Extract with AI" data-hi="✨ AI से निकालें">${state.lang === 'hi' ? '✨ AI से निकालें' : '✨ Extract with AI'}</button>
  `;
  wrap.appendChild(ctaEl);

  // File handler
  zone.querySelector('input').addEventListener('change', (e) => {
    const newFiles = Array.from(e.target.files || []);
    const max = u.max_files || 8;
    state.ocrFiles.push(...newFiles.slice(0, max - state.ocrFiles.length));
    e.target.value = '';
    refreshUploadUI(u);
  });

  ctaEl.querySelector('[data-action="clear"]').addEventListener('click', () => {
    state.ocrFiles = [];
    refreshUploadUI(u);
  });

  if (u.endpoint) {
    ctaEl.querySelector('[data-action="extract"]').addEventListener('click', () => runExtract(u));
  } else {
    // No endpoint (e.g. impugned-order upload — files stored only)
    ctaEl.querySelector('[data-action="extract"]').textContent = state.lang === 'hi' ? '✓ संलग्न' : '✓ Attached';
    ctaEl.querySelector('[data-action="extract"]').disabled = true;
  }

  return wrap;
}

function refreshUploadUI(u) {
  const pagesEl = $(`#op_${u.id}`);
  const ctaEl = $(`#oc_${u.id}`);
  pagesEl.innerHTML = '';
  state.ocrFiles.forEach((file, idx) => {
    const w = ce('div', { className: 'ocr-page', title: file.name });
    if (file.type.startsWith('image/')) {
      const img = ce('img'); img.src = URL.createObjectURL(file);
      w.appendChild(img);
    } else {
      const ext = (file.name.split('.').pop() || 'FILE').toUpperCase().slice(0, 4);
      w.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:11px;color:var(--muted);">${ext}</div>`;
    }
    const num = ce('div', { className: 'ocr-page__num', textContent: idx + 1 });
    w.appendChild(num);
    const rm = ce('button', { className: 'ocr-page__rm', type: 'button', textContent: '×' });
    rm.onclick = () => { state.ocrFiles.splice(idx, 1); refreshUploadUI(u); };
    w.appendChild(rm);
    pagesEl.appendChild(w);
  });
  ctaEl.style.display = state.ocrFiles.length ? 'flex' : 'none';
}

async function runExtract(u) {
  if (!state.ocrFiles.length) return;
  const zone = $(`#oz_${u.id}`);
  const titleEl = zone.querySelector('.ocr-zone__title');
  const subEl = zone.querySelector('.ocr-zone__sub');
  const origT = titleEl.textContent, origS = subEl.textContent;
  zone.classList.add('ocr-zone--busy');
  const n = state.ocrFiles.length;
  titleEl.textContent = state.lang === 'hi' ? `${n} पन्ने पढ़े जा रहे हैं…` : `Reading ${n} page${n > 1 ? 's' : ''}…`;
  subEl.textContent = state.lang === 'hi' ? '6-12 सेकंड' : 'takes 6-12 seconds';

  try {
    const fd = new FormData();
    state.ocrFiles.forEach(f => fd.append('files', f));
    const headers = await authHeaders();
    const r = await fetch(u.endpoint, { method: 'POST', headers, body: fd });
    if (await handleAuthError(r.status)) return;
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${r.status}`);
    }
    const data = await r.json();
    applyExtracted(data.extracted, u);
    titleEl.textContent = state.lang === 'hi' ? '✓ निकाला गया' : '✓ Extracted';
    subEl.textContent = state.lang === 'hi' ? 'फ़ील्ड भरी गईं — जाँचें' : 'fields auto-filled — review';
    toast(state.lang === 'hi' ? 'फ़ील्ड स्वतः भरीं' : 'Fields auto-filled', 'ok');
  } catch (e) {
    titleEl.textContent = origT; subEl.textContent = origS;
    toast('OCR failed: ' + e.message, 'err', 4000);
  } finally {
    zone.classList.remove('ocr-zone--busy');
  }
}

function applyExtracted(extracted, u) {
  if (!extracted) return;
  // Detect which OCR schema produced this — each endpoint returns a different
  // shape. FIR has `fir_number` + `accused_details`; bail order has
  // `bail_case_number` + `applicants`; impugned order (writ) has
  // `authority_name` + `petitioner_name`.
  let mapping = {};

  // ---- Impugned-order OCR (writ petition) ----
  if (extracted.authority_name || extracted.operative_direction || extracted.passed_by) {
    mapping = {
      impugned_authority:     extracted.authority_name,
      impugned_case_no:       extracted.case_number,
      impugned_order_date:    extracted.order_date,
      impugned_passed_by:     extracted.passed_by,
      operative_direction:    extracted.operative_direction,
      subject_summary:        extracted.subject_matter,
      respondent_authority:   extracted.authority_name
        ? `1. State of ${extracted.place || 'MP'}, through Principal Secretary, concerned Department\n2. ${extracted.authority_name}`
        : null,
      earlier_proceeding_ref: extracted.lower_proceeding_referenced,
      statutes_invoked:       Array.isArray(extracted.statutes_cited)
        ? extracted.statutes_cited.join('; ')
        : extracted.statutes_cited,
      place_district:         extracted.place,
      petitioner_name:        extracted.petitioner_name,
      petitioner_father:      extracted.petitioner_relative,
      petitioner_address:     extracted.petitioner_address,
      // Seed the facts narrative with the subject + operative direction so the
      // lawyer has a starting point to expand into 5.1, 5.2 ... etc.
      facts_narrative: (extracted.subject_matter || extracted.operative_direction)
        ? `5.1 That the impugned order dated ${extracted.order_date || '___'} was passed by ${extracted.authority_name || 'the said authority'} in Case No. ${extracted.case_number || '___'}.\n5.2 ${extracted.subject_matter || ''}\n5.3 ${extracted.operative_direction || ''}\n5.4 That the said order is illegal, arbitrary and contrary to the statutory scheme.`
        : null,
    };
  }
  // ---- Bail-order OCR (successive HC bail) ----
  else if (extracted.bail_case_number || Array.isArray(extracted.applicants)) {
    mapping = {
      lower_court_name:     extracted.court_name,
      lower_court_judge:    extracted.presiding_judge,
      lower_bail_case_no:   extracted.bail_case_number,
      lower_order_date:     extracted.order_date,
      lower_outcome:        extracted.outcome,
      lower_court_history:  extracted.outcome_reasoning,
      fir_number:           extracted.fir_number,
      fir_date:             extracted.fir_date,
      police_station:       extracted.police_station,
      district:             extracted.district,
      state_name:           extracted.state_name,
      sections_str:         Array.isArray(extracted.sections) ? extracted.sections.join(', ') : extracted.sections,
      facts_narrative:      extracted.facts_narrative_hi || extracted.facts_narrative_en,
      brief_facts_alleged:  extracted.facts_narrative_hi || extracted.facts_narrative_en,
      application_number:   extracted.application_number,
    };
    if (Array.isArray(extracted.applicants) && extracted.applicants[0]) {
      const a = extracted.applicants[0];
      mapping.applicant_name    = a.name;
      mapping.applicant_father  = a.relative;
      mapping.applicant_address = a.address;
      mapping.applicant_age     = a.age;
    }
  }
  // ---- FIR OCR (default — bail templates) ----
  else {
    mapping = {
      fir_number: extracted.fir_number_full || extracted.fir_number,
      fir_date: extracted.fir_date,
      police_station: extracted.police_station,
      district: extracted.district,
      state_name: extracted.state,
      sections_str: Array.isArray(extracted.sections) ? extracted.sections.join(', ') : extracted.sections,
      facts_narrative: extracted.narrative_hi || extracted.narrative || extracted.narrative_raw,
      brief_facts_alleged: extracted.narrative_hi || extracted.narrative || extracted.narrative_raw,
    };
    if (Array.isArray(extracted.accused_details) && extracted.accused_details[0]) {
      const a = extracted.accused_details[0];
      mapping.applicant_name = a.name;
      mapping.applicant_father = a.relative;
      mapping.applicant_address = a.address;
      mapping.petitioner_name = a.name;
      mapping.petitioner_father = a.relative;
      mapping.petitioner_address = a.address;
    }
  }

  let filled = 0;
  Object.entries(mapping).forEach(([k, v]) => {
    if (v == null || (typeof v === 'string' && !v.trim())) return;
    const el = $(`#f_${k}`);
    if (el) { el.value = v; state.fields[k] = v; filled++; }
  });
  saveToLocalStorage();
  scheduleAutoRegen();
  updateProgress(); refreshDepends();
}

// ---- LocalStorage ----
function lsKey() {
  const uid = (window.headnoteAuth && window.headnoteAuth.userId && window.headnoteAuth.userId()) || 'anon';
  return `headnote.tpl.${state.docType}.${uid}`;
}
function saveToLocalStorage() {
  try { localStorage.setItem(lsKey(), JSON.stringify({ fields: state.fields, lang: state.lang, document: state.document })); } catch {}
  $('#savestate').textContent = state.lang === 'hi' ? '✓ सहेजा गया' : '✓ saved';
  clearTimeout(window._ssTimer);
  window._ssTimer = setTimeout(() => $('#savestate').textContent = '', 1500);
}
function restoreFromLocalStorage() {
  try {
    const j = JSON.parse(localStorage.getItem(lsKey()) || '{}');
    if (j.fields) {
      state.fields = j.fields;
      Object.entries(state.fields).forEach(([k, v]) => {
        const el = $(`#f_${k}`); if (el) el.value = v || '';
      });
    }
    if (j.document) {
      state.document = j.document;
      renderDocument();
      state._lastGenFields = JSON.stringify(state.fields);
      return true;  // had a saved doc — caller skips initial render
    }
  } catch {}
  return false;
}

// First-render-on-page-load — gives the lawyer the document skeleton
// (with [BLANK] placeholders for unfilled fields) immediately, matching
// the bail drafter's "live preview always visible" feel. Just ONE LLM
// call per session opening — typing then updates via debounced auto-regen.
async function maybeRenderInitial() {
  if (!state.template) return;
  // Canonical (deterministic) types render FREE + deterministically from the fields,
  // so ALWAYS (re)generate on load — this heals any document cached before the type
  // became a V2 canonical template (e.g. an old LLM/skeleton render still in
  // localStorage). Non-canonical (LLM) types keep their saved draft, since
  // re-rolling them costs an LLM call.
  if (state.document && !state.template.deterministic) return;   // LLM type: keep saved draft
  // Pass `initial: true` so the silent-skip-when-empty guard is bypassed
  await generateDocument({ silent: true, initial: true });
}

// ---- Generate + live preview ----
async function generateDocument(opts) {
  // Editing the doc directly — never overwrite the lawyer's hand-edits.
  if (state.editMode) return;
  opts = opts || {};
  // Single-flight, latest-wins: if a generation is already running, remember
  // this (latest) request and re-fire it when the current one finishes. This
  // stops a quick language toggle (or a keystroke) from being silently dropped
  // while an earlier request is still in flight.
  if (state.generating) { state._rerunPending = opts; return; }
  const silent = !!opts.silent;
  const initial = !!opts.initial;  // first render on page load — always fires
  const filled = (state.template.fields || []).filter(f => f.required && state.fields[f.key] && String(state.fields[f.key]).trim());
  if (silent && !initial && filled.length === 0) return;
  state.generating = true;
  $('#doc-pane').classList.add('is-generating');
  $('#btn-generate').disabled = true;
  // Rich loading state only when we'll actually wait on the LLM (deterministic
  // renders are instant — a loader would just flicker) and this is a real load
  // (first paint or an explicit refresh), not a per-keystroke silent regen.
  const showRich = (!silent || !state.document) && !DETERMINISTIC_RENDERERS[state.docType];
  if (showRich) showLoader();
  if (!silent) {
    $('#gen-label').textContent = state.lang === 'hi' ? '⏳ बना रहे हैं…' : '⏳ Drafting…';
    if (window.matchMedia('(max-width: 880px)').matches && (showRich || !state.document)) setPreview('half');
  }
  const prevScroll = $('#doc-page')?.scrollTop || 0;
  // Snapshot the language + content version THIS request is built from. The
  // result is cached against the right language even if the user toggles again
  // mid-flight, and the cache entry is auto-invalidated the moment content
  // changes (scheduleAutoRegen bumps _editVersion).
  const langAtCall = state.lang;
  const verAtCall  = state._editVersion;
  try {
    // INSTANT deterministic path — build the doc in-browser (no LLM, no
    // network, ₹0), exactly like /draft/bail. Only fires for doc_types listed
    // in DETERMINISTIC_RENDERERS; everything else falls through to the LLM.
    const _detRender = DETERMINISTIC_RENDERERS[state.docType];
    if (_detRender) {
      const doc = _detRender(state.fields, langAtCall);
      state.docByLang[langAtCall] = { doc, ver: verAtCall };
      if (langAtCall === state.lang) {
        state.document = doc;
        renderDocument();
        if ($('#doc-page')) $('#doc-page').scrollTop = prevScroll;
        saveToLocalStorage();
        state._lastGenFields = JSON.stringify(state.fields);
      }
      return;   // skip the LLM fetch entirely — `finally` still runs
    }
    const headers = { 'Content-Type': 'application/json', ...(await authHeaders()) };
    const r = await fetch('/api/draft/render-template', {
      method: 'POST', headers,
      body: JSON.stringify({ doc_type: state.docType, fields: state.fields, lang: langAtCall }),
    });
    if (await handleAuthError(r.status)) return;
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
    // Cache this language's document so a later toggle back re-shows the SAME
    // format-identical doc instantly (no LLM re-roll, no format drift).
    state.docByLang[langAtCall] = { doc: data.document, ver: verAtCall };
    // Only paint if this is still the language on screen. If the user toggled
    // away mid-flight, _rerunPending holds the newer request and will repaint —
    // so we skip the stale paint instead of flashing the wrong language.
    if (langAtCall === state.lang) {
      state.document = data.document;
      renderDocument();
      if ($('#doc-page')) $('#doc-page').scrollTop = prevScroll;
      saveToLocalStorage();
      state._lastGenFields = JSON.stringify(state.fields);
    }
  } catch (e) {
    if (!silent) toast('Error: ' + e.message, 'err', 4000);
  } finally {
    state.generating = false;
    hideLoader();
    $('#doc-pane').classList.remove('is-generating');
    $('#btn-generate').disabled = false;
    $('#gen-label').textContent = state.lang === 'hi' ? '✨ दस्तावेज़ ताज़ा करें' : '✨ Refresh Draft';
    // A request arrived while we were busy — run the latest one now (it reads
    // the user's most recent state.lang / fields).
    if (state._rerunPending) {
      const next = state._rerunPending; state._rerunPending = null;
      generateDocument(next);
    }
  }
}
function scheduleAutoRegen() {
  // Any real content change invalidates the per-language doc cache. This runs
  // for typing, OCR fills, voice fills and polish (all call scheduleAutoRegen);
  // a pure language toggle / field-translation does NOT, so the cache stays
  // valid across language flips. Bump synchronously (before the debounce) so a
  // toggle fired right after a keystroke sees the new version and regenerates.
  state._editVersion++;
  if (state.editMode) return;   // editing the doc directly — freeze auto-regen
  if (state._regenTimer) clearTimeout(state._regenTimer);
  // Deterministic (in-browser) templates are free + instant, so they update
  // live on every change with a snappy debounce and never hit the LLM cap.
  const _det = !!DETERMINISTIC_RENDERERS[state.docType];
  state._regenTimer = setTimeout(() => {
    if (!_det && state._regenCount >= REGEN_MAX_PER_SESSION) return;
    const snap = JSON.stringify(state.fields);
    if (snap === state._lastGenFields) return;
    if (!_det) state._regenCount++;
    // Once we have a document, every change should regen (not just required-
    // field changes). `initial: true` bypasses the empty-form guard.
    generateDocument({ silent: true, initial: !!state.document });
  }, _det ? 250 : REGEN_DEBOUNCE_MS);
}

// ---- Document rendering — parse plain text into court-paper HTML ----
// Detects common structural elements (court name, case no, title-in-caps,
// numbered paras, MOST RESPECTFULLY, PRAYER, VERIFICATION) and styles them
// to feel like a court paper instead of a flat text blob.
function renderDocument() {
  const empty = $('#doc-empty');
  const page = $('#doc-page');
  if (!state.document) {
    empty.style.display = '';
    page.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  page.style.display = '';
  // Deterministic renderers (and saved manual edits) may hand us ready HTML —
  // inject it directly so court-grade layout (right-aligned signatures, etc.)
  // survives. Plain-text (LLM) docs still go through parseDocToHtml.
  page.innerHTML = (typeof state.document === 'string' && state.document.trimStart().startsWith('<'))
    ? state.document
    : parseDocToHtml(state.document);
  // Don't yank the user to the preview while they're typing — the Form/Preview
  // tabs let them switch when they're ready.
  fitDocToWidth();
  requestAnimationFrame(fitDocToWidth);   // re-measure once fonts/layout settle
}

// The canonical draft is a fixed 210mm A4 sheet (.doc-a4). On a screen narrower
// than the sheet it used to clip — lines ran off the right edge, unreadable.
// Scale the whole sheet down to fit the pane so every line is visible; desktop
// (pane ≥ sheet) stays 1:1, and the PDF is generated server-side so it's untouched.
function fitDocToWidth() {
  const page = document.getElementById('doc-page');
  if (!page) return;
  const bundle = page.querySelector('.v2-bundle');
  if (!bundle) return;               // legacy .doc-page docs already reflow responsively
  const sheet = bundle.querySelector('.doc-a4');
  if (!sheet) return;
  let wrap = (bundle.parentElement && bundle.parentElement.classList.contains('fitwrap'))
    ? bundle.parentElement : null;
  // reset any prior fit before measuring the sheet's true (unscaled) width
  bundle.style.transform = ''; bundle.style.transformOrigin = ''; bundle.style.width = '';
  if (wrap) { wrap.style.width = ''; wrap.style.height = ''; }
  const avail = page.clientWidth;
  const naturalW = sheet.offsetWidth;   // the fixed 210mm sheet, independent of the bundle width
  if (!avail || !naturalW) return;
  const scale = Math.min(1, (avail - 2) / naturalW);
  if (scale >= 0.999) { if (wrap) wrap.replaceWith(bundle); return; }   // desktop: room enough, no scaling
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.className = 'fitwrap';
    bundle.parentNode.insertBefore(wrap, bundle);
    wrap.appendChild(bundle);
  }
  // Pin the bundle to the real sheet width (it defaults to width:100%, which
  // would make the sheet overflow a scaled wrapper and jam it to the left).
  bundle.style.width = naturalW + 'px';
  const naturalH = bundle.offsetHeight;
  bundle.style.transformOrigin = 'top left';
  bundle.style.transform = 'scale(' + scale + ')';
  wrap.style.width = Math.ceil(naturalW * scale) + 'px';
  wrap.style.height = Math.ceil(naturalH * scale) + 'px';
  wrap.style.margin = '0 auto';       // centre the fitted sheet in the pane
}
if (!window.__fitDocBound) {
  window.__fitDocBound = true;
  window.addEventListener('resize', () => {
    clearTimeout(window.__fitDocT);
    window.__fitDocT = setTimeout(fitDocToWidth, 120);
  });
}

function parseDocToHtml(text) {
  const lines = text.replace(/\r\n/g, '\n').split('\n');
  const out = [];
  let inPrayerOrVerify = false;

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    let line = raw.trim();
    if (!line) { out.push('<br>'); continue; }
    // Strip LLM-produced markdown / HTML formatting markers so titles,
    // headings, etc. can be detected by the regex tests below and rendered
    // via CSS classes. Without this, '_<u>PETITION...</u>_' would be
    // HTML-escaped and displayed literally on the page.
    line = line
      .replace(/<\/?u\b[^>]*>/gi,     '')
      .replace(/<\/?b\b[^>]*>/gi,     '')
      .replace(/<\/?strong\b[^>]*>/gi, '')
      .replace(/<\/?em\b[^>]*>/gi,    '')
      .replace(/<\/?i\b[^>]*>/gi,     '')
      .replace(/\*\*([^*]+)\*\*/g,    '$1')
      .replace(/(?<!\w)_([^_\n]+)_(?!\w)/g, '$1');
    const e = esc(line);

    // 1. "IN THE COURT OF …" header
    if (/^IN\s+THE\s+(HIGH\s+COURT|COURT\s+OF|SUPREME\s+COURT|HON.?BLE)/i.test(line)
        || /^न्यायालय/.test(line)
        || /^माननीय\s+(उच्च|उच्चतम|न्यायालय|न्यायाधीश)/.test(line)) {
      out.push(`<div class="doc-court">${e}</div>`);
      continue;
    }
    // 2. "Case No." line
    if (/^(Misc(\.|ellaneous)?|Criminal|Civil|Writ|Application|Case|Sessions)[\s\S]*?No[\s.:]/.test(line)
        || /^(आवेदन|याचिका|प्रकरण|मामला)[\s\S]*?(क्रमांक|सं\.?|नं\.?)/.test(line)) {
      out.push(`<div class="doc-case-no">${e}</div>`);
      continue;
    }
    // 3. "VERSUS" / "Vs." separator
    if (/^(VERSUS|Vs\.?|VS\.?|VERSES)$/i.test(line) || /^विरुद्ध$/.test(line) || /^विरूद्ध$/.test(line)) {
      out.push(`<div class="doc-vs">${e}</div>`);
      continue;
    }
    // Cause-title party line: role-label + separator + descriptor → label-left, descriptor
    // fills the right (wraps to 2-3 lines). The required separator ([—:।-]) stops body
    // sentences like "आवेदक का कथन …" from matching, so this degrades gracefully.
    {
      const pm = line.match(/^(आवेदकगण|आवेदिका|आवेदक|अनावेदकगण|अनावेदक|प्रार्थीगण|प्रार्थी|याचिकाकर्ता|अपीलार्थी|परिवादी|Applicants?|Petitioners?|Respondents?|Non-?[Aa]pplicants?|Complainants?)\s*[—:।-]+\s*(.+)$/);
      if (pm) {
        out.push(`<div class="doc-party"><span class="doc-party-lab">${esc(pm[1])}</span><span class="doc-party-desc">${esc(pm[2])}</span></div>`);
        continue;
      }
    }
    // 4. "PETITION/APPLICATION/APPEAL UNDER …" — title line, all caps or starts with these
    if (/^(PETITION|APPLICATION|APPEAL|MEMO|VAKALATNAMA|REPLY|COUNTER)\s+(UNDER|FOR|TO|ON|—)/i.test(line)
        || /^(आवेदन\s+पत्र|अपील|प्रार्थना\s*पत्र|वकालतनामा|प्रत्यावेदन|मेमो|शपथ\s*पत्र|सूचना\s*पत्र|परिवाद\s*पत्र)/.test(line)) {
      out.push(`<div class="doc-title">${e}</div>`);
      continue;
    }
    // 5. "MOST RESPECTFULLY SHEWETH" / "सादर निवेदन है"
    if (/^(MOST\s+RESPECTFULLY\s+SHEWETH|RESPECTFULLY\s+SUBMITTED|SHEWETH)/i.test(line)
        || /^(सादर\s+निवेदन|विनम्र\s+निवेदन|निवेदन\s+है)/.test(line)) {
      out.push(`<div class="doc-shewith">${e}</div>`);
      continue;
    }
    // 6. "PRAYER" / "प्रार्थना"
    if (/^PRAYER\s*:?$/i.test(line) || /^प्रार्थना\s*:?$/.test(line) || /^अतः\s+प्रार्थना/.test(line)) {
      out.push(`<div class="doc-prayer">${e}</div>`);
      inPrayerOrVerify = true;
      continue;
    }
    // 7. "VERIFICATION" / "सत्यापन"
    if (/^VERIFICATION\s*:?$/i.test(line) || /^सत्यापन\s*:?$/.test(line)) {
      out.push(`<div class="doc-verify">${e}</div>`);
      continue;
    }
    // 8. Signature blocks — "Through", "Counsel for", "अधिवक्ता"
    if (/^(Through|Counsel\s+for|Signature\s+of|For\s+the\s+Applicant)/i.test(line)
        || /^(अधिवक्ता|आवेदक|याचिकाकर्ता)\s*$/.test(line)) {
      out.push(`<div class="doc-sig">${e}</div>`);
      continue;
    }
    // 9. Numbered paragraphs — "1.", "2.", "1)", "a)", "(a)"
    const numMatch = line.match(/^\s*(\(?[0-9]+\)?[.\)]|\(?[a-z]\)?[.\)])\s+(.*)$/i);
    if (numMatch) {
      out.push(`<div class="doc-para-num">${esc(numMatch[1])} ${esc(numMatch[2])}</div>`);
      continue;
    }
    // 10. Lines in ALL CAPS that aren't already matched → centered head
    if (line.length > 8 && line === line.toUpperCase() && /[A-Z]{4,}/.test(line)) {
      out.push(`<div class="doc-head">${e}</div>`);
      continue;
    }
    // Default: plain paragraph
    out.push(`<div class="doc-para">${e}</div>`);
  }
  return out.join('\n');
}

// ---- Editable skeleton — the always-available starting canvas ----
// Most universal templates render their live preview via the LLM
// (/api/draft/render-template); only a couple build in-browser. So before that
// call lands — empty form, LLM slow/failed, or the per-session regen cap hit —
// there is no state.document and the edit canvas used to refuse to open.
// This builds a court-paper skeleton DETERMINISTICALLY (₹0, instant, offline)
// from the template metadata plus whatever the lawyer has already typed, so the
// ✏️ Edit canvas opens for EVERY doc type. The lines are shaped so the existing
// parseDocToHtml() styles them (court header, title, यह कि paras, prayer, sign).
function buildSkeletonDoc(fields, lang) {
  const tpl  = state.template || {};
  const isHi = lang === 'hi';
  const F    = fields || {};
  const val  = k => (F[k] != null && String(F[k]).trim()) ? String(F[k]).trim() : '';
  const L    = [];

  // 1. Court header — prefer a typed court field, else the template's court label.
  const courtTyped = val('court_name') || val('court') || val('tribunal');
  const courtLabel = courtTyped || (isHi ? (tpl.court_label_hi || '__________')
                                         : (tpl.court_label_en || '__________'));
  L.push(isHi ? ('न्यायालय ' + courtLabel) : ('IN THE COURT OF ' + courtLabel));
  // 2. Case-number line (blank — filled at the registry).
  L.push(isHi ? 'प्रकरण क्रमांक ______ / 20__' : 'Case No. ______ / 20__');
  L.push('');
  // 3. Title — from the template name (prefixed so parseDocToHtml flags it a title).
  L.push(isHi ? ('आवेदन पत्र — ' + (tpl.name_hi || '')) : ('APPLICATION — ' + (tpl.name_en || '')));
  L.push('');
  // 4. Opening submission line.
  L.push(isHi ? 'सादर निवेदन है:' : 'MOST RESPECTFULLY SHEWETH:');
  L.push('');
  // 5. Numbered paras — seed from the filled fields (skip pure court/filing meta),
  //    so the lawyer's typed facts land in the draft instead of a blank page.
  let n = 1;
  (tpl.fields || []).forEach(f => {
    const v = val(f.key);
    if (!v) return;
    if (f.section === 'court' || f.section === 'filing') return;
    const label = isHi ? (f.label_hi || f.label_en || '') : (f.label_en || f.label_hi || '');
    L.push((isHi ? (n + '. यह कि ') : (n + '. That ')) + (label ? label + ': ' : '') + v);
    n++;
  });
  while (n <= 3) {   // always leave a couple of editable placeholder paras
    L.push((isHi ? (n + '. यह कि ____________') : (n + '. That ____________')));
    n++;
  }
  L.push('');
  // 6. Prayer.
  L.push(isHi ? 'प्रार्थना:' : 'PRAYER:');
  L.push(isHi ? 'अतः माननीय न्यायालय से सादर प्रार्थना है कि ____________।'
              : 'It is therefore most respectfully prayed that ____________.');
  L.push('');
  // 7. Place / date + signature block.
  L.push((isHi ? 'स्थान: ' : 'Place: ') + (val('place') || '________')
       + '    ' + (isHi ? 'दिनांक: ' : 'Date: ') + (val('filing_date') || '________'));
  L.push(isHi ? 'अधिवक्ता' : 'Counsel for the Applicant');
  const adv = val('advocate_name');
  if (adv) L.push(adv);

  return L.join('\n');
}

// ---- Topbar overflow menu (mobile) ----
(function wireMore() {

  if (!btn || !menu) return;
  const close = () => { menu.hidden = true; btn.setAttribute('aria-expanded', 'false'); };
  btn.addEventListener('click', (e) => {

  const MAP = { pdf: 'btn-pdf', print: 'btn-print', edit: 'btn-edit', share: 'btn-share' };
  menu.querySelectorAll('button[data-act]').forEach(b => {
    b.addEventListener('click', () => { close(); $('#' + MAP[b.dataset.act])?.click(); });
  });
  document.addEventListener('click', (e) => {
    if (!menu.hidden && !e.target.closest('#topbar-more-wrap')) close();
  });
})();

// ---- Language toggle ----
async function setLang(newLang) {
  if (state.lang === newLang) return;
  state.lang = newLang;
  applyLang();
  renderForm();
  Object.entries(state.fields).forEach(([k, v]) => {
    const el = $(`#f_${k}`); if (el) el.value = v || '';
  });

  // Translate the FORM-INPUT values for display only — best-effort, in the
  // BACKGROUND. The document flip must NEVER wait on this: render-template
  // already produces the document in the target language regardless of the
  // form's language, while translate-fields uses flaky free MT that used to
  // BLOCK (and sometimes fail) the whole toggle — that was the main reason
  // "translation wasn't working". Fire-and-forget so the doc flips fast.
  translateFieldsForDisplay(newLang);

  // Editing the doc by hand — regenerating would wipe those edits. Keep the
  // document as-is and tell the lawyer how to switch its language.
  if (state.editMode) {
    toast(newLang === 'hi' ? 'दस्तावेज़ की भाषा बदलने के लिए पहले संपादन बंद करें (✓ पूर्ण)'
                           : 'Turn off Edit (✓ Done) to switch the document language', 'warn', 3200);
    return;
  }

  // INSTANT path: if this language was already generated for the CURRENT form
  // content, re-show that cached document — no LLM call, no format drift,
  // identical layout every time you toggle back.
  const cached = state.docByLang[newLang];
  if (cached && cached.doc && cached.ver === state._editVersion) {
    state.document = cached.doc;
    renderDocument();
    saveToLocalStorage();
    return;
  }

  // Otherwise generate the document in the new language (generateDocument also
  // caches the result, so the next toggle back is instant).
  if (state.document) {
    await generateDocument();
  }
}

// Best-effort background translation of the form-input VALUES so the boxes read
// in the chosen language. NEVER blocks or breaks the language toggle — on any
// failure the inputs simply stay in their source language; the document has
// already flipped via render-template either way.
async function translateFieldsForDisplay(targetLang) {
  try {
    const toTranslate = {};
    (state.template.fields || []).forEach(f => {
      if (['longtext', 'address', 'name', 'text'].includes(f.type)) {
        const v = state.fields[f.key];
        if (v && String(v).trim()) toTranslate[f.key] = v;
      }
    });
    if (Object.keys(toTranslate).length === 0) return;
    const headers = { 'Content-Type': 'application/json', ...(await authHeaders()) };
    const r = await fetch('/api/draft/translate-fields', {
      method: 'POST', headers,
      body: JSON.stringify({ fields: toTranslate, target: targetLang }),
    });
    if (!r.ok) return;                       // best-effort: stay silent on failure
    const data = await r.json();
    // The user may have toggled away again while MT was running — only apply if
    // the chosen language is still the one on screen.
    if (state.lang !== targetLang) return;
    if (data.translated && !data.skipped) {
      Object.entries(data.translated).forEach(([k, v]) => {
        if (v) { state.fields[k] = v; const el = $(`#f_${k}`); if (el) el.value = v; }
      });
      saveToLocalStorage();
      updateProgress();
    }
  } catch { /* best-effort — inputs stay in source language; doc already flipped */ }
}
$('#lang-en').addEventListener('click', () => setLang('en'));
$('#lang-hi').addEventListener('click', () => setLang('hi'));

// ---- Generate + PDF + Print + WhatsApp ----
// Download + WhatsApp share fetch one real PDF from POST /api/draft/pdf
// (WeasyPrint renders it server-side with correct Devanagari + A4 breaks).
// Print stays browser-native (window.print) — the @media print CSS is right.
$('#btn-generate').addEventListener('click', () => generateDocument());

// ---- Direct in-document editing (parity with the bail drafter) ----
// ON  → #doc-page becomes contentEditable and auto-regen freezes (state.editMode)
//       so manual edits survive. PDF / Print / WhatsApp all read the live
//       #doc-page, so the edits flow straight into the output.
// OFF → keep the edits (saved into state.document so they survive a reopen).
//       A later "Refresh Draft" or form edit rebuilds from the form fields.
$('#btn-edit').addEventListener('click', () => {
  const docEl = $('#doc-page');
  const btn = $('#btn-edit');
  const isHi = state.lang === 'hi';
  // No document yet (deterministic build pending, LLM render failed/capped, or
  // an empty form)? DON'T block — seed an editable court-paper skeleton from the
  // template + typed fields so the canvas opens for EVERY doc type. Entering
  // edit mode below freezes auto-regen, so the seed survives until the lawyer
  // saves it (✓ Done writes #doc-page's HTML back to state.document).
  if (!state.document && !state.editMode) {
    state.document = buildSkeletonDoc(state.fields, state.lang);
    renderDocument();
    saveToLocalStorage();
    toast(isHi ? 'नया दस्तावेज़ — सीधे टाइप करके भरें' : 'Blank draft — type directly to fill it in', 'ok', 3000);
  }
  if (!state.editMode) {
    state.editMode = true;
    docEl.setAttribute('contenteditable', 'true');
    docEl.style.outline = '2px dashed var(--gold, #c9a96e)';
    docEl.style.outlineOffset = '6px';
    ensureRichToolbar().style.display = 'flex';     // full formatting toolbar
    docEl.focus();
    btn.classList.add('btn--primary');
    btn.textContent = isHi ? '✓ पूर्ण' : '✓ Done';
    toast(isHi ? 'पूरा एडिटर खुला — फॉन्ट साइज़, रंग, बोल्ड आदि टूलबार से बदलें'
               : 'Full editor open — use the toolbar for font size, colour, bold, etc.', 'ok', 3500);
  } else {
    state.editMode = false;
    docEl.removeAttribute('contenteditable');
    docEl.style.outline = '';
    docEl.style.outlineOffset = '';
    if (_rtToolbar) _rtToolbar.style.display = 'none';
    btn.classList.remove('btn--primary');
    btn.textContent = isHi ? '✏️ संपादन' : '✏️ Edit';
    // Preserve the lawyer's rich formatting (size / colour / bold) — save the
    // HTML, not flattened text. renderDocument re-injects HTML directly and the
    // PDF / print path reads #doc-page, so the formatting flows everywhere.
    state.document = docEl.innerHTML;
    saveToLocalStorage();
    toast(isHi ? 'बदलाव सहेजे गए' : 'Edits saved', 'ok');
  }
});

// ---- Rich-text editor toolbar (शब्द-प्रोसेसर शैली) ----
// Shown only while editing (✏️ संपादन). Full court-document toolset: undo/redo,
// font size, text colour, bold/italic/underline, alignment, lists, clear.
// Uses execCommand on the contentEditable #doc-page — formatting flows straight
// into the WeasyPrint PDF + print (both read #doc-page's live HTML).
let _rtToolbar = null;
function ensureRichToolbar() {
  if (_rtToolbar) return _rtToolbar;
  if (!document.getElementById('rt-toolbar-style')) {
    const st = document.createElement('style');
    st.id = 'rt-toolbar-style';
    st.textContent =
      '.rt-toolbar{display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:7px 9px;'
      + 'background:var(--panel,#fff);border:1px solid var(--line,#e3e3e3);border-radius:10px;'
      + 'margin:0 0 10px;position:sticky;top:0;z-index:6;box-shadow:0 1px 4px rgba(0,0,0,.05);}'
      + '.rt-toolbar .sep{width:1px;height:22px;background:var(--line,#e3e3e3);margin:0 3px;}'
      + '.rt-btn{min-width:32px;height:32px;padding:0 7px;border:1px solid var(--line,#dcdcdc);'
      + 'background:#fff;border-radius:7px;cursor:pointer;font-size:14px;line-height:1;color:#222;'
      + 'display:inline-flex;align-items:center;justify-content:center;}'
      + '.rt-btn:hover{background:#f3efe6;border-color:var(--gold,#c9a96e);}'
      + '.rt-btn.active{background:var(--gold,#c9a96e);color:#fff;border-color:var(--gold,#c9a96e);}'
      + '.rt-sel{height:32px;border:1px solid var(--line,#dcdcdc);border-radius:7px;background:#fff;'
      + 'font-size:13px;padding:0 6px;cursor:pointer;}'
      + '.rt-color{width:34px;height:32px;padding:2px;border:1px solid var(--line,#dcdcdc);'
      + 'border-radius:7px;background:#fff;cursor:pointer;}'
      + '@media print{.rt-toolbar{display:none!important;}}';
    document.head.appendChild(st);
  }
  const bar = document.createElement('div');
  bar.className = 'rt-toolbar';
  bar.style.display = 'none';
  const docEl = () => $('#doc-page');
  const run = (cmd, val) => {
    try { document.execCommand('styleWithCSS', false, true); } catch (_) {}
    try { document.execCommand(cmd, false, val); } catch (_) {}
    const d = docEl(); if (d) d.focus();
  };
  const mkBtn = (label, title, cmd, val) => {
    const b = document.createElement('button');
    b.type = 'button'; b.className = 'rt-btn'; b.innerHTML = label; b.title = title;
    if (cmd) b.dataset.cmd = cmd;
    b.addEventListener('mousedown', (e) => { e.preventDefault(); run(cmd, val); });
    bar.appendChild(b); return b;
  };
  const sep = () => { const s = document.createElement('span'); s.className = 'sep'; bar.appendChild(s); };
  const isHi = () => state.lang === 'hi';

  mkBtn('↶', isHi() ? 'पूर्ववत' : 'Undo', 'undo');
  mkBtn('↷', isHi() ? 'पुनः' : 'Redo', 'redo');
  sep();
  // Font size (HTML sizes 1-7 → reliable everywhere, flows to PDF)
  const sizeSel = document.createElement('select');
  sizeSel.className = 'rt-sel';
  sizeSel.title = isHi() ? 'फॉन्ट साइज़' : 'Font size';
  [[ (isHi() ? 'छोटा' : 'Small'), '2'], [(isHi() ? 'सामान्य' : 'Normal'), '3'],
   [(isHi() ? 'बड़ा' : 'Large'), '5'], [(isHi() ? 'शीर्षक' : 'Heading'), '6']]
    .forEach(([t, val]) => { const o = document.createElement('option'); o.textContent = t; o.value = val; sizeSel.appendChild(o); });
  sizeSel.value = '3';
  sizeSel.addEventListener('mousedown', (e) => e.stopPropagation());
  sizeSel.addEventListener('change', () => run('fontSize', sizeSel.value));
  bar.appendChild(sizeSel);
  sep();
  mkBtn('<b>B</b>', isHi() ? 'बोल्ड' : 'Bold', 'bold');
  mkBtn('<i>I</i>', isHi() ? 'इटैलिक' : 'Italic', 'italic');
  mkBtn('<u>U</u>', isHi() ? 'रेखांकित' : 'Underline', 'underline');
  // Text colour
  const color = document.createElement('input');
  color.type = 'color'; color.className = 'rt-color'; color.value = '#1a1a1a';
  color.title = isHi() ? 'टेक्स्ट रंग' : 'Text colour';
  color.addEventListener('input', () => run('foreColor', color.value));
  bar.appendChild(color);
  sep();
  mkBtn('⬅', isHi() ? 'बाएँ' : 'Align left', 'justifyLeft');
  mkBtn('↔', isHi() ? 'मध्य' : 'Align center', 'justifyCenter');
  mkBtn('➡', isHi() ? 'दाएँ' : 'Align right', 'justifyRight');
  mkBtn('☷', isHi() ? 'जस्टिफ़ाई' : 'Justify', 'justifyFull');
  sep();
  mkBtn('• —', isHi() ? 'बुलेट सूची' : 'Bullet list', 'insertUnorderedList');
  mkBtn('1.', isHi() ? 'क्रमांकित सूची' : 'Numbered list', 'insertOrderedList');
  sep();
  mkBtn('<s>S</s>', isHi() ? 'काट (स्ट्राइकथ्रू)' : 'Strikethrough', 'strikeThrough');
  mkBtn('x²', isHi() ? 'सुपरस्क्रिप्ट' : 'Superscript', 'superscript');
  mkBtn('x₂', isHi() ? 'सबस्क्रिप्ट' : 'Subscript', 'subscript');
  sep();
  mkBtn('⇥', isHi() ? 'इंडेंट बढ़ाएँ' : 'Indent', 'indent');
  mkBtn('⇤', isHi() ? 'इंडेंट घटाएँ' : 'Outdent', 'outdent');
  sep();
  // Font family
  const famSel = document.createElement('select');
  famSel.className = 'rt-sel'; famSel.title = isHi() ? 'फॉन्ट' : 'Font';
  [['Noto Serif Devanagari', "'Noto Serif Devanagari','Noto Sans Devanagari',serif"],
   ['Noto Sans Devanagari', "'Noto Sans Devanagari',sans-serif"],
   ['Mangal', "Mangal,'Noto Sans Devanagari',serif"],
   ['Times New Roman', "'Times New Roman',serif"]]
    .forEach(([t, val]) => { const o = document.createElement('option'); o.textContent = t; o.value = val; famSel.appendChild(o); });
  famSel.addEventListener('mousedown', (e) => e.stopPropagation());
  famSel.addEventListener('change', () => run('fontName', famSel.value));
  bar.appendChild(famSel);
  // Highlight colour
  const hl = document.createElement('input');
  hl.type = 'color'; hl.className = 'rt-color'; hl.value = '#fff3b0';
  hl.title = isHi() ? 'हाइलाइट रंग' : 'Highlight';
  hl.addEventListener('input', () => run('hiliteColor', hl.value));
  bar.appendChild(hl);
  sep();
  // Line spacing — applies to the whole document (court double-spacing)
  const lsSel = document.createElement('select');
  lsSel.className = 'rt-sel'; lsSel.title = isHi() ? 'पंक्ति अंतराल' : 'Line spacing';
  [[(isHi() ? 'अंतराल: सामान्य' : 'Spacing: normal'), ''], ['1.5', '1.6'], [(isHi() ? 'दोहरा' : 'Double'), '2.2']]
    .forEach(([t, val]) => { const o = document.createElement('option'); o.textContent = t; o.value = val; lsSel.appendChild(o); });
  lsSel.addEventListener('mousedown', (e) => e.stopPropagation());
  lsSel.addEventListener('change', () => { const d = docEl(); if (d) d.style.lineHeight = lsSel.value; });
  bar.appendChild(lsSel);
  sep();
  mkBtn('⨯', isHi() ? 'फॉर्मेट हटाएँ' : 'Clear formatting', 'removeFormat');

  // Active-state highlighting — buttons light up for the cursor's formatting.
  const updateActive = () => {
    if (!state.editMode) return;
    bar.querySelectorAll('.rt-btn[data-cmd]').forEach(b => {
      const c = b.dataset.cmd;
      if (!c || ['undo', 'redo', 'removeFormat', 'indent', 'outdent'].includes(c)) return;
      let on = false; try { on = document.queryCommandState(c); } catch (_) {}
      b.classList.toggle('active', !!on);
    });
  };
  document.addEventListener('selectionchange', updateActive);

  const pane = $('#doc-pane'); const page = $('#doc-page');
  if (page && page.parentNode) page.parentNode.insertBefore(bar, page);
  else if (pane) pane.appendChild(bar);
  _rtToolbar = bar;
  return bar;
}

function _tplFilename() {
  const applicantRaw = (state.fields && (
    state.fields.petitioner_name || state.fields.applicant_name ||
    state.fields.appellant_name  || state.fields.accused_name   || ''
  )) || '';
  const applicantSlug = applicantRaw.trim().split(/\s+/)[0].toLowerCase().replace(/[^a-z]/g, '');
  const tplSlug = (state.template?.name_en || 'document').replace(/[^a-z0-9]+/gi, '-').toLowerCase();
  const dateStr = new Date().toISOString().slice(0, 10);
  return applicantSlug
    ? `${tplSlug}-${applicantSlug}-${dateStr}.pdf`
    : `${tplSlug}-${dateStr}.pdf`;
}

// Serialize #doc-page + every <style> on the page into a standalone HTML
// document the server can render. We DON'T rasterize here — WeasyPrint shapes
// the Devanagari and honours the @media print / @page CSS server-side, so the
// PDF is real selectable text with clean A4 breaks.
function _tplExportHtml() {
  const docEl = $('#doc-page');
  if (!docEl) throw new Error('Document not ready');
  const styles = Array.from(document.querySelectorAll('style'))
    .map(s => s.textContent).join('\n');
  return '<!doctype html><html><head><meta charset="utf-8"><style>'
    + styles + '</style></head><body class="' + document.body.className
    + '">' + docEl.outerHTML + '</body></html>';
}

// Fetch the server-rendered PDF as a Blob (powers download + WhatsApp share).
async function _tplFetchPdfBlob() {
  const filename = _tplFilename();                 // e.g. writ-...-2026-05-30.pdf
  const base = filename.replace(/\.pdf$/i, '');     // server re-appends .pdf
  const headers = { 'Content-Type': 'application/json', ...(await authHeaders()) };
  const r = await fetch('/api/draft/pdf', {
    method: 'POST', headers,
    body: JSON.stringify({ html: _tplExportHtml(), filename: base }),
  });
  if (!r.ok) {
    let detail = '';
    try { detail = (await r.json()).detail || ''; } catch (_) {}
    throw new Error(detail || ('server error ' + r.status));
  }
  const blob = await r.blob();
  return { blob, filename };
}

$('#btn-pdf').addEventListener('click', async () => {
  if (!state.document) {
    toast(state.lang === 'hi' ? 'पहले दस्तावेज़ बनाएं' : 'Refresh draft first', 'warn');
    return;
  }
  const btn = $('#btn-pdf');
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ ' + (state.lang === 'hi' ? 'बनाया जा रहा है' : 'Generating');
  toast(state.lang === 'hi' ? 'PDF बना रहे हैं…' : 'Generating PDF…', 'ok');
  try {
    const { blob, filename } = await _tplFetchPdfBlob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);
    toast(state.lang === 'hi' ? 'सहेजा गया ✓' : 'Saved · check Downloads', 'ok');
  } catch (e) {
    console.error(e);
    toast('PDF failed — ' + (e.message || 'try again'), 'err', 4000);
  } finally {
    btn.disabled = false;
    btn.innerHTML = orig;
  }
});

$('#btn-print').addEventListener('click', () => {
  if (!state.document) {
    toast(state.lang === 'hi' ? 'पहले दस्तावेज़ बनाएं' : 'Refresh draft first', 'warn');
    return;
  }
  toast(state.lang === 'hi' ? 'प्रिंट डायलॉग खोल रहे हैं' : 'Opening print dialog…', 'ok');
  requestAnimationFrame(() => window.print());
});

$('#btn-share').addEventListener('click', async () => {
  if (!state.document) {
    toast(state.lang === 'hi' ? 'पहले दस्तावेज़ बनाएं' : 'Refresh draft first', 'warn');
    return;
  }
  const btn = $('#btn-share');
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ ' + (state.lang === 'hi' ? 'तैयार कर रहे हैं' : 'Preparing');
  toast(state.lang === 'hi' ? 'WhatsApp के लिए PDF बना रहे हैं' : 'Preparing PDF for WhatsApp', 'ok');
  let blob, filename;
  try {
    ({ blob, filename } = await _tplFetchPdfBlob());
  } catch (e) {
    btn.disabled = false; btn.innerHTML = orig;
    toast('PDF failed — ' + (e.message || 'try again'), 'err', 4000);
    return;
  }
  const file = new File([blob], filename, { type: 'application/pdf' });
  const shareData = {
    files: [file], title: filename,
    text: `${state.template?.name_en || 'Document'} — prepared via Headnote`,
  };
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share(shareData);
      toast('Shared ✓', 'ok');
    } catch (e) {
      if (e.name !== 'AbortError') {
        _tplDownloadAndOpenWA(blob, filename);
      }
    }
  } else {
    _tplDownloadAndOpenWA(blob, filename);
  }
  btn.disabled = false;
  btn.innerHTML = orig;
});

function _tplDownloadAndOpenWA(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
  const msg = `${state.template?.name_en || 'Document'} — prepared via Headnote`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
  toast(state.lang === 'hi' ? 'PDF डाउनलोड हो गया — WhatsApp में attach करें' : 'PDF downloaded — drag into WhatsApp Web', 'ok', 5000);
}
