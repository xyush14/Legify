<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<script>if(location.protocol==='http:'&&location.hostname!=='localhost'&&!location.hostname.startsWith('127.')){location.replace(location.href.replace(/^http:/,'https:'));}</script>
<title>Payment — Headnote</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/static/auth.js?v=20260522f" defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #fdfcf9; color: #0c0c0a; display: grid; place-items: center; min-height: 100vh; padding: 20px; }
  .card { background: #fff; border: 1px solid #e8e3d6; border-radius: 16px; padding: 40px 32px; max-width: 440px; width: 100%; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.06); }
  .icon { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 22px; display: grid; place-items: center; font-size: 36px; }
  .icon.loading { background: #f4efe2; border: 3px solid #c9a96e; animation: spin 1s linear infinite; }
  .icon.success { background: #d8f1de; color: #1a7a3a; }
  .icon.error { background: #fde0e0; color: #b91c1c; }
  @keyframes spin { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.01em; }
  p { color: #5d5b54; font-size: 15px; line-height: 1.5; margin-bottom: 10px; }
  .meta { background: #f8f5ec; padding: 14px 16px; border-radius: 10px; margin: 22px 0; font-size: 13px; color: #5d5b54; text-align: left; }
  .meta strong { color: #0c0c0a; }
  .btn { display: inline-block; padding: 12px 24px; border-radius: 10px; background: #0c0c0a; color: #fdfcf9; text-decoration: none; font-weight: 600; font-size: 15px; border: none; cursor: pointer; margin-top: 10px; }
  .btn.secondary { background: transparent; color: #0c0c0a; border: 1px solid #0c0c0a; }
  .small { font-size: 12px; color: #8a857a; margin-top: 16px; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="icon loading" id="icon">⏳</div>
  <h1 id="title">Confirming your payment…</h1>
  <p id="msg">Reading order status from Cashfree. This takes 2-5 seconds.</p>
  <div class="meta" id="meta" style="display:none"></div>
  <div id="actions"></div>
  <div class="small">If this takes more than 30 seconds, contact hello@headnote.in with your order ID.</div>
</div>

<script>
const $ = id => document.getElementById(id);

function getOrderId() {
  const p = new URLSearchParams(location.search);
  return p.get('order_id') || p.get('orderId') || '';
}

function showFailure(msg) {
  $('icon').className = 'icon error';
  $('icon').textContent = '✗';
  $('title').textContent = 'Payment confirmation failed';
  $('msg').textContent = msg;
  $('actions').innerHTML = `
    <a class="btn" href="/pricing">Try again</a>
    <a class="btn secondary" href="/app" style="margin-left:8px">Back to app</a>
  `;
}

function showSuccess(data) {
  $('icon').className = 'icon success';
  $('icon').textContent = '✓';
  $('title').textContent = 'Payment successful — you\'re upgraded!';
  $('msg').textContent = 'Every Headnote feature is now unlocked on your account.';
  if (data.plan) {
    $('meta').style.display = '';
    $('meta').innerHTML = `
      <div><strong>Plan:</strong> ${data.plan}</div>
      ${data.amount ? `<div><strong>Amount:</strong> ₹${data.amount}</div>` : ''}
      ${data.order_id ? `<div><strong>Order ID:</strong> ${data.order_id}</div>` : ''}
    `;
  }
  $('actions').innerHTML = `<a class="btn" href="/app">Open Headnote →</a>`;
}

function showPending(status) {
  $('icon').className = 'icon loading';
  $('icon').textContent = '⏳';
  $('title').textContent = 'Payment is still being processed';
  $('msg').textContent = `Cashfree says: ${status}. We're polling every 3 seconds. If this continues for more than a minute, your bank may be taking longer than usual.`;
  $('actions').innerHTML = `<a class="btn secondary" href="/pricing">Cancel and return</a>`;
}

async function verify() {
  const orderId = getOrderId();
  if (!orderId) {
    showFailure('No order ID in the URL. Make sure you came here from Cashfree.');
    return;
  }

  // Wait for auth before hitting /api/payments/verify (it requires Bearer).
  if (window.headnoteAuth && window.headnoteAuth.ready) {
    try { await window.headnoteAuth.ready(); } catch {}
  }
  const token = window.headnoteAuth && await window.headnoteAuth.getAccessToken();
  if (!token) {
    showFailure('Not signed in. Sign in at /app then visit this page again with your order ID.');
    return;
  }

  let attempts = 0;
  const MAX = 20;  // ~60s total

  async function poll() {
    attempts += 1;
    try {
      const r = await fetch('/api/payments/verify?order_id=' + encodeURIComponent(orderId), {
        headers: { 'Authorization': 'Bearer ' + token },
      });
      const data = await r.json();
      if (!r.ok) {
        showFailure(data.detail || ('HTTP ' + r.status));
        return;
      }
      const status = (data.status || '').toUpperCase();
      if (status === 'PAID') {
        showSuccess(data);
        return;
      }
      if (status === 'EXPIRED' || status === 'TERMINATED' || status === 'FAILED') {
        showFailure(`Order is ${status}. The payment didn't go through. Please try again.`);
        return;
      }
      // Still ACTIVE / PENDING — keep polling.
      showPending(status || 'PROCESSING');
      if (attempts < MAX) {
        setTimeout(poll, 3000);
      } else {
        showFailure('Payment is taking longer than expected. Your card may be on a slow bank network. Check your account in 5 minutes at /app — if it\'s not upgraded, contact hello@headnote.in with order ID ' + orderId);
      }
    } catch (e) {
      showFailure('Network error: ' + e.message);
    }
  }

  poll();
}

verify();
</script>
</body>
</html>
