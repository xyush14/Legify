<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
  .hi{font-family:'Noto Sans Devanagari','Geist',sans-serif;}
  .doc-wrap{display:flex;height:100vh;min-height:0;}

  /* ---- document rail ---- */
  .rail{width:288px;flex:0 0 auto;border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;background:var(--surface);}
  .rail__top{padding:18px 16px 12px;}
  .rail__h{font-size:17px;font-weight:700;letter-spacing:-0.02em;margin:0 0 14px;}
  .rail__search{position:relative;margin-bottom:11px;}
  .rail__search input{width:100%;padding-left:32px;height:38px;border-radius:9px;}
  .rail__search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--ink-3);}
  .rail__new{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;height:38px;border-radius:9px;}
  .rail__list{flex:1;overflow:auto;padding:6px 10px 16px;}
  .rail__day{font-family:'Geist Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-3);padding:12px 8px 6px;}
  .docrow{padding:11px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:background .12s,border-color .12s;}
  .docrow:hover{background:var(--soft);}
  .docrow.is-active{background:var(--soft);border-color:var(--line);}
  .docrow__t{font-size:14px;font-weight:600;color:var(--ink);line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .docrow__m{font-family:'Geist Mono',monospace;font-size:10.5px;color:var(--ink-3);margin-top:4px;}
  .rail__empty{padding:22px 14px;color:var(--ink-3);font-size:13px;line-height:1.6;}

  /* ---- reader ---- */
  .reader{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
  .reader__bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 26px;border-bottom:1px solid var(--line);flex:0 0 auto;}
  .reader__lead{display:flex;align-items:center;gap:12px;min-width:0;}
  .reader__back{display:none;border:1px solid var(--line);background:var(--surface);border-radius:8px;width:34px;height:34px;cursor:pointer;color:var(--ink-2);flex:0 0 auto;align-items:center;justify-content:center;}
  .reader__back:hover{border-color:var(--ink-3);color:var(--ink);}
  .reader__heading{min-width:0;}
  .reader__heading h1{font-size:15px;font-weight:600;letter-spacing:-0.01em;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .reader__heading .sub{font-family:'Geist Mono',monospace;font-size:10.5px;color:var(--ink-3);margin-top:2px;}
  .reader__acts{display:flex;align-items:center;gap:10px;flex:0 0 auto;}
  /* language pill */
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;}
  .seg button{border:0;background:var(--surface);font:inherit;font-size:12px;font-weight:500;color:var(--ink-2);padding:6px 14px;cursor:pointer;border-left:1px solid var(--line);transition:background .12s,color .12s;}
  .seg button:first-child{border-left:0;}
  .seg button.is-active{background:var(--ink);color:#fff;}
  .kebab{border:1px solid var(--line);background:var(--surface);border-radius:8px;width:34px;height:34px;cursor:pointer;color:var(--ink-3);font-size:16px;line-height:1;}
  .kebab:hover{border-color:var(--ink-3);color:var(--ink);}
  .menu{position:absolute;top:42px;right:0;background:var(--surface);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow-lift);z-index:50;min-width:170px;padding:6px;display:none;}
  .menu.open{display:block;}
  .menu button{display:block;width:100%;text-align:left;border:0;background:none;font:inherit;font-size:13px;color:var(--ink);padding:9px 11px;border-radius:7px;cursor:pointer;}
  .menu button:hover{background:var(--soft);}
  .menu button.danger{color:var(--bad);}
  .pos-rel{position:relative;}

  /* reading surface — text is the hero */
  .reader__scroll{flex:1;overflow:auto;}
  .article{max-width:760px;margin:0 auto;padding:40px 40px 80px;}
  .scan{float:right;width:172px;margin:4px 0 18px 28px;cursor:zoom-in;}
  .scan__frame{border:1px solid var(--line);border-radius:10px;padding:8px;background:var(--surface-2,#f6f6f4);position:relative;transition:border-color .15s;}
  .scan:hover .scan__frame{border-color:var(--ink-3);}
  .scan__frame img{width:100%;display:block;border-radius:5px;background:#fff;border:1px solid var(--line);}
  .scan__zoom{position:absolute;bottom:14px;right:14px;background:var(--surface);border:1px solid var(--line);border-radius:7px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--ink-2);}
  .scan__badge{position:absolute;top:14px;left:14px;background:rgba(0,0,0,.62);color:#fff;font-family:'Geist Mono',monospace;font-size:10px;border-radius:999px;padding:2px 8px;}
  .scan__cap{font-family:'Geist Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:0.07em;color:var(--ink-3);text-align:center;margin-top:8px;}
  .doctext{font-family:'Source Serif 4','Noto Sans Devanagari',Georgia,serif;font-size:17.5px;line-height:1.85;color:var(--ink);word-wrap:break-word;}
  .doctext.is-hi{font-family:'Noto Sans Devanagari','Source Serif 4',serif;font-size:17px;line-height:1.9;}
  .doctext h2{font-family:'Geist',sans-serif;font-size:17px;font-weight:600;letter-spacing:-0.01em;line-height:1.35;margin:1.7em 0 .6em;color:var(--ink);}
  .doctext.is-hi h2{font-family:'Noto Sans Devanagari','Geist',sans-serif;}
  .doctext h2:first-child{margin-top:0;}
  .doctext h3,.doctext h4{font-family:'Geist',sans-serif;font-size:14.5px;font-weight:600;margin:1.3em 0 .4em;color:var(--ink-2);text-transform:none;}
  .doctext p{margin:0 0 1.05em;}
  .doctext ul,.doctext ol{margin:0 0 1.05em;padding-left:1.45em;}
  .doctext li{margin:.25em 0;padding-left:.15em;}
  .doctext p:last-child,.doctext ul:last-child,.doctext ol:last-child{margin-bottom:0;}
  .doctext .muted{color:var(--ink-3);}
  .miniload{font-size:13px;color:var(--ink-3);display:inline-flex;align-items:center;gap:9px;font-family:'Geist',sans-serif;}
  .spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--ink-2);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* empty reader */
  .reader__empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--ink-3);gap:16px;padding:40px;}
  .reader__empty .ic{width:46px;height:46px;border-radius:50%;border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-3);}
  .reader__empty .ic svg{width:22px;height:22px;}
  .reader__empty h2{font-size:17px;color:var(--ink-2);font-weight:600;margin:0;letter-spacing:-0.01em;}
  .reader__empty p{font-size:14px;max-width:360px;line-height:1.65;margin:0;}

  /* lightbox */
  .lb{position:fixed;inset:0;background:rgba(18,18,16,.86);z-index:200;display:none;flex-direction:column;}
  .lb.is-open{display:flex;}
  .lb__bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;color:#fff;flex:0 0 auto;}
  .lb__bar .t{font-size:13px;font-weight:500;opacity:.9;}
  .lb__x{background:rgba(255,255,255,.12);border:0;color:#fff;border-radius:9px;width:38px;height:38px;font-size:20px;cursor:pointer;}
  .lb__x:hover{background:rgba(255,255,255,.22);}
  .lb__body{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;gap:18px;padding:0 16px 28px;}
  .lb__body img{max-width:min(920px,100%);border-radius:8px;background:#fff;box-shadow:0 12px 40px rgba(0,0,0,.4);cursor:zoom-in;}
  .lb__body img.zoomed{max-width:none;width:auto;cursor:zoom-out;}

  /* ---- mobile ---- */
  .reader__heading .sub.show-m{display:none;}
  @media (max-width:768px){
    .doc-wrap{height:auto;min-height:100vh;}
    .rail{width:100%;border-right:0;height:auto;min-height:100vh;}
    .reader{display:none;}
    body.show-reader .rail{display:none;}
    body.show-reader .reader{display:flex;min-height:100vh;}
    .reader__back{display:flex;}
    .article{padding:22px 18px 70px;}
    .scan{float:none;width:100%;margin:0 0 18px;display:flex;gap:12px;align-items:center;cursor:zoom-in;}
    .scan__frame{padding:6px;width:62px;flex:0 0 auto;}
    .scan__zoom,.scan__cap{display:none;}
    .scan__hint{font-size:12px;color:var(--ink-2);}
    .scan__hint small{display:block;color:var(--ink-3);font-size:11px;margin-top:2px;}
    .doctext{font-size:16.5px;}
    .reader__bar{padding:12px 14px;}
    .article{max-width:none;}
  }
  @media (min-width:769px){ .scan__hint{display:none;} }
</style>
</head>

<!-- lightbox -->
<div class="lb" id="lb">
  <div class="lb__bar">
    <div class="t hi" id="lbTitle"></div>

<div class="toasts" id="toasts"></div>

<script>
const $ = s => document.querySelector(s);
let DOCS=[], CUR=null, CURID=null, blobURLs=[], curLang='en';

function authToken(){ try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i);
  if(/sb-.*-auth-token/.test(k)){ const v=JSON.parse(localStorage.getItem(k)); if(v&&v.access_token) return v.access_token; if(Array.isArray(v)&&v[0]) return v[0]; } } }catch(e){} return null; }
function H(json){ const h=json?{'Content-Type':'application/json'}:{}; const t=authToken(); if(t) h.Authorization='Bearer '+t; return h; }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(m,kind){ const t=document.createElement('div'); t.className='toast'+(kind?' toast--'+kind:''); t.textContent=m; $('#toasts').appendChild(t); setTimeout(()=>t.remove(),3600); }
function fmtDate(s){ try{ return new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }catch(e){ return ''; } }
function isHindi(t){ // majority script, not mere presence — scans often carry a stray Devanagari word
  const s=t||''; const dev=(s.match(/[ऀ-ॿ]/g)||[]).length; const lat=(s.match(/[A-Za-z]/g)||[]).length;
  return dev>lat; }

/* ---- rail ---- */
function railRow(d){
  const m=[d.doc_type, (d.page_count?d.page_count+' pg':''), fmtDate(d.created_at)].filter(Boolean).join(' · ');
  return `<div class="docrow${d.id===CURID?' is-active':''}" onclick="selectDoc('${d.id}')">
    <div class="docrow__t hi">${esc(d.title)}</div>
    <div class="docrow__m">${esc(m)}</div>
  </div>`;
}
function renderRail(list){
  if(!list.length){ $('#list').innerHTML=`<div class="rail__empty">No documents yet. Tap <b>New document</b> to scan one.</div>`; return; }
  $('#list').innerHTML=`<div class="rail__day">All documents</div>`+list.map(railRow).join('');
}

/* ---- reader ---- */
function clearBlobs(){ blobURLs.forEach(u=>URL.revokeObjectURL(u)); blobURLs=[]; }

// Minimal, safe Markdown → HTML for the reader. Escapes first (OCR text is
// untrusted), then structures headings / paragraphs / lists. Plain text (old
// docs, translations) still renders sensibly as paragraphs.
function mdToHtml(src){
  const esc=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const inline=s=>s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  const lines=(src||'').replace(/\r/g,'').replace(/^```[a-z]*\s*|\s*```$/g,'').split('\n');
  let html='', para=[], list=[], listType=null;
  // A short, mostly-UPPERCASE single line reads as a section heading even when
  // the model didn't emit '## ' — catches form titles like "REMARKS BY MEDICAL OFFICER".
  const headish=s=>{ if(s.length>60) return false; const L=(s.match(/[A-Za-z]/g)||[]); if(L.length<6) return false; return (s.match(/[A-Z]/g)||[]).length/L.length>=0.8; };
  const flushP=()=>{ if(!para.length) return;
    if(para.length===1 && headish(para[0])) html+='<h2>'+inline(esc(para[0]))+'</h2>';
    else html+='<p>'+inline(esc(para.join(' ')))+'</p>';
    para=[]; };
  const flushL=()=>{ if(list.length){ html+='<'+listType+'>'+list.map(li=>'<li>'+inline(esc(li))+'</li>').join('')+'</'+listType+'>'; list=[]; listType=null; } };
  for(const raw of lines){
    const line=raw.trim(); let m;
    if(!line){ flushP(); flushL(); continue; }
    if(m=line.match(/^(#{1,6})\s+(.*)$/)){ flushP(); flushL(); const lvl=Math.min(m[1].length+1,4); html+='<h'+lvl+'>'+inline(esc(m[2]))+'</h'+lvl+'>'; continue; }
    if(m=line.match(/^[-*•]\s+(.*)$/)){ flushP(); if(listType!=='ul'){flushL();listType='ul';} list.push(m[1]); continue; }
    // numbered items ("1. Injury") are kept VERBATIM as their own line — never
    // re-numbered by an <ol> (the digit is part of the scanned text).
    flushL(); para.push(line);
  }
  flushP(); flushL();
  return html || '<p class="muted">(no text)</p>';
}
function setText(t){ const el=$('#docText'); el.innerHTML=mdToHtml(t||''); el.classList.toggle('is-hi', isHindi(t)); }

async function selectDoc(id){
  CURID=id; renderRail(DOCS);
  $('#readerEmpty').style.display='none'; $('#readerDoc').style.display='flex';
  document.body.classList.add('show-reader');
  try{
    const r=await fetch('/api/documents/'+id,{headers:H()}); CUR=await r.json(); CUR._tr={};
    if(!r.ok) throw new Error(CUR.detail||'not found');
    $('#rTitle').textContent=CUR.title;
    $('#rSub').textContent=[CUR.doc_type, (CUR.page_count?CUR.page_count+' page'+(CUR.page_count>1?'s':''):''), fmtDate(CUR.created_at)].filter(Boolean).join(' · ');
    // default language = the document's own language; show original, no network call
    curLang = isHindi(CUR.full_text) ? 'hi' : 'en';
    CUR._tr[curLang] = CUR.full_text || '';
    document.querySelectorAll('#seg button').forEach(b=>b.classList.toggle('is-active', b.dataset.l===curLang));
    setText(CUR.full_text);
    loadPages(CUR);
  }catch(e){ toast(e.message,'error'); }
}
function backToList(){ document.body.classList.remove('show-reader'); }

async function loadPages(d){
  clearBlobs(); const scan=$('#scan'); scan.style.display='none';
  const n=d.page_count||1; const urls=[];
  for(let i=0;i<n;i++){
    try{ const r=await fetch(`/api/documents/${d.id}/page/${i}`,{headers:H()});
      if(!r.ok) continue; const b=await r.blob(); const u=URL.createObjectURL(b); blobURLs.push(u); urls.push(u);
    }catch(e){}
  }
  CUR._pages=urls;
  if(urls.length){ $('#scanImg').src=urls[0]; scan.style.display='';
    const badge=$('#scanBadge'); if(urls.length>1){ badge.textContent='1 / '+urls.length; badge.style.display=''; $('#scanHintSub').textContent=urls.length+' pages · tap to view'; } else { badge.style.display='none'; }
  }
}

async function setLang(lang){
  curLang=lang;
  document.querySelectorAll('#seg button').forEach(b=>b.classList.toggle('is-active', b.dataset.l===lang));
  if(!CUR) return;
  if(CUR._tr[lang]!=null){ setText(CUR._tr[lang]); return; }
  $('#docText').innerHTML='<span class="miniload"><span class="spin"></span> translating…</span>';
  try{ const r=await fetch(`/api/documents/${CUR.id}/translate?lang=${lang}`,{headers:H()});
    const d=await r.json(); if(!r.ok) throw new Error(d.detail||'translate failed');
    CUR._tr[lang]=d.text; if(curLang===lang) setText(d.text);
  }catch(e){ setText(CUR.full_text); toast(e.message,'error'); } }

/* ---- lightbox ---- */
function openLightbox(){ if(!CUR||!CUR._pages||!CUR._pages.length) return;
  $('#lbTitle').textContent=CUR.title;
  $('#lbBody').innerHTML=CUR._pages.map((u,i)=>`<img src="${u}" alt="page ${i+1}" onclick="this.classList.toggle('zoomed')" />`).join('');
  $('#lb').classList.add('is-open'); }
function closeLightbox(){ $('#lb').classList.remove('is-open'); }

/* ---- actions ---- */
function downloadText(){ if(!CUR) return; const t=(CUR._tr&&CUR._tr[curLang]!=null)?CUR._tr[curLang]:(CUR.full_text||'');
  const blob=new Blob([t],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=(CUR.title||'document').replace(/[^\wऀ-ॿ -]+/g,'').slice(0,60)+'.txt'; a.click(); URL.revokeObjectURL(a.href); }

function toggleMenu(ev){ ev.stopPropagation(); $('#menu').classList.toggle('open'); }
document.addEventListener('click',()=>{ const m=$('#menu'); if(m) m.classList.remove('open'); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeLightbox(); } });

async function deleteCur(){ if(!CUR||!confirm('Delete this document?')) return;
  try{ await fetch('/api/documents/'+CUR.id,{method:'DELETE',headers:H()}); toast('Deleted');
    CURID=null; CUR=null; clearBlobs(); $('#readerDoc').style.display='none'; $('#readerEmpty').style.display='flex'; backToList();
    await load();
  }catch(e){ toast(e.message,'error'); } }

/* ---- upload ---- */
$('#file').addEventListener('change',async()=>{ const fs=$('#file').files; if(!fs||!fs.length) return;
  const fd=new FormData(); Array.from(fs).forEach(f=>fd.append('files',f));
  fd.append('title', fs[0].name.replace(/\.[^.]+$/,'')); fd.append('doc_type','');
  toast('Reading the document…');
  try{ const r=await fetch('/api/documents/upload',{method:'POST',headers:H(),body:fd});
    const d=await r.json(); if(!r.ok) throw new Error(d.detail||'upload failed');
    toast('Saved','success'); $('#file').value=''; await load(); if(d.document) selectDoc(d.document.id);
  }catch(e){ toast(e.message,'error'); $('#file').value=''; } });

const re=$('#readerEmpty');
re.addEventListener('dragover',e=>e.preventDefault());
re.addEventListener('drop',e=>{e.preventDefault(); if(e.dataTransfer.files.length){ $('#file').files=e.dataTransfer.files; $('#file').dispatchEvent(new Event('change')); }});

/* ---- search ---- */
let sT=null;
$('#search').addEventListener('input',()=>{ clearTimeout(sT); const q=$('#search').value.trim();
  sT=setTimeout(async()=>{ if(!q){ renderRail(DOCS); return; }
    try{ const r=await fetch('/api/documents/search?q='+encodeURIComponent(q),{headers:H()});
      const d=await r.json(); renderRail(d.results||[]); }catch(e){} }, 280); });

/* ---- load ---- */
async function load(){ try{ const r=await fetch('/api/documents',{headers:H()}); DOCS=(await r.json()).items||[];
  renderRail(DOCS);
  const wide = window.matchMedia('(min-width:769px)').matches;
  if(wide && !CURID && DOCS.length) selectDoc(DOCS[0].id);
  if(!DOCS.length){ $('#readerDoc').style.display='none'; $('#readerEmpty').style.display='flex'; }
  }catch(e){ toast('Could not load documents: '+e.message,'error'); } }
load();
</script>
</body>
</html>
