<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Headnote</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    :root{ --ink:#1a1a1a; --muted:#6b6b6b; --line:#e6e2d9; --soft:#f6f4ee; --gold:#b8860b; --bad:#c0392b; --ok:#2e9e5b; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);font-size:13px;line-height:1.5;background:#fff}
    .mono{font-family:ui-monospace,"Cascadia Mono",Menlo,monospace}
    /* header */
    header{display:flex;align-items:center;gap:9px;padding:12px 16px;border-bottom:1px solid var(--line)}
    header img{height:18px;width:auto;display:block}
    header .ctx{margin-left:auto;font-size:10.5px;color:var(--muted);font-family:ui-monospace,monospace;text-transform:lowercase}
    /* sections */
    .sec{padding:14px 16px;border-bottom:1px solid var(--line)}
    .sec__h{display:flex;align-items:center;gap:8px;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
    .sec__h .in-en{margin-left:auto;font-size:10px;color:var(--gold);text-transform:none}
    /* fields */
    .f{margin:0 0 11px}
    .f__lab{display:block;font-size:10.5px;color:var(--muted);margin:0 0 3px}
    .f__in{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;background:#fff}
    .f__in:focus{outline:none;border-color:var(--gold)}
    .f--changed .f__in{border-color:var(--gold);background:#fffdf5}
    textarea.f__in{resize:vertical;min-height:80px}
    /* buttons */
    .btn{background:var(--ink);color:#fff;border:1px solid var(--ink);border-radius:8px;padding:9px 14px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;width:100%}
    .btn:hover{opacity:.9} .btn:disabled{opacity:.5;cursor:default}
    .btn--ghost{background:#fff;color:var(--ink)}
    .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
    .chip{background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 12px;font:inherit;font-size:12px;cursor:pointer;color:var(--ink)}
    .chip:hover{background:var(--soft);border-color:var(--gold)}
    .ask{display:flex;gap:8px;align-items:flex-end}
    .ask textarea{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;resize:none;min-height:38px}
    .ask textarea:focus{outline:none;border-color:var(--gold)}
    .ask button{flex:0 0 auto;width:auto;padding:9px 12px}
    .status{font-size:12px;min-height:15px;margin-top:8px}
    .status.err{color:var(--bad)} .status.busy{color:var(--muted)} .status.ok{color:var(--ok)}
    .empty{color:var(--muted);font-size:12.5px}
    .prov{font-size:12px;color:var(--muted);background:var(--soft);border-radius:8px;padding:8px 11px;margin-top:10px}
    .prov b{color:var(--ink)}
    .hidden{display:none}
    .quiet{font-size:11px;color:var(--muted);margin-top:6px}
  </style>
</head>
<body>
  <header>
    <img src="/static/headnote-logo.svg" alt="Headnote" />
    <span class="ctx" id="ctx">reading…</span>
  </header>

  <!-- SELECTION MODE — appears when text is selected in the document -->
  <section class="sec hidden" id="sel-sec">
    <div class="sec__h">selected text</div>
    <div class="chips">
      <button class="chip" data-act="formalise">Formalise</button>
      <button class="chip" data-act="strengthen">Strengthen</button>
      <button class="chip" data-act="shorten">Shorten</button>
      <button class="chip" data-act="simplify">Simplify</button>
      <button class="chip" data-act="translate">हिं ⇄ EN</button>
      <button class="chip" data-act="rewrite">Rewrite…</button>
    </div>
    <div class="status" id="sel-status"></div>
  </section>

  <!-- ADAPT MODE — the open draft's auto-detected fields -->
  <section class="sec" id="fields-sec">
    <div class="sec__h">this draft’s details <span class="in-en" id="in-en-note">type in English — lands in हिंदी</span></div>
    <div id="fields-body"><div class="empty" id="fields-empty">Reading the open document…</div></div>
    <button class="btn" id="apply-btn" style="margin-top:4px" disabled>Apply changes</button>
    <div class="status" id="fields-status"></div>
    <div class="quiet"><a href="#" id="rescan">↻ Re-scan document</a></div>
  </section>

  <!-- DRAFT MODE — shown when the document is empty -->
  <section class="sec hidden" id="draft-sec">
    <div class="sec__h">start a draft</div>
    <textarea class="f__in" id="draft-input" rows="3" placeholder="Describe the matter — e.g. सत्र न्यायालय ग्वालियर में नियमित जमानत, FIR 123/2025 थाना पनिहार, धारा 420/406, एकमात्र कमाने वाला…"></textarea>
    <button class="btn" id="draft-btn" style="margin-top:9px">Draft it →</button>
    <div class="status" id="draft-status"></div>
  </section>

  <!-- ASK — always available -->
  <section class="sec" id="ask-sec" style="border-bottom:0">
    <div class="sec__h">ask headnote</div>
    <div class="ask">
      <textarea id="ask-input" rows="1" placeholder="e.g. add a ground on parity · change the court to CJM"></textarea>
      <button class="btn" id="ask-btn">→</button>
    </div>
    <div class="status" id="ask-status"></div>
  </section>

  <script>
  (function(){
    "use strict";
    var $ = function(id){ return document.getElementById(id); };
    var ready = false;
    var state = { lang:"hi", fields:[], facts:null, hasContent:false, selText:"" };

    Office.onReady(function(info){
      ready = (info.host === Office.HostType.Word);
      if(!ready){ document.body.innerHTML = '<p style="padding:16px">Open this inside Microsoft Word.</p>'; return; }
      Office.context.document.addHandlerAsync(Office.EventType.DocumentSelectionChanged, onSelectionChanged);
      scanDoc();
    });

    // ---------- helpers ----------
    function isHindi(s){ return /[ऀ-ॿ]/.test(s||""); }
    function status(el,msg,cls){ el.className = "status " + (cls||""); el.textContent = msg||""; }
    function setCtx(t){ $("ctx").textContent = t; }
    async function post(path, payload){
      var r = await fetch(path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)});
      var j = await r.json();
      if(!r.ok || (j && j.ok===false)) throw new Error((j && (j.error||j.detail)) || ("HTTP "+r.status));
      return j;
    }
    async function getBodyText(){
      var out=""; await Word.run(async function(ctx){ var b=ctx.document.body; b.load("text"); await ctx.sync(); out=b.text||""; }); return out;
    }
    async function getSelText(){
      var out=""; await Word.run(async function(ctx){ var s=ctx.document.getSelection(); s.load("text"); await ctx.sync(); out=s.text||""; }); return out;
    }
    // Surgical find-and-replace — every occurrence of `oldV` becomes `newV`. Word's
    // search API keeps the rest of the document (court name, format, other fields) exactly.
    async function replaceEverywhere(oldV, newV){
      if(!oldV || oldV===newV) return 0;
      var n=0;
      await Word.run(async function(ctx){
        // search is limited to ~255 chars & no wildcards — fine for names/numbers/sections
        var res = ctx.document.body.search(oldV.slice(0,255), {matchCase:false, matchWholeWord:false, ignorePunct:false});
        res.load("items"); await ctx.sync();
        res.items.forEach(function(rg){ rg.insertText(newV, Word.InsertLocation.replace); n++; });
        await ctx.sync();
      });
      return n;
    }
    async function replaceSelectionTracked(text){
      await Word.run(async function(ctx){
        try{ ctx.document.changeTrackingMode = Word.ChangeTrackingMode.trackAll; }catch(e){}
        ctx.document.getSelection().insertText(text, Word.InsertLocation.replace);
        await ctx.sync();
      });
    }
    function show(id,on){ $(id).classList.toggle("hidden", !on); }

    // ---------- ADAPT: detect the open draft's fields ----------
    async function scanDoc(){
      setCtx("reading…");
      try{
        var text = await getBodyText();
        state.hasContent = !!text.trim();
        if(!state.hasContent){
          show("draft-sec", true); show("fields-sec", false);
          setCtx("empty doc"); return;
        }
        show("draft-sec", false); show("fields-sec", true);
        var res = await post("/api/draft/detect-fields", { text: text, lang: "auto" });
        state.lang = res.lang || (isHindi(text) ? "hi" : "en");
        state.fields = (res.fields||[]).map(function(f){ return {key:f.key, label:f.label, orig:f.value, val:f.value}; });
        state.facts = res.facts && res.facts.value ? {orig:res.facts.value, val:res.facts.value} : null;
        renderFields();
        setCtx(state.fields.length + " fields · " + (state.lang==="hi"?"हिंदी":"English"));
        $("in-en-note").style.display = state.lang==="hi" ? "" : "none";
      }catch(e){
        $("fields-body").innerHTML = '<div class="empty">Couldn’t read the draft’s fields — you can still select text to edit, or use Ask.</div>';
        setCtx("ready");
      }
    }
    function renderFields(){
      var host = $("fields-body"); host.innerHTML = "";
      if(!state.fields.length && !state.facts){
        host.innerHTML = '<div class="empty">No editable details detected. Select text in the document to edit it, or use Ask below.</div>';
        $("apply-btn").disabled = true; return;
      }
      state.fields.forEach(function(f,i){
        var d = document.createElement("div"); d.className="f";
        d.innerHTML = '<label class="f__lab">'+esc(f.label)+'</label><input class="f__in" data-i="'+i+'" value="'+esc(f.val)+'">';
        host.appendChild(d);
      });
      if(state.facts){
        var d = document.createElement("div"); d.className="f";
        d.innerHTML = '<label class="f__lab">Story / facts</label><textarea class="f__in" data-facts="1" rows="4">'+esc(state.facts.val)+'</textarea>';
        host.appendChild(d);
      }
      host.querySelectorAll(".f__in").forEach(function(el){
        el.addEventListener("input", function(){
          if(el.dataset.facts){ state.facts.val = el.value; }
          else { state.fields[+el.dataset.i].val = el.value; }
          var changed = el.dataset.facts ? (state.facts.val!==state.facts.orig) : (state.fields[+el.dataset.i].val!==state.fields[+el.dataset.i].orig);
          el.closest(".f").classList.toggle("f--changed", changed);
          refreshApply();
        });
      });
      refreshApply();
    }
    function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function changedFields(){ return state.fields.filter(function(f){ return f.val.trim() && f.val!==f.orig; }); }
    function refreshApply(){
      var any = changedFields().length>0 || (state.facts && state.facts.val!==state.facts.orig);
      $("apply-btn").disabled = !any;
    }

    $("apply-btn").addEventListener("click", applyChanges);
    async function applyChanges(){
      var changed = changedFields();
      var factsChanged = state.facts && state.facts.val!==state.facts.orig;
      if(!changed.length && !factsChanged) return;
      $("apply-btn").disabled = true; status($("fields-status"), "Applying your changes…", "busy");
      try{
        // English → document language (names transliterate, numbers/sections preserved)
        var newVals = {};
        changed.forEach(function(f){ newVals[f.key] = f.val; });
        if(factsChanged) newVals.__facts = state.facts.val;
        if(state.lang==="hi"){
          try{
            var tr = await post("/api/draft/translate-fields", { fields: newVals, target: "hi" });
            if(tr && tr.translated) newVals = Object.assign(newVals, tr.translated);
          }catch(e){ /* fall back to as-typed */ }
        }
        // Surgical replace — each changed particular, everywhere it occurs. Untouched
        // fields, court name, format all stay exactly as they are.
        var total = 0;
        for(var i=0;i<changed.length;i++){
          var f = changed[i];
          var cnt = await replaceEverywhere(f.orig, newVals[f.key] || f.val);
          if(cnt){ f.orig = newVals[f.key] || f.val; total += cnt; }
        }
        if(factsChanged){
          var c = await replaceEverywhere(state.facts.orig, newVals.__facts || state.facts.val);
          if(c){ state.facts.orig = newVals.__facts || state.facts.val; total += c; }
        }
        renderFields();
        status($("fields-status"), total ? ("Updated in the document ("+total+" change"+(total>1?"s":"")+"). Court & format untouched.") : "Couldn’t locate those values in the document — they may have been edited by hand.", total?"ok":"err");
      }catch(e){ status($("fields-status"), e.message||String(e), "err"); }
      refreshApply();
    }
    $("rescan").addEventListener("click", function(e){ e.preventDefault(); scanDoc(); });

    // ---------- SELECT-TO-ACT ----------
    var _selTimer=null;
    function onSelectionChanged(){ clearTimeout(_selTimer); _selTimer=setTimeout(refreshSelection, 250); }
    async function refreshSelection(){
      if(!ready) return;
      try{ state.selText = (await getSelText()).trim(); }catch(e){ state.selText=""; }
      show("sel-sec", !!state.selText);
    }
    document.querySelectorAll("#sel-sec .chip").forEach(function(c){
      c.addEventListener("click", function(){ actOnSelection(c.dataset.act); });
    });
    // Scoped edit of ONLY the selection via /edit-selection — fast, returns just the
    // revised snippet (never a whole draft), applied as a tracked change.
    async function actOnSelection(act){
      if(!state.selText){ status($("sel-status"),"Select some text first.","err"); return; }
      var instruction = null;
      if(act==="rewrite"){
        instruction = ($("ask-input").value.trim()) || window.prompt("How should this be rewritten?");
        if(!instruction) return;
      }
      status($("sel-status"),"Working…","busy");
      try{
        var lang = isHindi(state.selText) ? "hi" : "en";
        var res = await post("/api/draft/edit-selection", { text: state.selText, action: act, instruction: instruction, lang: lang });
        var out = (res.text || "").trim();
        if(!out) throw new Error("No change produced.");
        await replaceSelectionTracked(out);   // tracked change → Accept all in Word's Review tab
        status($("sel-status"),"Done — shown as a tracked change (Review ▸ Accept all).","ok");
        if(act==="rewrite") $("ask-input").value="";
      }catch(e){ status($("sel-status"), e.message||String(e), "err"); }
    }
    function htmlToText(html){
      var d=document.createElement("div"); d.innerHTML=html||"";
      d.querySelectorAll("p,div,br,li").forEach(function(n){ n.insertAdjacentText("afterend","\n"); });
      return (d.textContent||"").replace(/\n{2,}/g,"\n").trim();
    }

    // ---------- DRAFT (empty doc) ----------
    $("draft-btn").addEventListener("click", async function(){
      var prompt = $("draft-input").value.trim();
      if(!prompt){ status($("draft-status"),"Describe the matter first.","err"); return; }
      this.disabled=true; status($("draft-status"),"Drafting in court format…","busy");
      try{
        var res = await post("/api/draft/from-prompt", { prompt: prompt, lang:"auto" });
        if(res.doc_type && res.editor_fields && Object.keys(res.editor_fields).length){
          var r2 = await post("/api/draft/render-docx", { doc_type:res.doc_type, fields:res.editor_fields, lang:res.lang||"hi" });
          await Word.run(async function(ctx){ ctx.document.body.insertFileFromBase64(r2.docx_base64, Word.InsertLocation.end); await ctx.sync(); });
        } else {
          await Word.run(async function(ctx){ ctx.document.getSelection().insertHtml(res.html_hi||res.html_en||"", Word.InsertLocation.replace); await ctx.sync(); });
        }
        status($("draft-status"),"Draft inserted. Scanning its fields…","ok");
        setTimeout(scanDoc, 800);
      }catch(e){ status($("draft-status"), e.message||String(e), "err"); }
      this.disabled=false;
    });

    // ---------- ASK ----------
    $("ask-btn").addEventListener("click", doAsk);
    $("ask-input").addEventListener("keydown", function(e){ if((e.metaKey||e.ctrlKey)&&e.key==="Enter") doAsk(); });
    async function doAsk(){
      var q = $("ask-input").value.trim();
      if(!q){ return; }
      // If text is selected, treat the ask as an instruction on that selection.
      if(state.selText){ status($("ask-status"),"",""); return actOnSelection("rewrite"); }
      // Empty doc → draft it.
      if(!state.hasContent){ $("draft-input").value = q; return $("draft-btn").click(); }
      status($("ask-status"),"Working on the whole draft…","busy");
      try{
        var body = await getBodyText();
        var lang = isHindi(body) ? "hi" : "en";
        var res = await post("/api/draft/refine", { prev_html: body, instruction: q, doc_type:"other_criminal", lang: lang });
        // Insert the change at the cursor as a tracked change rather than nuking the doc.
        var out = htmlToText(res.html || res.html_hi || res.html_en || "");
        await Word.run(async function(ctx){ try{ ctx.document.changeTrackingMode=Word.ChangeTrackingMode.trackAll; }catch(e){} ctx.document.getSelection().insertText("\n"+out, Word.InsertLocation.end); await ctx.sync(); });
        status($("ask-status"),"Added as a tracked change — review & accept in Word.","ok");
        $("ask-input").value="";
      }catch(e){ status($("ask-status"), e.message||String(e), "err"); }
    }
  })();
  </script>
</body>
</html>
