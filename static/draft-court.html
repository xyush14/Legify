<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<script>if(location.protocol==='http:'&&location.hostname!=='localhost'&&!location.hostname.startsWith('127.')){location.replace(location.href.replace(/^http:/,'https:'));}</script>
<title>Drafting — Headnote</title>
<meta name="description" content="Court-specific drafting templates for Indian criminal advocates." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/static/auth.js?v=20260527a" defer></script>

<style>
  :root {
    --bg: #fdfcf9;
    --card: #ffffff;
    --ink: #0c0c0a;
    --ink-2: #2a2a26;
    --ink-3: #5d5b54;
    --ink-4: #8a857a;
    --line: #e8e3d6;
    --gold: #c9a96e;
    --gold-deep: #8c7549;
    --gold-tint: #f9f3e3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Geist', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(253, 252, 249, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 18px;
  }
  .topbar__back {
    font-size: 13px; color: var(--ink-3);
    display: flex; align-items: center; gap: 6px;
  }
  .topbar__back:hover { color: var(--ink); }
  .topbar__crumb {
    font-family: 'Geist Mono', monospace;
    font-size: 12px; color: var(--ink-3);
    margin-left: auto;
  }
  .topbar__crumb .court { color: var(--gold-deep); }

  main { max-width: 1180px; margin: 0 auto; padding: 40px 24px 80px; }

  .head { margin-bottom: 36px; }
  .head__eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 11px; color: var(--gold-deep);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 8px;
  }
  .head__title {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.05;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .head__title-hi {
    font-family: 'Noto Sans Devanagari', 'Geist', sans-serif;
    font-size: 18px;
    color: var(--ink-3);
    font-weight: 500;
  }
  .head__count {
    margin-top: 14px;
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    color: var(--ink-4);
  }

  .section-label {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--ink-4);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 28px 0 14px;
    font-weight: 500;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .tile {
    display: flex; flex-direction: column; gap: 4px;
    padding: 22px 22px 18px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    color: var(--ink);
    text-align: left;
    min-height: 124px;
    font-family: inherit;
    position: relative;
    overflow: hidden;
  }
  .tile::before {
    /* Subtle left gold rail — keeps the eye locked to the tile title */
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
    opacity: 0;
    transition: opacity 0.18s ease;
  }
  .tile:hover {
    transform: translateY(-3px);
    border-color: var(--gold);
    box-shadow: 0 14px 32px -16px rgba(140,117,73,0.28);
  }
  .tile:hover::before { opacity: 0.7; }
  .tile.tile--popular {
    background: linear-gradient(180deg, var(--gold-tint), #fff 65%);
  }
  .tile.tile--popular::before { opacity: 0.85; }

  .tile__name {
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.015em;
    line-height: 1.25;
  }
  .tile__name-hi {
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: 13px;
    color: var(--ink-3);
    margin-top: 3px;
    line-height: 1.35;
  }
  .tile__desc {
    /* Geist for body — easier to scan than mono, less visual noise */
    font-family: inherit;
    font-size: 12.5px;
    color: var(--ink-3);
    margin-top: 10px;
    line-height: 1.5;
  }
  .tile__tag {
    margin-top: auto;
    padding-top: 12px;
    align-self: flex-start;
    font-family: 'Geist Mono', monospace;
    font-size: 9.5px; font-weight: 600;
    color: var(--ink-4);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* "Coming soon" tiles — disabled state. Used for Supreme Court for now */
  .tile.tile--soon {
    background: #faf8f3;
    border-style: dashed;
    cursor: not-allowed;
    opacity: 0.78;
  }
  .tile.tile--soon:hover {
    transform: none;
    border-color: var(--line);
    box-shadow: none;
  }
  .tile.tile--soon:hover::before { opacity: 0; }
  .tile.tile--soon .tile__name { color: var(--ink-3); }
  .tile.tile--soon .tile__soon-badge {
    position: absolute;
    top: 14px; right: 14px;
    background: #fff;
    color: var(--gold-deep);
    border: 1px solid #e8dcbb;
    font-family: 'Geist Mono', monospace;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 100px;
  }

  .empty-state {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 12px;
    padding: 36px 24px;
    text-align: center;
    color: var(--ink-3);
  }
  .empty-state h3 {
    font-size: 16px; color: var(--ink);
    margin-bottom: 6px;
  }
  .empty-state p {
    font-size: 13px;
    color: var(--ink-3);
  }

  /* Filter chips */
  .filter-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }
  .filter-chip {
    display: inline-flex; align-items: center;
    font-family: 'Geist Mono', monospace;
    font-size: 11.5px;
    font-weight: 500;
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-3);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    white-space: nowrap;
  }
  .filter-chip:hover { border-color: var(--gold); color: var(--ink); }
  .filter-chip.active {
    background: var(--ink);
    border-color: var(--ink);
    color: #fff;
  }

  .procedural-rail {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 10px;
  }

  /* ─── Personal-assist CTA ─────────────────────────────────────── */
  .assist-cta {
    background: #faf7ed;
    border: 1px solid #ece3c8;
    border-left: 3px solid var(--gold);
    border-radius: 14px;
    padding: 26px 28px;
    margin: 40px 0 0;
  }
  .assist-cta__head { margin-bottom: 16px; }
  .assist-cta__eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--gold-deep);
    margin-bottom: 6px;
  }
  .assist-cta__title {
    font-size: 19px; font-weight: 600;
    color: var(--ink); letter-spacing: -0.015em;
    line-height: 1.3; margin-bottom: 6px;
  }
  .assist-cta__sub {
    font-size: 14px; line-height: 1.6;
    color: var(--ink-3);
  }
  .assist-cta__form { margin-top: 14px; }
  .assist-cta__input {
    width: 100%; padding: 12px 14px;
    border: 1px solid #ddd5b8;
    background: #fffdf6;
    border-radius: 10px;
    font-family: inherit; font-size: 14px;
    color: var(--ink); line-height: 1.5;
    resize: vertical; min-height: 78px;
    transition: border-color 0.15s, background 0.15s;
  }
  .assist-cta__input:focus { outline: none; border-color: var(--gold); background: #fff; }
  .assist-cta__input::placeholder { color: #b5ad95; }
  .assist-cta__row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-top: 10px; flex-wrap: wrap;
  }
  .assist-cta__sla {
    font-family: 'Geist Mono', monospace; font-size: 11.5px;
    color: var(--gold-deep); letter-spacing: 0.04em;
  }
  .assist-cta__submit {
    padding: 10px 20px; background: var(--ink); color: #fff;
    border: 1px solid var(--ink); border-radius: 8px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.12s, transform 0.08s;
  }
  .assist-cta__submit:hover:not(:disabled) { background: #1f1f1c; transform: translateY(-1px); }
  .assist-cta__submit:disabled { opacity: 0.6; cursor: wait; }
  .assist-cta--sent { background: #f0f7ea; border-color: #cfe0b8; border-left-color: #6b9237; }
  .assist-cta__done { display: flex; align-items: center; gap: 16px; }
  .assist-cta__done-icon {
    flex-shrink: 0; width: 36px; height: 36px;
    border-radius: 50%; background: #6b9237; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; font-weight: 700;
  }
  .assist-cta__done-msg {
    font-size: 15px; font-weight: 500; color: #2f4d12; line-height: 1.4;
  }
  .pr-tile {
    background: #faf8f3;
    border: 1px solid #ece6d3;
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    color: var(--ink);
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
  }
  .pr-tile:hover { background: #fff; border-color: var(--gold); }
  .pr-tile__name { font-size: 13px; font-weight: 600; }
  .pr-tile__sub {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 2px;
  }
</style>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/static/favicon.svg">
</head>
<body>

<header class="topbar">
  <a href="/app#drafting" class="topbar__back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Drafting
  </a>
  <div class="topbar__crumb">drafting / <span class="court" id="crumb-court">templates</span></div>
</header>

<main>
  <div class="head">
    <div class="head__eyebrow">Draft a document</div>
    <h1 class="head__title">Choose a template</h1>
    <div class="head__title-hi">दस्तावेज़ चुनें</div>
    <div class="head__count" id="court-count"></div>
  </div>

  <!-- Court filter chips — rendered by JS once courts are loaded -->
  <div class="filter-strip" id="filter-strip"></div>

  <div id="popular-section" hidden>
    <div class="section-label">Most filed</div>
    <div class="grid" id="popular-grid"></div>
  </div>

  <div id="all-section" hidden>
    <div class="section-label">All templates</div>
    <div class="grid" id="all-grid"></div>
  </div>

  <div id="empty-state" hidden>
    <div class="empty-state">
      <h3>No templates yet for this court</h3>
      <p>We're building these in waves. Reach out at <a href="mailto:hello@headnote.in" style="color:var(--gold-deep)">hello@headnote.in</a> to vote up what we ship next.</p>
    </div>
  </div>

  <!-- "Not finding what you need?" personal-assist CTA — rendered by JS -->
  <div id="draft-assist"></div>
</main>

<script>
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// Read initial court from URL: /draft/court/hc → 'hc', /draft/court → 'all'
function getInitialCourt() {
  const m = window.location.pathname.match(/\/draft\/court\/([a-z_]+)/i);
  return m ? m[1].toLowerCase() : 'all';
}

let _allCourts = [];   // full response from /api/draft/courts
let _activeCourt = 'all';

// Chip display names (English, short)
const CHIP_LABELS = {
  all:         'All templates',
  sc:          'Supreme Court',
  hc:          'High Court',
  sessions:    'Sessions',
  magistrate:  'Magistrate',
  family:      'Family Court',
  procedural:  'Procedural',
};

async function load() {
  try {
    const r = await fetch('/api/draft/courts');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    _allCourts = data.courts || [];

    // Build filter chips from available courts
    const strip = document.getElementById('filter-strip');
    const courtOrder = ['all', 'sc', 'hc', 'sessions', 'magistrate', 'family', 'procedural'];
    const availableIds = new Set(_allCourts.map(c => c.id));
    courtOrder.forEach(id => {
      if (id !== 'all' && !availableIds.has(id)) return;
      const btn = document.createElement('button');
      btn.className = 'filter-chip';
      btn.dataset.court = id;
      btn.textContent = CHIP_LABELS[id] || id;
      btn.addEventListener('click', () => setFilter(id));
      strip.appendChild(btn);
    });

    // Set initial filter from URL
    _activeCourt = getInitialCourt();
    renderFilter(_activeCourt);
  } catch (e) {
    console.error('load failed:', e);
    document.getElementById('court-count').textContent = 'Could not load templates';
  }
}

function setFilter(courtId) {
  _activeCourt = courtId;
  // Update URL without navigation (history.replaceState)
  const newPath = courtId === 'all'
    ? '/draft/court'
    : `/draft/court/${courtId}`;
  history.replaceState({}, '', newPath);
  renderFilter(courtId);
}

function renderFilter(courtId) {
  // Update active chip
  document.querySelectorAll('.filter-chip').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.court === courtId);
  });

  // Collect templates to show
  let templates = [];
  if (courtId === 'all') {
    // All non-procedural templates, deduped by id
    const seen = new Set();
    _allCourts.forEach(c => {
      if (c.id === 'procedural') return;
      (c.templates || []).forEach(t => {
        if (!seen.has(t.id)) { seen.add(t.id); templates.push(t); }
      });
    });
    // Sort: popular first, then alpha
    templates.sort((a, b) => (b.popularity || 0) - (a.popularity || 0) || a.name_en.localeCompare(b.name_en));
    document.getElementById('court-count').textContent = templates.length + ' templates available';
    document.getElementById('crumb-court').textContent = 'all templates';
    document.title = 'All templates — Drafting — Headnote';
  } else {
    const court = _allCourts.find(c => c.id === courtId);
    if (!court) { templates = []; }
    else {
      templates = court.templates || [];
      document.getElementById('court-count').textContent = templates.length + ' templates available';
      document.getElementById('crumb-court').textContent = court.label_en;
      document.title = `${court.label_en} — Drafting — Headnote`;
    }
  }

  // Render split: popular (popularity >= 4) and rest
  const popular = templates.filter(t => (t.popularity || 0) >= 4);
  const rest    = templates.filter(t => (t.popularity || 0) <  4);

  const popSec  = document.getElementById('popular-section');
  const allSec  = document.getElementById('all-section');
  const emptySec = document.getElementById('empty-state');

  if (templates.length === 0) {
    popSec.hidden  = true;
    allSec.hidden  = true;
    emptySec.hidden = false;
    return;
  }
  emptySec.hidden = true;

  if (popular.length) {
    renderGrid('popular-grid', popular, true);
    popSec.hidden = false;
  } else {
    popSec.hidden = true;
  }
  if (rest.length) {
    renderGrid('all-grid', rest, false);
    allSec.hidden = false;
    // Update section label depending on context
    const label = allSec.querySelector('.section-label');
    if (label) label.textContent = popular.length ? 'All templates' : 'Templates';
  } else {
    allSec.hidden = true;
  }
}

function renderGrid(elId, templates, popular) {
  const wrap = document.getElementById(elId);
  if (!wrap) return;
  wrap.innerHTML = templates.map(t => {
    // Supreme Court drafting is not production-ready yet — mark as coming
    // soon, disable the click, surface the visual badge.
    const isComingSoon = (t.court === 'sc');
    const href = isComingSoon ? '#' : (t.redirect_url || ('/draft/template/' + esc(t.id)));
    const cls  = [
      'tile',
      popular && !isComingSoon ? 'tile--popular' : '',
      isComingSoon ? 'tile--soon' : '',
    ].filter(Boolean).join(' ');
    const onClick = isComingSoon ? ' onclick="event.preventDefault(); return false;"' : '';
    const badge = isComingSoon ? `<span class="tile__soon-badge">Coming soon</span>` : '';
    // Trim the noisy "Tier N" tag for popular templates — it added visual
    // clutter without informing the lawyer's choice.
    const showTier = !popular && !isComingSoon && t.tier;
    return `
    <a href="${href}"${onClick} class="${cls}">
      ${badge}
      <div class="tile__name">${esc(t.name_en)}</div>
      <div class="tile__name-hi">${esc(t.name_hi || '')}</div>
      ${t.description ? `<div class="tile__desc">${esc(t.description.slice(0, 100))}${t.description.length > 100 ? '…' : ''}</div>` : ''}
      ${showTier ? `<span class="tile__tag">Tier ${t.tier}</span>` : ''}
    </a>
  `;
  }).join('');
}

// ─── Personal-assist CTA ("not finding what you need?") ──────────────
// Mirrors the research-mode CTA in app.js but hosted on this page since
// it has its own <script> context. Promises 2-hour template upload.
function renderDraftAssistCta() {
  const host = document.getElementById('draft-assist');
  if (!host) return;
  host.innerHTML = `
    <div class="assist-cta" id="assist-cta-block">
      <div class="assist-cta__head">
        <div class="assist-cta__eyebrow">Need a different template?</div>
        <div class="assist-cta__title">Tell us — we'll upload it within 2 hours.</div>
        <div class="assist-cta__sub">Free for paid users. Drop the template name + a one-line use case. Goes straight to the founder, not a queue.</div>
      </div>
      <div class="assist-cta__form">
        <textarea class="assist-cta__input" id="assist-input" rows="3"
          placeholder="e.g. 'POCSO bail at Sessions Court — need MP HC format with parity table'"></textarea>
        <div class="assist-cta__row">
          <span class="assist-cta__sla">⏱ 2-hour SLA · permanent upload</span>
          <button class="assist-cta__submit" id="assist-submit">Send request</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('assist-submit').addEventListener('click', async () => {
    const ta  = document.getElementById('assist-input');
    const btn = document.getElementById('assist-submit');
    const q = ta.value.trim();
    if (q.length < 3) { ta.focus(); return; }
    btn.disabled = true;
    const prev = btn.textContent;
    btn.textContent = 'Sending…';
    try {
      let headers = { 'Content-Type': 'application/json' };
      if (window.headnoteAuth && typeof window.headnoteAuth.getAccessToken === 'function') {
        try {
          const token = await window.headnoteAuth.getAccessToken();
          if (token) headers['Authorization'] = `Bearer ${token}`;
        } catch (_e) { /* anon — backend will 401 if needed */ }
      }
      const r = await fetch('/api/assist/draft', {
        method: 'POST',
        headers,
        body: JSON.stringify({ query: q, source_context: 'court=' + _activeCourt }),
      });
      if (!r.ok) {
        if (r.status === 401) { alert('Please sign in to send this request.'); return; }
        throw new Error('HTTP ' + r.status);
      }
      // Swap the form for a success card
      const block = document.getElementById('assist-cta-block');
      block.classList.add('assist-cta--sent');
      block.innerHTML = `
        <div class="assist-cta__done">
          <div class="assist-cta__done-icon">✓</div>
          <div class="assist-cta__done-msg">Got it — we'll have it live within 2 hours.</div>
        </div>
      `;
    } catch (e) {
      btn.disabled = false;
      btn.textContent = prev;
      alert('Could not send — ' + (e.message || 'please try again'));
    }
  });
}

load().then(() => renderDraftAssistCta());
</script>
</body>
</html>
