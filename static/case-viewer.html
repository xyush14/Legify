<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/static/analytics.js?v=20260630a"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Headnote — Judgment Viewer</title>
  <style>
    /* Journal-page styling — looks like a Cri.L.J. printed page so the
       lawyer's eye recognises it instantly */
    :root {
      --ink:   #1d1d1f;
      --muted: #6e6e73;
      --line:  #d2d2d7;
      --accent: #0066cc;
      --accent-soft: #e8f1fc;
      --warn:  #cc8800;
      --warn-soft: #fff7e6;
      --bg:    #fafafa;
      --paper: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Charter', 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.65;
      font-size: 16px;
    }
    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 24px 96px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-family: -apple-system, system-ui, sans-serif;
      margin-bottom: 24px;
    }
    .back-link:hover { text-decoration: underline; }

    /* Header strip — caption + citation + court + outcome */
    .header {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .caption {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 10px;
      color: var(--ink);
    }
    .caption .vs {
      font-style: italic;
      font-weight: 500;
      color: var(--muted);
      padding: 0 4px;
    }
    .citation-row {
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .citation-row strong { color: var(--ink); font-weight: 600; }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 24px;
      font-size: 14px;
      color: var(--muted);
      font-family: -apple-system, system-ui, sans-serif;
    }
    .meta-row .label {
      font-weight: 600;
      color: var(--ink);
      margin-right: 4px;
    }
    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 99px;
      font-family: -apple-system, system-ui, sans-serif;
      letter-spacing: 0.02em;
      font-weight: 500;
    }
    .badge.outcome-good { background: #e6f7e9; color: #1a7d32; }
    .badge.outcome-bad  { background: #fde9e9; color: #b41a1a; }
    .badge.outcome-neutral { background: #f0f0f3; color: var(--muted); }
    .badge.verified { background: var(--accent-soft); color: var(--accent); }
    .badge.confidence { background: #f5f5f7; color: var(--muted); }

    /* Judgment body */
    .body {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 32px 36px;
      margin-bottom: 24px;
    }
    .body h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 0 0 16px;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .body .para {
      margin: 0 0 14px;
      text-align: justify;
      hyphens: auto;
    }
    .body .para.numbered { padding-left: 4px; }
    .body .para:target {
      background: #fff8e1;
      padding: 8px 12px;
      border-left: 3px solid var(--warn);
      margin-left: -12px;
    }

    /* Provenance footer */
    .provenance {
      background: var(--warn-soft);
      border: 1px solid #f3d090;
      border-radius: 12px;
      padding: 20px 24px;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 14px;
      color: var(--ink);
    }
    .provenance h3 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--warn);
      margin-bottom: 8px;
    }
    .provenance p { line-height: 1.55; margin-bottom: 12px; }
    .provenance .verify-btn {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      margin-right: 8px;
    }
    .provenance .verify-btn:hover { background: #0052a3; }
    .provenance .copy-btn {
      display: inline-block;
      background: var(--paper);
      color: var(--ink);
      padding: 8px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      border: 1px solid var(--line);
      cursor: pointer;
    }
    .provenance .copy-btn:hover { background: #f5f5f7; }

    /* Official PDF embed (Supreme Court open-data judgments) */
    .pdf-actions {
      display: flex; gap: 10px; flex-wrap: wrap;
      align-items: center; margin: 4px 0 16px;
    }
    .pdf-actions .pdf-btn {
      display: inline-block; padding: 10px 16px; border-radius: 6px;
      font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer;
      border: none;
    }
    .pdf-actions .pdf-btn.primary { background: #0066cc; color: #fff; }
    .pdf-actions .pdf-btn.primary:hover { background: #0052a3; }
    .pdf-actions .pdf-btn.ghost {
      background: #fff; color: #0066cc; border: 1px solid #0066cc;
    }
    .pdf-actions .pdf-btn.ghost:hover { background: #f0f6ff; }
    .pdf-note { font-size: 12.5px; color: var(--muted); margin-left: auto; }
    .pdf-frame {
      width: 100%; height: 82vh; min-height: 520px;
      border: 1px solid #dcdce0; border-radius: 8px; background: #f7f7f8;
    }
    .pdf-fallback {
      padding: 16px; border: 1px dashed #cfcfd4; border-radius: 8px;
      color: var(--muted); font-size: 14px;
    }

    /* Loading + error states */
    .loading, .error {
      text-align: center;
      padding: 60px 20px;
      font-family: -apple-system, system-ui, sans-serif;
      color: var(--muted);
    }
    .error { color: #b41a1a; }

    /* Devanagari sets a different font */
    body.lang-hi .body,
    body.lang-hi .caption {
      font-family: 'Noto Sans Devanagari', 'Mangal', 'Arial Unicode MS', serif;
    }
  </style>
</head>
<body>
  <div class="page">
    <a class="back-link" href="javascript:history.back()">← Back to results</a>
    <div id="content">
      <div class="loading">Loading judgment…</div>
    </div>
  </div>

  <script>
    const docId = decodeURIComponent(location.pathname.replace(/^\/case\//, ''));

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function outcomeBadge(outcome) {
      if (!outcome) return '';
      const o = String(outcome).toLowerCase();
      const good = ['granted', '1', 'bail-granted', 'quashed', 'acquittal', 'allowed'];
      const bad  = ['rejected', 'denied', '0', 'bail-denied', 'conviction', 'dismissed'];
      let cls = 'outcome-neutral';
      let label = outcome;
      if (good.some(g => o.includes(g))) { cls = 'outcome-good'; label = 'favourable'; }
      else if (bad.some(b => o.includes(b))) { cls = 'outcome-bad'; label = 'adverse'; }
      return `<span class="badge ${cls}">${esc(label)}</span>`;
    }

    function render(data) {
      const caption = data.parties || data.title || 'Judgment';
      const isHindi = data.language === 'hi';
      if (isHindi) document.body.classList.add('lang-hi');

      // Header: caption + citation + meta + badges
      const citation = data.citation
        ? `<div class="citation-row"><strong>${esc(data.citation)}</strong></div>`
        : '';

      const metaItems = [];
      if (data.court) metaItems.push(`<span><span class="label">Court:</span>${esc(data.court)}</span>`);
      if (data.bench) metaItems.push(`<span><span class="label">Bench:</span>${esc(data.bench)}</span>`);
      if (data.date) metaItems.push(`<span><span class="label">Date:</span>${esc(data.date)}</span>`);
      if (data.case_number) metaItems.push(`<span><span class="label">Case No.:</span>${esc(data.case_number)}</span>`);
      if (data.judges && data.judges.length) {
        metaItems.push(`<span><span class="label">Judges:</span>${data.judges.map(esc).join(', ')}</span>`);
      }
      const metaRow = metaItems.length
        ? `<div class="meta-row">${metaItems.join('')}</div>`
        : '';

      const badges = [
        outcomeBadge(data.outcome),
        `<span class="badge confidence">${esc(data.metadata_confidence || '')} confidence</span>`,
      ].filter(Boolean).join('');

      // Body: an embedded OFFICIAL PDF when we have one (Supreme Court
      // open-data judgments), otherwise the stored paragraph text.
      const pdfUrl = data.pdf_url || null;
      const paragraphs = data.paragraphs || [];
      let bodyTitle = 'Judgment text';
      let bodyHtml;
      if (pdfUrl) {
        bodyTitle = 'Official judgment';
        bodyHtml = `
          <div class="pdf-actions">
            <a class="pdf-btn primary" href="${esc(pdfUrl)}" target="_blank" rel="noopener">Open official PDF ↗</a>
            <a class="pdf-btn ghost" href="${esc(pdfUrl)}" download>Download copy</a>
            <span class="pdf-note">Official copy · Supreme Court of India</span>
          </div>
          <iframe class="pdf-frame" src="${esc(pdfUrl)}" title="Official judgment PDF"></iframe>
          <p class="pdf-fallback">If the PDF doesn't load above,
            <a href="${esc(pdfUrl)}" target="_blank" rel="noopener">open it in a new tab</a>.</p>`;
      } else if (paragraphs.length) {
        bodyHtml = paragraphs.map(p =>
          `<div class="para ${p.numbered ? 'numbered' : ''}" id="${esc(p.id)}">${esc(p.text)}</div>`
        ).join('');
      } else if (data.holding) {
        bodyHtml = `<h2>Holding</h2><div class="para">${esc(data.holding)}</div>` +
          (data.facts ? `<h2>Facts</h2><div class="para">${esc(data.facts)}</div>` : '');
      } else {
        bodyHtml = '<p class="loading">No judgment text available.</p>';
      }

      // Provenance footer
      const prov = data.provenance || {};
      const verifyBtn = prov.verify_url
        ? `<a class="verify-btn" href="${esc(prov.verify_url)}" target="_blank" rel="noopener">
             Verify on Indian Kanoon ↗
           </a>`
        : '';
      const copyBtn = data.citation
        ? `<button class="copy-btn" onclick="navigator.clipboard.writeText('${esc(data.citation)}').then(() => this.textContent='Copied ✓')">
             Copy citation
           </button>`
        : '';

      document.getElementById('content').innerHTML = `
        <div class="header">
          <div class="caption">${esc(caption)}</div>
          ${citation}
          ${metaRow}
          ${badges ? `<div class="badge-row">${badges}</div>` : ''}
        </div>
        <div class="body">
          <h2>${esc(bodyTitle)}</h2>
          ${bodyHtml}
        </div>
        <div class="provenance">
          <h3>Source &amp; verification</h3>
          <p><strong>${esc(prov.source_name || 'Source')}</strong> — ${esc(prov.source_note || '')}</p>
          ${verifyBtn}
          ${copyBtn}
        </div>
      `;
    }

    function showError(msg) {
      document.getElementById('content').innerHTML =
        `<div class="error">${esc(msg)}</div>`;
    }

    fetch(`/api/case/${encodeURIComponent(docId)}`)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(render)
      .catch(e => showError(`Could not load this judgment: ${e.message}`));
  </script>
</body>
</html>
